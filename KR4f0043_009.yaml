body:
  text: 二希堂文集卷九禮部侍郎蔡世遠撰刑部右侍郎涇陽王公神道碑雍正七年十二月甲申刑部右侍郎王公卒於位天子加恩賜恤葬祭諭禮部具典禮以聞越明年二月其孤穆將歸葬以狀請於余曰願有以銘其隧道之碑余與公為同年友知公生平講道服義立朝涖官愛國撫衆諸大節有古大臣風其何敢辭按公姓王氏諱承烈字遜功陜西涇陽人曾祖諱徴由進士授廣平府推官魏閹搆黃山獄抗爭之全活數百人擢山東按察使司僉事落職家居闖賊陷關中檄召縉紳稱疾篤不赴甲申之變七日不食死祖諱永春邑諸生闖賊之變代僉事公繫賊所僉事公得脫父諱瑱邑諸生以任恤重州郡祖考以公貴贈某官三代並崇祀鄉賢祠曾祖妣某氏封恭人祖妣某氏妣某氏皆贈恭人公天性髙邁幼嗜學莊誦如成人年十九補博士弟子員旋食餼㛠詩賦古文敦內行孝養無方家極貧授徒供甘旨嵗飢未嘗缺居鎮城與鄉人按保甲法稽察巡守編善俗歌謠令守城行夜者講誦鄉人化之肆力五經陳篋伏讀由心得發為文章乙酉以五經領解己丑成進士改翰林院庶吉士丁內外艱喪葬悉依家禮五年孺慕如一日服闋散館授翰林院檢討今上御極改河南道監察御史巡視東北城公性坦易而涖衆方嚴峻廉隅守法度有巨宦僕戚羇賈人米價索欠則假威怒罵賈人鳴於官僕匿其戚於巨宦第中公執而置之法輦下肅然署掌山東道時有旗人命案凶首非其人九門提督定案將抵命會審諸公莫敢異同公抗言其寃往復辨爭得免凡公所為不畏強禦類如此旋補吏科掌印給事中二年八月召入養心殿講大學明明德辨儒釋之分甚詳上大喜賜性理精義古文淵鑒及珍玩數種即奉有督糧湖北之命湖北漕運頭舵水手皆本軍雇覓沿途苦之時有請即用本軍子弟者公以本軍子弟不習操舟且縱水手數萬人失業於江湖中為害滋大乃依保甲法編次恩威並用運丁斂戢江陵荆門蘄水等州縣向有以南兌漕之例水腳運費約千金舊歸糧道公準其兌而却其金黃州府屬被災公捐資設飯厰賑之舊例荆南盤查各倉陋規供應船隻每項約費三千餘金公皆捐俸自備飭胥吏不得受一錢給發南折兵餉及修船行月等銀悉照部平而以其餘修造救生船興復江漢書院天子聞而嘉之擢江西布政使司布政使署舊設東西通吏作姦犯科公涖任即革除勒石各州縣凡遇造册事件吏胥苛駁以索厚費公令粘簽册首示以攢造之法需索之弊自絶南昌新建吉安九江等郡被水公捐三千餘金賑恤會城多圮捐千金倡修之又清釐白鹿洞學田俾諸生膏火之資不絶時布中丞性苛急待吏民如束溼薪公委曲調護徑正不苟大拂中丞意公曰吾一日為藩司一日行吾心所安肯阿上官以上負聖明下負百姓耶人咸為公危之上察其忠以都察院左副都御史召公進見即具劄直陳上召中丞置對中丞語塞遂落職授公工部右侍郎江右數十萬生靈咸頂祝曰天子聖明公有仁者之勇偉哉公自工部調刑部右侍郎時方苦瘧感上知遇力疾辦事至秋遂臥牀褥冬十二月卒春秋六十有四公自少勤學博涉羣書年四十兄事豐川王先生講明心性修已治人之學以第一等人為可學而至豐川先生諱心敬陜西名儒也既成進士出安溪李文貞公門益研究宋儒書身體心驗不在空言所著日省録切已內考力行可畏毛詩解尚書解皆有心得病臥時猶手自改正公嘗語余曰吾自年四十庶幾無一事不可對人言者歷官二十餘年清節惠心虔恭不懈偶有贏餘即用以惠民濟衆修廢興學不為生計沒之日身幾無以為斂嘗謂其子曰我以清白二字遺汝足矣初登九列士大夫想望其丰采施為公益奮勵思上報聖明竟以纒綿瘧病未得展其志每與親知子弟言及未嘗不淚涔涔下也嗚呼觀公之忠誠終始勿替可謂不負所學者矣原配左氏繼娶李氏俱贈恭人皆先公卒又娶裴氏封宜人子男一穆癸卯舉人內閣中書舍人孝謹能世其家學女三長適太學生李思孝次適候選經歷蕭侯次幼孫女一公之歷官行事相國高安朱公既為之志以納之幽余所以銘公者亦將以傳公於後也銘曰王氏髙節世有賢哲隂德之光其祥長發我公繼之孝德作基董帷發憤擇友親師年既四十淵修益密約已以正居官以律天子達聰進秩登庸其艱其瘁一其初終臺垣數載寢姦宥罪吏以從風民以樂愷兩湖之間水運盤環公施大德墮淚峴山江藩嗣命以煦以泳棘棘不阿強權莫競載道歌賡惟天子明既毗邦憲若工司刑公曰嗚呼身非我有我疾不瘳帝恩有負竟不少留遂終於位迹公生平忠誠不二有耀其學有昭其繼刻石垂休以質來裔麗水令王君思菴墓表雍正五年天子下薦舉之詔內官自郎中以上外官自知府以上各舉所知一人余時備員內閣學士將以王君應詔其同縣雷貫一為我言君年已七十衰老不能任事以是中止蓋余素知君令麗水有循聲居鄉為賢薦紳亦得之貫一所述也越四年而君卒貫一為狀其生平求余表其墓余固知王君者其何可辭君閩之寧化人諱汝楫字若濟號思菴六嵗喪母八嵗喪父依兄嫂撫育少聰穎孤苦勵學十嵗應童子試有神童之目癸亥列諸生登甲子榜第二人嵗庚辰謁選得浙之麗水邑經藩變凋弊特甚君煦育如慈母邑之人無不諒其愛之誠而無有利心也凡所興除悉如所欲嵗旱報荒太守止之曰子不顧考成耶曰寧纍考成願全民命藩差有藉催糧名頻數索夫而吞其價者一不如意即倚勢咆哮君諭曰邑遭亢旱令憂心如焚今兩月間索夫至九十餘名民何以堪公務稍暇令當自來肩輿耳差乃駭而宵遁金華兵米不敷上官檄以麗水溢米四百五十石運接永康君計程二百餘里須夫二千二百五十人囊四千五百民不能供致書幣永令佟君具道麗水貧瘠狀求以銀折米許之是役也君捐已俸以足額民莫知也邑土曠人稀十三都十四都荒殘尤甚時報新墾者嵗入計七十餘兩君請以抵兩都額賦民得蘇息嵗免奏銷帖費四百兩編審雜費亦如之徴糧減舊耗三之一焉邑當孔道夫船常規悉屏却廉得尅減者杖懲之立石永禁往來利之凡可以便民懲姦者勇為之壬午春同太守入杭州太守引入內榻出四人相見私謂曰闈中幸加賞識君峻拒之歸至署中言其事咸曰何不陽順陰違君曰我作朝廷官非作太守官也奈何詭道面欺然竟以此得罪用不察盜報罷邑人作攀轅圖以贈送數十里揮淚而返君居官寬和平恕而律已方嚴事上官極恭遇公事則棘棘不阿故上官面譽而隂汨之既罷歸老屋數間不增一椽敦修學古為鄉人式未嘗以私干人至事關民生休戚侃侃直陳或陰為條具當事重其品恆見採納雍正九年卒春秋七十有四子男三長道光為諸生博學能文先君卒餘皆向學余嘗謂士生斯世小得志則為親民之官以自行其政教力所能及者無不悉焉不得為時用則飭倫紀正學術以倡家鄉力所能及者無不悉焉君得兼有之其可謂有立於世矣贈奉直大夫玉林徐君墓表雍正五年嵗丁未福建總督高公巡撫常公合辭奏曰維仙遊太學生徐萬寶敦修纍善嵗飢賑米八千餘石殁於積勞尚義可風請建坊立祠上下其議禮部特給帑金建坊有司虔造牌位入祠致祭欽定善勞可嘉扁額蔭一子入監讀書越庚戌十有一月將葬徐君於月山之陽漳浦蔡世逺表其墓曰嗚呼講學而不行善猶弗講也行善而力有不逮則行之不廣力大矣而心有未盡則行之猶不力行之廣且力矣又或聞其風而不親見其行事知其行事而不識其人則亦不能熟悉其生平之大節細行若徐君者所謂行之廣且力親見其所行之善迹且曾遊吾門熟悉其生平之純孝至弟樂善好施舍上為聖天子之褒嘉下為邑里之頌禱固宜咨嗟愛慕揚闡撰述而不能置也君字祖寧别號玉林贈奉直大夫派出唐狀元寅逮裔孫博士日將徙居仙遊遂為仙遊人代有傳人父南贈奉政大夫祀鄉賢母李氏贈宜人奉政公有子四人曰萬安封奉政大夫曰望斗太學生需次縣丞曰萬卷由訓導署理鹺務皆有賢德君其季子也自幼有至性年十四母夫人病篤隂割胸肉和粥以進後家稍豐痛母不及養思及即泣下事奉政公孺慕備至每奉金錢聽施豫以樂父志病劇籲天減壽得瘳沒後出告反面如生時值祭期雖出必反思其所嗜備物致敬父執貧者或養以終身或周其子孫曰父毋所愛敬也事兄如事父愛從子如已子伯兄長子謨官户部郎中移書與之曰汝但清修勵志京邸日用吾為汝謀無闕也諸子弟咸䇿以讀書修已就外傅者日夕必詢其所學千指共爨和樂雍雍别嫌明微內外秩秩子婦無私貨積焉交友以正終身不渝遭橫逆則恬然曰吾不能化之何忍怒之其愛敬所積暨于家門戚友者類如此君又嘗自言吾為天地之身父毋之子胞與吾分也修聖廟建尊經閣紫陽祠糜白金二千三百有竒修七橋在仙遊者曰東渡曰石馬曰廣曰南門糜千三百有竒在莆田者曰秋盧曰瀨溪糜二千五百有竒施棺者二十餘年嵗糜二百有竒施衣者二年施藥者十餘年其於讀書人尤禮愛惓惓雍正三年嵗飢君偕里正稽貧户以丁口為差分粟二千餘石餓者多四月煮粥六月乃止捐米三千餘石莆之南日山寄絶島飢尤甚親往捐米數百石丙午嵗又飢五月煮粥六月乃止捐米四千餘石兩嵗捐米八千餘石其法日定竒偶别男女籖分先後區老幼又慮日久貧人弛業計日盡給戚友則遣送其家貧者倍餽之竟以積勞成疾踰三月而終時雍正四年九月二十一日也春秋五十卒之前一月遺囑千餘言戒諸子弟以力學敦行尊師取友勿信奉佛氏作無益費抽家資三之一為義田曰范文正公以惠一族吾以惠家鄉繼我未了之志也郡人無老少聞訃哭失聲走拜奠者踵相屬憶自康熙丙申君曾執贄吾門顧以勤家施善不得久從學業余謂君之積行纍勞勝於朝夕占畢多矣君立愛立敬不敢惡慢於人每行一善曰父志也立一功曰兄命也昆弟一心若敷災之又疆畎之若垣墉之又塈茨之家無宿財天亦隨其願欲俾不嗇於用余又以是歎天人之感應甚神而善道之果可行也世有封已而薄親故勞瘁鄙嗇厚積以貽子孫使其子若孫諺誕蕩佚墜若燎毛即幸而守財不失多資損志録録沒沒孰與君之躬仁蹈義以慶貽子孫身動九重之知廟食百世哉此皆由聖天子仁育義正風動四表故我閩以鄒魯餘風首先興起雖不及得位居官宏敷濊澤而其厚德深仁發於心腹腎腸浹於閩山海嶠者真可以千百世矣娶林氏仁淑能內助封宜人子三錦庠生從吾遊好學篤行能恢前業恩賜入監讀書需次知州湖勤學早世臨太學生需次州同觀君之昆仲子姓惠愷肅雍徐氏之興蓋未艾也盧孝子墓表浙之東有盧孝子焉諱必升字寀臣號玊茗世居姚江後遷山陰祖諱極生子五人長諱芳字南江孝子之本生父也次諱茂字懷江無子以孝子嗣焉孝子始生時祖母張太君病甚本生母朱孺人禱天自代是夕夢神益算并賜爾孫及覺而生孝子少時知孝敬有異敏嘗從學舍歸懷江公以新學生屬對即應聲曰古君子懷江公大竒之九嵗南江公病思得蟛蜞炙孝子潛攜一筐採沙口為風潮所沒得漁者救以竹筏筐終不釋手而蟛蜞滿貯甲申之難流賊未殄懷江公負俠氣常仗劔獨行不知所往孝子聞即奔覓諸暨山中晝循林箐隱夜則﨑嶇匍伏而行失道投僻路伏尸枕藉驚跣疾奔兩足為沙石所囓血縷縷漬地行迹皆赤遇一山僧憐之挾與俱遇虎匿高樹大呼山神救我虎竟去閲數月得奉父以歸壬子土冦竊發懷江公陷賊營孝子匍匐探其穴贖以金不應繞岸哭三晝夜不絶聲賊感動為引至父前時賊首毛袁二人欲得懷江公降脅以刃不從斬所俘者以示又不從賊怒拔刀環向刃欲下數次孝子冒刃叩頭流血大呼丐命忽狂風四起大雨如注舟幾覆凶黨震駭乃得釋時賊中有倪姓者聞而歎曰真孝子也乘間逸之孝子既奉父生還逆知賊之必追己也即遣人馳報張太君盡室以行明旦賊果追之不及遂至九墩大索縱火而去懷江公既被重傷病日臻孝子亦改面失音恐貽父憂雖嘔血弗以告日夜侍臥側以兩手摹患處懷江公歎曰人摹我痛痛在我身汝摹我痛痛如在汝身其誠孝所感類如此先是孝子為繼時懷江公有女忌分其資百計傾之孝子處之泰然至是奉徐孺人命往雲間舟過石門盜擊之垂死盜曰爾死母我讐我奉某命來也孝子佯死盜縛而投之水中遇富陽支姓者救之得免人或勸之訟於官孝子泣曰吾自出繼以來蒙吾母恩育十有餘年且母止此一女故不忍以女故傷母心上書徐孺人前自謝不謹被盜不及其他徐孺人亟召之歸母子相孝愛如初以康熙丙戌七月卒年七十有四配李氏以孝賢聞子四賢需次州同發國學生堅浙江開化訓導睿山西平陽府經歷孫男幾人雍正二年浙江巡撫李公請旌於朝禮部上其議詔發帑金建坊入忠孝祠葬之日侍講吳門習君既志而銘之漳浦蔡世逺表於其墓曰古之論仁孝者必歷之造次顚沛患難死生之交而純摯乃見西銘言仁孝之書也因舜而及申生伯竒推之至於無所逃而後仁體孝心膠結呈露孝子覔父於﨑嶇險阻叢山密箐之中入賊巢脫父於鋒刃鼎鑊之下出萬死一生不顧可謂難矣逮嗣父已沒女忌其分資使賊之中道得不死嗣母徐氏未必深責女也乃能致孝始終纖微無介其至性有大過人者哉詹兼山先生墓表詹先生諱明章字莪士號兼山漳州海澄人康熙五十九年四月享年九十有三以卒越明年卜葬於某山之陽漳浦蔡世逺表於其墓曰嗚呼先生儒而隱者也先生以勝國遺民隱居不出力學著書至老不倦世逺未識先生時先君子嘗語世逺曰吾漳有詹兼山先生者在都門時嘗為我言河洛之學甚粹其人蓋隱君子也世逺心識之嵗丁亥儀封張公撫閩建鼇峰書院世逺幸隨先君子後與講席之末張公廉知先生名問及世逺對曰是家君子之所敬畏也先生應聘修書周張朱子之編多所手定因得朝夕聚處世逺少先生五十三嵗先生以通家子畜余未嘗不諄諄訓誨也世逺後官京師適柏鄉魏君守漳郡因往告之曰詹兼山先生者隱君子也年八十餘篤行著書手不釋卷批著易義及河洛解等書皆已刋行君其加禮焉以為都人士率先魏君至遂式其廬屬以參訂其先相國所輯四書朱子全義用進乙覽大稱上意政府安溪李公太倉王公各上摺嘉歎先生雖不出而學大行名益重魏君為築景雲樓月出粟肉以優之乙未嵗相國安溪公假歸將禮聘之以老病辭然公嘗言之制府滿公曰吾閩有詹兼山先生者隱君子也魏君觀察江南又取先生所著先天圖卦説繕寫以書屬滿公進呈滿公未及行而先生捐館舍矣嗚呼故老湮沒典型不作有心同悲况世逺於先生得附世交之末親承其言論風旨者哉憶前嵗戊戌漳遭大風雨壞室廬且半先生景雲樓亦傾世逺自漳浦往見先生僦居斗室中日不再食諸孫多有飢色先生蕭然自得也世逺贈以酒肉先生笑納之且使告龍溪令君曰大風雨壞室廬且半君與郡侯出金賑貧顧安可使詹先生困飢餓哉令君躬自往見贈以金當事及親知斂金為興景雲樓嗚呼先生真隱君子也方其初年或隱於江右或隱於都門或隱於幕下輕先生者不過以為無用老儒生耳孰知其堅節苦學至死不厭不可磨滅嗚呼世學不講長大傑出者耳擩目染安其故業後生小子又多厭聞宋儒之書以為迂而不切於用世逺自友教鼇峰以來方率七閩人士大聲疾呼而同志無多數人方藉先生以為標的孰知其竟不憗遺也嗚呼以先生之養之學年九十餘勤勤懇懇惜及寸陰况如世逺又可輕自怠廢哉用表其阡昭隱德也翰林院檢討舉孝廉方正文山董公墓志銘雍正七年二月四日吾師翰林院檢討舉孝廉方正特子終養文山董公卒於籍其孤兆瀛以狀來曰今年將卜窀穸敢請志諸幽按公諱玘字玊崖號文山先本王姓為江南鳳陽府定逺縣人明洪武初有諱􅀈者從沐黔寧開滇以功封武略將軍世職正千户遂為雲南某縣人數傳至諱琪者贅於董因繼董氏嗣又四傳至公大父諱志補博士弟子員生贈翰林院庶吉士諱廷試實生公公生而穎異贈公及從父石公鍾愛之甫四嵗嘗攜之遊指鄰家門額春字使識之更他門額輒辨從父異之授以四書再遍成誦比長益嗜學年十六補博士弟子員越兩載贈公捐館家貧兩叔父幼弱晝則稍逐什一夜則就膏火于太夫人之側機杼書聲中宵不絶踰年仲父珣能治家事遂矢志下帷陳篋伏讀丙子登鄉薦庚辰成進士授翰林院庶吉士恭遇覃恩贈父如其官母為太孺人癸未散館御試録四人公與焉授檢討入直內廷屢試詩賦有旨褒嘉賜御製詩集及淵鑑齋古文簡命典福建乙酉鄉試號稱得人是嵗以國書精熟為閣臣首薦命纂修三朝國史大清玉牒丙戌夏乞假省覲先是庚辰春公仲父珣卒戊子季父璘又卒公遂決意家居曰吾不復仕進矣甲午以例休致公恬然曰養親吾志也性坦夷待人不設城府無矜容亦無惰氣姻黨間婚喪不能舉者量力助之以文公家禮倡於鄉力革浮靡俗為一變生平喜讀書每持一卷必盡卷始休誨人曰讀書須字字體貼自身不爾即成誦何益誨誘後學不倦鄉邦有礙禮法者侃侃爭之不隨俯仰薦紳依為柱石當事咸敬禮之公之養太夫人也盤飱不過一蔬一肉而左右省視志餘口體二十三年如一日今上御極之初以恩例復原官總督髙公其倬巡撫楊公名時舉公孝廉方正公以太夫人春秋高固請終養戊申夏太夫人寢疾公在病躬親藥物及告終一痛幾絶以今春正月卜葬附身附棺公皆力疾區理二月疾遂劇竟以哀毁而卒享年五十有八著詩古文若干卷嗚呼公之文章重於館閣而受知於聖祖仁皇帝公之孝行推自里黨薦自開府而上達於至尊雍正三年世逺以起居注侍直乾清門部議謂公以孝廉舉願終養應俟母終之後來京上曰董某純孝豈有當孝子之前而曰俟爾父母既沒而來京者哉此豈人子所忍聞哉但允其請足矣以見公之至孝上孚於廟廊而聖天子之以孝風示天下為無窮也世逺自巳丑官庶常明年請假省覲又明年而先君棄我服闋赴京修書竣事即歸省母甫三年而母氏棄我視公二十三年之養有如天上非公誠孝所感能如是乎孔子曰舜其至孝矣五十而慕公以五十七嵗喪母猶孺慕哀毁喪葬甫畢即隕其軀嗚呼非所謂至孝者乎禮曰左右就養無方服勤至死公之謂矣元配戴氏先公卒九年覃恩封孺人生子男二長兆濂早卒次兆瀛甲午科舉人女二一適庠生梁聖揆一適盧山知縣趙君河子峚繼配張孺人生子二兆沇兆洢俱幼孫二佶倓銘曰孰使我二十三載不得登堂以請益也自滇徂閩山川阻以逖也公奉母家居胥華膴顯榮而不以易也公在翰林賢聲籍籍公舉孝廉純孝可則天子知公嘉以為式昊天不弔毌氏永隔喪葬既畢從母晨夕母曰嗟豫子來亟公投諸懷有涕沾臆曾不反顧既夷既懌公有令子搆堂式克既窆於幽有耀孝德地祇嶽靈護兹窀穸子孫賢昌永世無斁安溪縣訓導季父君晦府君墓志銘府君諱祚熹字在朱號君晦漳浦人高祖諱大壯嘉靖舉人令寧鄉縣曾祖諱宗禹萬厯進士官刑部主事以理學範宗支倡海濱祖諱一橙舉人父諱而煜庠生皆贈通奉大夫內閣學士兼禮部侍郎祖妣黃氏妣林氏皆贈夫人學士公有四子先大夫行三府君其季也幼質魯讀書遜志善入敦重不浮年三十受知學使楊大山先生拔冠一邑旋食餼由庠生至嵗貢歷十一試皆高第從遊甚廣性介潔和易僉曰人師也令君汪侯聘主義學雍正三年授安溪訓導挾一子一孫偕往與諸生論文講學課文必躬自作朂以敦門內行立節槩誠心所感人士化之祭聖牲饌必豐潔手自檢視諸生丁艱起復者飭胥吏不得索一錢束脯隨其所上諸生請業請益親函丈惟恐不及奉委點家甲却陋例至村鄉則聚父老子弟與言慈孝進髦士與言讀書作文之方爭迎致書館曰我家先生至也次年得病諸生輪侍日夜旋告歸紳士數百人徒步送數十里涕泣而别以雍正四年十月卒於家享年七十有七安溪紳士翰林李君光墺等列狀當事欲祀之名宦纍請而不己云府君天性孝友甲寅遭耿鄭之變先大夫以選貢入京師阻於兵不得歸府君奉雙親避亂梁山枵其腹讓粥以養父母問及則佯曰兒巳食矣每從假館歸省衣袴躬自洗滌且喜且泣曰此境豈人子所多得耶事先大夫如父年六十餘侍側供使令如少時捐館時世逺官京師越嵗始聞訃死不得趨喪及今葬又不得執紼撫穴痛無極也娶李氏庠生諱延女先卒子三長鐏亦先卒次孚逺次垂逺並庠生女二人孫男七人溎新雲從皆庠生餘尚幼曾孫二人銘曰邑鐸有司先子曾尸弟踵兄席式守兄規士爭浴德人忭得師和家處世坦坦施施誨我如子三紀不弛不在秩爵復初完美培潤爾根勿耀爾枝我官四載誨言猶在遙睇喪車長吁懓愾望孫子賢疆此稽田有篤斯祜有賁壤泉萬里緘銘勒之永年處士雷愼菴墓志銘寧化有處士雷君愼菴敦孝睦重禮法用訓厥族式穀厥子若孫者也康熙丁酉嵗余主鼇峰書院其孫鋐來就學年少有志尚跬步一範於禮體察宋儒之書省克若不及余固疑其或得於祖父淵源所漸因詢知君之為人君諱世守字衛天愼菴其别號也少勵志讀書不屑一切甲寅閩變匿迹自韜奉厥父母播越險阻志養色養無違父為仇家誣君以身代質自寧抵府治晝夜行二百里咯血數升事竟白而家以大匱親既殁嵗時祭祀常作孺子泣曰兒在此式食庶幾叔父殁於江右殯淺土諸孤藐爾惟一舅氏知其處亟逆以歸與父合葬焉家居新祠宇修譜系備祭器規範肅以和族之無後者列於牌定期以祭其荒墳不可識者甃石志之雷為寧望族戶數百科第衣冠林立君以一布衣肩族務敘族法不見齟齬相與宜之且慕向之此必非無所挾而然矣鋐之來學也君以書朂之曰濂洛關閩正學也有倡之者汝其勉乎鋐舉於鄉君曰吾固甚喜然此未足以云也吾聞師友之所望於若者與乃祖券矣故鋐志道專且篤曾祖諱顯福祖諱祥卿父諱德義皆不仕娶吳氏未育早卒繼娶張氏子男一鳴高邑廩生醇質而善文孫男三長即鋐孫女二曾孫男一將葬鋐來京師求銘銘曰古寧之疆雷姓所宅篤敘孚恭纍世為澤有構其堂孫先奮翼説心古昔承厥儒脈君有魂魄潛靈以懌身教維則視此窀穸大理寺少卿心齋陳公墓志銘有學術而後有治功學術陋則治功卑出宰州縣則為俗吏入為卿士則如贅疣居位愈高刺譏愈大儒者之學小用大用宰一邑與治天下無二道也吾師四明陳公以康熙丙子嵗由翰林出宰漳浦調南靖入為刑部曹晉臺中洊歷大理寺少卿奉使秦中以卒其孤本醇以書來請銘世逺受知最深亦知公最深者故不敢辭公諱汝咸字莘學號心齋先世自青州徙家鄞世有聞人傳十二世至怡庭公諱錫嘏字介睂有學行天下無不知有介睂先生是時浙東多學者萬季野以史學名李杲堂以古文名介睂先生則以經學名由康熙乙卯解元中丙辰進士歷官編修生四子公其次也公自少穎異通經史長侍怡庭公從黃梨州先生講經己知其要領嫻文采氣岸高一世登戊午賢書辛未成進士選翰林院庶吉士改知福建漳浦縣公憤俗吏一切補苴茍且之治邑多詞訟胥役攖民錢如囊取公於小事令鄉族調處大者用紙皂如期至剖晰如流閩俗輕生因誶語爭競食惡草懸梁服鹵以破人家官役因之株及鄉族公令死者親屬收斂餘無所問賦役為一縣大政公慨然曰吾當為漳浦立百世之利舊時族有户長地丁藉以徵納強弱有先後之弊黠者緣為姦公定三百畝為一户令民各具親供計實産自立徵户糧多者為户長以次輪催丁亦如之催科不擾而國賦蚤完又念鄉邑民居保分有大小則姦匪易匿公務有不均之歎定二百家為一保畫一平均至今賴之延文醇行潔者為義學師月朔望課古今文詩賦榜其髙下初三十八日萃一邑之秀於明倫堂講五經性理擇諸生輪講親為剖要難嵗丁亥儀封張孝先先生撫閩開鼇峰書院延九郡名宿修書講學邑士被選者九人儀封公每嘉歎曰漳浦多士令君之功也公又嫉邪教之害正拒天主教不使入境俗有所謂無為教者籍教堂四所改為育嬰堂肄業舍親毁城東淫祀像鞭之以解衆惑嵗戊子制撫以南靖難治調公南靖浦人扶老攜幼數千人泣送數十里公揮涕遣之治靖一年內擢刑部福建清吏司主事逐舞文吏晉廣西道監察御史巡視西城懲左道捕姦匪威明大著上書陳臺灣事宜謂臺灣土廣滋姦往臺人民宜加盤核各縣不得輕給一照鳳山諸羅兩縣宜歸本治不得聚郡城換臺兵丁宜嚴頂冒杜日久驕橫之漸又疏陳沿海歹船非挂號稽察所能斷絶商船利走外洋無礁嶼便晝夜兼行風利帆駛難攔劫若從沿邊迂回挂號賊遂得截劫於必經之地至巡哨之船當以南北風信為準不得泛行分汛又陳弭盜之䇿上覽疏嘉納至今環海商民每食必念曰省我挂號一節陳公力也五十一年冬海賊陳尚義遣周錦赴兵部投就撫狀公在浦時知此賊係海中之魁因摺薦孝廉阮君蔡文等同往撫至盡山花島得之並招餘黨百餘人而海波靖以總憲趙公申喬薦晉通政司參議奉命賞賚湖廣緑旗兵丁事竣由鴻臚寺卿遷大理寺少卿會陜甘荒歉上命同工部侍郎常公查勘行至乾州見途有殍抱疾日馳百里至平涼出所貯倉穀及鎮原倉米如飢民口數給之六月二十五日晨興呼衣被體瞑目而逝是時上方注意公公感知遇凡所經歷留心察訪其使於楚則以楚擾於苗深入三箐坌口等處窮苗窟形勢相施州衛天樓山要地溯當日陸梁情狀及至秦下車親詢疾苦於耕種畜牧地留心劄記將以圖久安長治之策歸報吾君而無負所學也未竟厥用享年五十七以死勤事天下聞而悲之公之學從劉念臺人譜入未嘗榜以道學之名而修己行政有本末戊子冬世逺侍先君子主教鼇峰書院公貽以書曰為學要在力行求實用若論派别則漳浦如髙東溪陳剩夫周翠渠黃石齋亦各有宗旨也世逺心識之孝友純篤每念母楊太夫人中年早逝兄弟多夭傷言及輒嗚咽流涕待從兄弟如手足培植俾各成立歷世祭産儉薄廓而增之好賢奬善勤懇如不及遇緩急悉心力謀之人見其樂善好施不知其宦橐蕭然至今尚未能營一椽也公令漳浦時世逺年方十五試童子隊未幾補諸生公課時藝古文皆第一以國士遇我序我詩文而刋之己丑余官翰林公以次年入補刑曹相聚都門重請舊業世逺隨以省覲假歸公竟使秦以卒與邑人哭於月湖書院月湖者公去任時所搆也今置有祭田邑人士奉公如生云公初任漳浦敕授文林郎五十二年誥授中憲大夫娶張氏有賢行先公亡纍贈恭人子一曰本醇邑庠生恩蔭入監讀書博雅敦修能世父學孫男三人長雍熙次雍綸雍縉孫女一人將以某月某日卜葬於某山之陽銘曰刀筆筐篋吏之駘養交持祿非卿材我公家學播九垓烹鮮持斧有餘恢未竟厥用心之摧魂歸魄藏天所培族子載園墓志銘余族子贈奉直大夫諱維坤字星六别號載園生則五世同居沒則遺命建立義田余所亟欲表之以風世者也將以某月某日葬於某山孤廷鎮來京師求銘銘非余而誰吾族自先世忠惠公住居莆陽分派於泉之晉江纍傳至贈文林郎起鷺公生四子長諱琳字伯瑜次諱柟為順德令次諱彬文次諱棻皆食餼於庠伯瑜公早逝卒於粵子諱世煥實生星六時海氛未靖家零落星六方垂髫奮然曰奈何使吾父困於貧遂棄舉子業為居竒計後將有北行道經建寧之浦城民醇朴地肥美居上流勢心悅之遂徙焉故今為浦城人當甲寅之變人皆竄析星六外思戢禍內作生計迎其父母及二弟以居次第謀婚娶不私財賄躬儉約以先之家政聽於二人兄弟且湛嵗壬戌仲弟之婦生男六月而終星六告宜人余氏曰姪猶子也若母見背呱呱之孤何託舍我女哺之可也宜人唯諾即今之登賢書廷鑣是也方伯瑜公柩之停於粵也諸昆弟謀即粵地葬之星六灑涕曰我閩人也身在此忍使祖父寄他鄉費我獨肩之親至粵載柩歸將至前一夕林太宜人夢曰吾汝祖伯瑜公也今至矣已而果然識者以為誠孝所感云伯瑜公之子五人仲叔早世遺孤俱幼星六為之置産謀婚延師誨愛如己子嵗糜金數百無難色族之居於泉者嵗加存問養孤贍貧無怠子於星六為族父相去數百里庚寅自翰林乞假南歸停車二旬見五世同居心重其為人值嫂氏太宜人八帙之辰隨子弟行拜堂上為文以侑觴癸卯奉召入京而星六以是年沒矣享年七十遺命建祠堂以妥先人祠之東設家孰課子弟建義田嵗入五百二十石規條明備可貽久逺子廷鎮等承父志行之噫是可傳矣以子貴贈奉直大夫娶余氏敕贈太宜人子二人長廷鎮以知州需次次廷錦太學生兄弟俱敦謹以孝友聞孫三人孫女二人銘曰孰使之遷孝養兩竭孰驅其貧自天佑吉建祠立田名嫓前賢卜兆於兹以歸其真以昌其後人舒母劉太君墓志銘太君姓劉氏江西進賢名門女性莊靜年十四歸同邑舒封君封君氣魄豪邁不治家人産太君黽勉有無終身如一日事舅姑盡孝舅耄年無齒力太君割左右袵作屨換酒肉為肉粉以進化堅韌為柔脆曲隨所欲舅每感念之曰孝哉劉氏婦封君嫡出也庶出弟二人嫡庶間微有不合太君調護委曲歡好無間撫二幼叔有恩禮後皆婚娶成人成封君為孝弟者太君力也仲氏夫婦早亡季氏亦喪偶太君撫其孤如己子并化熊氏婦能字愛前子熊氏婦季氏繼室也平生備歷艱厄嘗疊遇荒嵗家不舉火追呼猝至封君就繫株及家屬諸子出野間採蕨掇草根樹皮為充腹計吏呌號急太君在危樓驚墜幾隕督諸子先後代拘長子以艱危喪目仲叔亦因以不永年太君每念家門不造艱瘁憂虞朂諸子以績學立品擇交親正人紡績以供修脯薪水需嘗謂之曰為人當學孔孟為官當學乃祖文節公文節公者先朝正德時及第第一人諱芬者也文章氣節為一代名臣云一日謂其季子香曰誕汝前夕夢宅後大水浪湧數層一鯉魚投懷驚寤明日産汝汝勉之吾望汝為偉人不在尊官香今以諸生拔萃遊京師出令江南之靖江縣有廉能聲繄太君教也太君卒於某年月日春秋六十有七子男六人女幾人孫幾人以某年月日將葬於某山香自其治所以狀請銘香在京師與余交余歎其志節不凡又嘉賢母之可風世也因志而銘之曰婦妻與母道分為三總之則一孝義是耽婉娩太君志養劬辛嬉其志意解其糾紛何以誨子玉汝憂戚匪馳祿利曰惟文節公是式子砥厥修惟母之績惟母之績孫子其繩如貯斯冰如櫝斯珵有宏其聲有偉其成勒此幽墟以兆允升先考武湖府君行狀嗚呼不孝世逺等今為無怙之人矣欲狀先君之生平以傳於世荒迷不能執筆又大懼湮先人之德以重不孝爰是灑淚以書先君諱璧字君宏别號武湖漳浦人學者稱為武湖先生始祖蒙齋先生諱元鼎以理學為有宋開先自是代有傳人高祖諱大壯登嘉靖己酉鄉薦任寧鄉縣有惠政曾祖諱宗禹萬厯辛丑進士官刑部郎學為儒宗道南原委有傳祖諱一橙萬厯丙午舉人兩贈文林郎子三人長諱而烜次而烷先後登順治壬辰戊戌進士季諱而煜郡庠生以清德重望著於鄉為鄉祭酒妣林氏及第尚書林公士章之從孫女先君其第三子也先君生有異質九嵗善屬文年二十二補博士弟子員二十五選於庠貢入成均先王父雖為貴介子弟而家素屢空先君苦志讀書饘粥幾不能充癸丑入京時崑山相國方為司成先君兩試第一名重都門人爭知之或勸以官先君南望晨昏淡如也因耿逆之變在京師五年不能歸丁巳夏返里門先王父時避亂居梁山之麓先君授徒資養承歡無闕先君於經史子集多所博覽而四書講解及制義一途研究尤精大全蒙存淺達諸書若近代諸先正講義先君講貫既熟抄定成書可為後學津梁其教人也不費辭説而於聖賢之奧義文章之窽綮纎微畢達曰吾既參諸説涵泳白文以出之自不能多也貧而來學者教之無所吝倡正學而主文風者垂三十年雖屢困場屋而淡於得名四壁蕭然而廉於取利返里門以來聲價日重未嘗通謁一官府嵗丙子太史陳莘學先生涖浦廉知先君名欲邀之見不可越乙酉陳公挾諸友遊清泉寺始造廬一見家居近清泉故也丙戌例授羅源教諭吳興沈心齋先生以書來曰比聞先生秉鐸羅源蘇湖安定之學再見於今矣蓋先生嘗督學吾閩夙知先君名而未曾一見者近代視教職為小官徒應文具先君慨然曰天下之治亂在人才人才之盛衰由學校學校之責任在官司吾其可茍焉己乎教士以器識為先時年六十矣親為講論而評隲其文之髙下諸生服教畏義至有不平處則義形於色為士氣主盟時令君為同姓諱彬者由翰林外改有文學與先君結兄弟之歡而互商其佐理政教所孚人稱二蔡焉逮乞休歸浦之後為祠以祀廣文之有生祠自先君始先君在羅時蕭然寒暑獨以一子二僕自隨丁祭品物親自檢備分所得為者毅然為之如報丁艱一節先君以為此乃人子傷心泣血之時而胥吏因以為利誰無人心者遂除陋規後署教職於候官連江二邑率此行之丁亥六月儀封張先生以中州巨儒巡撫八閩倡明絶學教育人材開鼇峰共學兩書院延致先君使主其事凡四方紳士閎博俊乂良逸者咸萃於斯共相切劘修理學經濟諸書今所訂周程張朱等書六十種行世是也先君素善病年未五十鬚眉皓白儀封公特令總其大綱至於刋校諸事命世逺與諸同人主之嘗注解朱子學的儀封公舉以為式曰第依蔡先生樣其信服類如此儀封公撫閩三年先後考績兩次未嘗薦舉一人獨於先君欲以行誼聞於朝時藩臬金宋二公同心贊之章欲上先君苦辭曰衰老不能陛見且朔風嚴寒體弱不勝也世逺亦以為言事乃止己丑世逺成進士改翰林院庶吉士先君乞歸儀封公苦留之事多咨而後行先君性簡直介潔凡有裨於政事者知無不言未嘗一語及私儀封公知其貧欲有所贈先開其端先君輒自言曰家口少無內顧此間月給足用也終儀封公之任不敢有加於先君恐傷其廉也無何儀封公移任江蘇先君適以先數日歸浦以書來曰書院事宜尚煩先生鎮定勿使三載苦心一旦就荒也先君亟就道往三山整頓如初雖未敢希紫陽文敬之主白鹿洞故事然以人才萃處之地品定其文字而不啓爭端規針其短長而不生怨怒偽者獻其誠慢者致其恭先君嘗自言曰吾一生惟無私可以取信於人嗚呼不其然乎去年秋世逺以省覲乞假南歸其冬始同先君回浦祿養無幾榮封未及猝有今日嗚呼痛哉先君至性孝友授徒三十年未嘗營一田産惟勉力以養二人先王父年八十二事之始終如一喪葬以禮兄弟四人終身未嘗偶爾拂意伯父當有他事盛怒時見先君輒怡然叔父奉先君如嚴師親之如慈父仲父先卒十九年先君撫遺孤如己子為婚娶成人嗚呼父子兄弟之間如先君者可以風也先君教人大都在篤倫理嚴義利曰本此而行之古人不難至論學以躬行為本不以空談性命為高讀書要歸於根柢深厚返求諸身而自得之不以詞章自炫卒之學問既充精微洞徹每下筆度越時流初任學博時例赴撫署應試中丞長山李公大奇之曰儒者之文也置第一以異等薦學使介菴楊公呼為宿老不敢以屬官禮待身不博一第而及門屢登巍科性少作詩古文而門弟子以詩文著者指不勝屈未嘗著語録成書而言行多可法少為嚴詞正色以拒人或時間以清談而及門子姪有不是者惶愧無地自鄉黨族戚以及四方之君子當道之賢大夫人人服其德量而樂道其髙風陳莘學先生擬為黃叔度巡撫張公督學楊公稱為胡安定同郡詹峩士先生比以李元禮郭林宗評論不一其必有以定先君矣疾革之時精神不異世逺等問欲有言曰嗣後茍有餘祿祭田確宜從厚又曰重錢財而輕兄弟我知汝無是也用財有道耳又曰人子所以顯揚其親者孝經志之不徒在爵秩之崇高也時諸婦皆在牀前各呼而告之曰汝等入吾門和好無間言我知之人亦稱汝但恐將來生子長大不免自分藩籬以致乖隔娣姒猶兄弟也汝等戒之又勉諸從兄輩以友愛語極諄切且曰吾今嵗命世逺所作家規以朂我族人者我梁麓一派幸守此勿失也越一日竟逝嗚呼痛哉世逺兄弟三人未嘗有師皆先君教之先君授徒於外三人輪主炊爨嘗遇溼薪火不揚吹之目盡腫先君曰汝以為艱乎我曩時更蹭蹬也經傳子史及宋儒諸書各以次授每日限以工程而使之體認曰返之身心可以寡過措之筆下可以為文如是而己世逺初為庶常時先君手書來曰質直而好義聖人所嘉但下二句不云乎察言而觀色慮以下人英氣不可勝此中有涵養工夫非教兒諂也同年友徐壇長李巨來見之曰謝上蔡用力去矜字即此意也歸侍以來身頗康寧半年之間為嗚珂可逺口授四書講義一遍毛詩説一遍點閲朱子綱目自威烈王起至前五代尚未終編得疾僅二十日遽終嗚呼痛哉先君生於順治戊子年二月初一日丑時卒於康熙辛卯年七月初一日亥時享年六十有四娶先妣陳孺人嵗進士閩縣教諭諱應官公孫女嫺於女教有賢德適先君時先王父貧特甚身多質券先妣妝資近千金不一月間盡鬻以供王父用布素服勤與先君相敬如賓事舅姑益以孝顯先王父嘗嗟悼其婦德不置且曰今人有娶婦入門即私其財物父母不敢問取之或有德色者應愧死無地也乙己七月歸先君次年六月以舉先姊而亡繼室吾母吳孺人太學生鄉飲賓諱天章公女子三人長即不孝世逺己丑進士翰林院庶吉士娶劉氏次嗚珂邑庠生娶王氏又次可逺邑庠生娶黃氏女二人長適貢生朱允泰次配林必藩孫四人曰長漢聘阮氏次三人尚幼女孫三人一許適舉人張諱福昶公子次二人尚幼嗚呼先君倡學敦修聲著閩嶠哀迷之下略述其槩并及先妣之一二大節不可泯沒者附見於後伏惟當代立言君子幸賜採擇以垂永世不孝世逺等感且不朽矣先妣吳太君行狀嗚呼痛哉自辛卯秋先君捐館世逺等幾不欲生猶幸慈母在堂得以朝夕侍養今又見背嗚呼不孝罪戾上通於天矣顧念先慈一生孝行淑德著聞族黨逺近若不灑淚述之將來史志何所據以入傳異日孫曾婦女何所取則焉先慈系出名門世居浦之東埭太學生天章公女也年十六歸於先君時先妣陳太孺人在堂先慈事之備極恭和踰年陳太孺人見背未有出先慈主中饋而潔家政先王父雖貴介子弟而清貧特甚先君從學於胡京巖先生先慈飲淡獨居又時依於外祖母陳門外祖母愛之如己女壬子先君選貢入成均先慈侍王父母居下布時舉先兄三嵗矣先君入都之年又舉先姊同時而殞甲寅遭耿逆之變飄蕩靡寧王父母饔飱不給終日不舉火以為常季父走來相依時奉粥於王父母王母減食分先慈先慈不忍食又終日不粥飲以為常時山賊蜂起先慈奉王母與鄰黨女婦逃匿山中幸免於難丁己盜烽未息季父走入南勝先慈偕叔母同往未數月王母念之不置遣小傒林春促使歸先慈歸至中途天大雨溪流盡漲林春又幼小先慈顧念子女俱喪先君在都五嵗少音問窮餓播遷濱死者數今又阻漲自分必死坐寐之間忽有神女聳立言曰汝其未可死也先慈禮拜神下答須臾遂醒有兩壯夫持空竹兜來林春呼之許以直亂流肩以行得不溺既至王父母喜甚是秋先君自都門歸戊午舉家姊壬戌世逺始生先君績學名德為都人士所宗授徒於外先慈上奉尊章柔甘和旨以進承顏悅志無所不得其歡王母晚年多病三載常在牀褥躬進飲食浣滌服器諸承事老人之事久而厭難先慈益加誠備王父屢嗟歎述之憶丙寅嵗先慈舉妹不育先君自書舍走歸曰乳當留以養母先慈乳飼將一年此亦孝養之一節也丁卯秋王母沒越數年王父又在衰病中先慈所以事王父一如所以事王母者時世逺己長嘗與季父及諸從兄更番奉侍無不共歎先慈之孝誠敦摯久而彌篤也己卯春世逺補弟子員伯父走入堂上高聲向先慈言曰汝善事翁姑故天報汝以此子王父聞而答曰世逺之母賢且孝造家之福實由於此吾將使之正位於內告先君先君辭先慈謙讓再三既而王父纍命外家陳氏亦屢為請先君曰請俟兒子成名而後圖之孰知是夏王父又捐館回思半生艱辛服勤無少止息而先君又善病日以厪先慈之憂自是氣體亦少羸矣嵗乙酉世逺舉於鄉丙戌先君選得羅源教諭兼主鼇峰書院己丑世逺捷南宮選庶常庚寅乞假趨省先君時己告休奉王父遺命延諸族戚偕先慈告廟正位成先志也辛卯秋先君又見背先慈率不孝等哀號備禮癸己襄葬事猶步行至塋域爾時筋力未甚衰也甲午世逺服闋入都是秋可逺舉於鄉是冬先慈遽得風疾左腳須曳地而行乙未世逺自都趨省侍養數月精神稍進中丞雷陽陳公委員奉幣延主鼇峰世逺不欲離膝下先慈勸之行曰汝父主鼇峰今又使汝此亦勝事汝其行乎且地屬本省可以不時省我也世逺勉為一行不數月辭歸侍養日在膝前先慈屢為述先世舊事及誨朂以居身本末丁酉秋鳴珂又舉於鄉偕可逺赴公車拜辭膝下先慈誨之曰兄弟如一人不可分畛域也世逺又叮嚀私囑曰母氏衰年汝兄弟朝夕四拜祝天祈延年壽考即匆遽不可一日忘也行僅半月風疾又起先慈忽語世逺曰我若不幸汝毋多製衣衾宜省一切費但須汝兄弟同居合爨永無私營以和凝一家而己是夜雞未鳴言語不清醫療治無功隨遣人追兩弟疾轉劇舉家哀求俟兩弟至不得竟以十一月二十九日終於內寢逺近族戚以及鄉之女婦老少哀號奔赴者數百人皆曰太君有賢德何舍我去也越十日鳴珂可逺始至嗚呼痛哉先慈一生艱貞勤勞少而播遷長而遭亂及老又纍於足疾年未既耄號留不得豈非不孝罪戾上纍吾母哉嗚呼論壼德者動云勤儉世逺竊謂勤儉乃居室之常勤則恐鄰於猥瑣儉則恐傷於刻薄先慈勤以養舅姑而家政不墜儉以理家務而奉養賓祭從豐善體先君之志故先君生而主教鼇峰為全閩師模楷當世沒而祀名宦祀鄉賢爼豆學宫多先慈內助之功也誨子自家鄉以至居官諄諄告以大義常曰汝等須誠以物躬謙以待人廉以養德毋以詐御物毋以氣加人毋取一毫非分之有世逺每有錢財入必從容問所從來告以故始帖然曰吾欲汝等食菜根無忘先人遺訓也平生無疾言遽色其於人也化而不怒勸而不拂治家有節制而好施與有無緩急委曲以將仲父之子三人長未有室令世逺經紀之仲母叔母之喪先慈各傾資助之米鹽相分以淡泊其篤於親故類如此世逺奉先君遺命大宗小宗各置祭田若干而家槖蕭然先慈喜曰吾最惡夫先私而後公者雖富奚羡焉更有難者世逺少侍先慈見艱辛萬狀及兄弟三人相繼得科名無幾微見於顔面待諸族黨及臧獲婢妾益謙和無異往時蓋其孝愛之德出於性成而謙牧根心歷始終貴賤無少間殆孝經所謂愛親者不敢惡於人敬親者不敢慢於人歟郡守柏鄉魏公廉知其德嘗贈以扁曰陶歐淑範嗚呼世逺兄弟烏敢望陶桓公歐陽文忠公之萬一然以先慈方陶歐之母恐有過之無不及也此豈人子之私言哉先慈生於順治癸己年十二月十五日己時卒於康熙丁酉年十一月二十九日申時享壽六十有五男三人長不孝世逺己丑科進士翰林院庶吉士娶劉氏次鳴珂丁酉科舉人娶王氏又次可逺甲午科舉人娶黃氏女二人長適貢生朱允泰次適庠生林必藩孫男七人世逺出者三曰長漢聘阮氏次長澐未聘次觀瀾聘沈氏鳴珂出者二曰長洲長潤可逺出者二曰長澳長洖俱未聘女孫四人世逺出者二長許適舉人張諱福昶之子次尚幼鳴珂出者一可逺出者一俱未許適嗚呼人孰不欲顯揚其親之美然溢美者不足以徵信於人人子之心亦有所不安若先慈之懿德休光積而彌耀必有重邀帝庭之褒寵者哀迷之下略述其槩伏冀大人君子錫以鴻文垂之永久感且不朽亡室劉夫人行狀嗚呼吾猶及見先太夫人之事吾王父母也竭誠盡孝秉義勤家族里稱賢焉夫人適吾門為冢婦雖不能嗣厥徽庶無大忝今其沒矣節其可録者以寫余之哀思以遺諸子孫以託於立言之君子而圖其不敝焉夫人姓劉氏漳浦望族外舅諱伯爵績學篤行為名諸生夫人其長女也自少端靜肅敏年十八歸於余余先世雖多貴仕然舊家中落諸井臼米鹽凌雜事夫人皆躬自為之先太夫人時猶健不忍其獨勞也每分任焉夫人不忍以纍姑有所操作常不敢令太夫人知越數年余仲季二弟既娶婦夫人仍率先偕勞勤睦無怠康熙丙戌嵗先君贈侍郎公任羅源教諭次年巡撫儀封張清恪公延主鼇峰書院夫人時時手治脯修飴果寄奉先君甘之己丑余成進士官翰林弟輩欲為嫂氏買一婢夫人止之曰君家羣從過期未娶者三人吾且未可畜婢俟為經理有室而後圖之庚寅冬余乞假省覲先君適以是嵗乞休自省會隨侍歸家夫人喜曰吾庶得盡敬事之忱矣先君體素羸病肺夫人多方和滫瀡以進晚嵗轉健承事將二年甲午冬先太夫人復得末疾艱於動履余自京歸省夫人抑搔扶持膳飲隨所欲夜則與兩弟婦更番奉侍凡四年不懈益虔凡可以得舅姑之心者將忘其身之勞力之匱而為之也兩經大事相余盡禮哀毁致瘠以終三年素未嘗讀書頗知大義最惡夫兄弟娣姒間有私利心爭小忿以致乖隔者吾兄弟數十口同居合爨凡祭祀賓客日用之需皆夫人主之不辭勞匱不有私積待娣姒無遺言亦無忤色庶可謂克守先太夫人之教者歟性好施每約己以濟人從嫂三人寡居夫人承余意月各給米一石嵗以為常族黨緩急黽勉相資雍正四年漳州大飢家中買米以食每爨必多煮米湯里婦酌取救飢賴以不死者多人余以雍正元年蒙聖恩特召由庶吉士授編修趨直內廷旋升侍講夫人恭遇覃恩誥封宜人五年余官內閣學士兼禮部侍郎荷特恩上贈曾祖祖父夫人亦晉封夫人以是嵗來京每語余君受恩深重宜始終清苦勉圖報稱吾故能食貧布素粗糲不足異也次年生一女欲為覓一乳母夫人曰家無恆産食無贏餘吾六男二女皆自乳今豈易吾素哉待妾媵有恩第五男長潔側室陳氏出也撫之一如己出馭僕婢不加呵斥感其仁少欺慢者每勸余勿怒詈臧獲曰毋自損氣懲其甚者可耳與余相莊未嘗失色事必請而後行凡吾意所欲者皆能先之余性濶疏加以奔走馳驅家居日稀凡所以使吾無失養於父母無失歡於兄弟無失和於里戚者夫人有力焉臥病兩月太夫人忌日猶清晨強起拜跪如禮力止之曰吾念先姑烏知病在身乎除夕前自知不起適余弟衍調將官粵東道必經漳浦夫人謂之曰為我謝諸族戚在家歡聚來時祖餞今不能相見也又曰我未來京時汝先官京師皆分俸與族戚我來則所分甚微費用多不能自贍遍布此心非我吝也誨諸子云毋私利心相歡至白首也誨兒婦云口與心一誠以行之娣姒和則家道昌向二側室云善視吾子誨次女云汝性寬良適人門益加修謹可無咎戾但綜理內事毋縱弛也檢篋中匹帛曰為我致吾父善自保護老年無過慟以慰吾幽定靜周愼其可謂不亂者矣嗚呼自余蒙恩入直卯入申出十年來未嘗有一日之間夫人病臥牀褥四月於兹雖勢屬彌留猶屬余服勞王事朝夕虔恭勿以吾故趦趄不進是日黎明謂今日且留永訣延至日晡而逝嗚呼痛哉吾自翰林歷官九列二十餘年庖無肉食衣無絲帛夫人隨余三十二載勞勩於晨昏鞠育之間懇欵於妯娌族黨之際既貴受封朴質敬忌退然如不及未嘗受世俗一日之享年未五十竟殞其身是則可哀也憶先君在日有譽命曰孝哉婦先太夫人疾篤時亦曰婦孝願得賢兒賢婦以報汝父母之言孰則有間誄其善行以賁於九京死如有知將從舅姑於地下以庇佑子若孫其庶云視履其旋者歟夫人生於康熙甲子年十二月十一日寅時卒於雍正壬子年正月三十日申時得年四十有九子男六長長漢巳酉科舉人娶阮氏庚午舉人臺灣副將諱文女次長澐郡庠生娶吳氏山東濟東道諱興業女三觀瀾太學生聘沈氏丙戌進士現任刑部主事諱一葵女四長瀜太學生五長潔六長注女三一適乙酉舉人長洲縣知縣張君福昶子壽蘭一許配福建水師提督諡襄毅藍公廷珍子世襲阿達哈哈番日寵一尚幼孫男二本榮長漢出來長澐出夫人來京後所生女極聰慧年四嵗先夫人一月而殞斯以增其悲益之疾乎嗚呼善不遺私故録其順行以紓余哀瑣屑覼縷不自知也仁人君子有發其幽光以嘉惠其子若孫者感且不朽二希堂文集卷九
