body:
  text: 二希堂文集卷六禮部侍郎蔡世逺撰周起元傳修漳州府志作故依史例稱名周起元字仲先號綿貞海澄人萬厯庚子解元明年成進士初令浮梁有大姓欲侵范文正雙溪書院起元持法不阿士論重之調繁南昌凡盜寇發他境匿在宇下者悉捕得壬子授湖廣道御史奉敕巡漕振滯疏壅公私便焉時臺臣有上疏攻東林者起元抗疏言東林之學起於楊時今議者欲借道學以攻楊時借楊時以攻羅汝芳顧憲成皆非是劾去朝貴數人而方從哲以中旨起少宰不由廷推又疏駁之左遷出參粵西值栁慶大飢盜賊蜂起起元立遞運法多方處置民以無殍而盜悉平擢四川副使未任備兵通州紀律大肅客兵過懾不敢譁晉太僕卿時鄒南臯立首善書院兵科朱童蒙詆為偽學起元抗疏辨之明年授僉都御史出撫江南初為御史時稅璫髙宷在閩橫征海舶洋貨脅官吏燒殺市民莫敢言起元特疏紏參之中璫久已側目至是吳中織造太監李實以郡丞楊薑不行屬禮誣以罪起元三疏救之實假上供為名逆取舊額外多至十餘萬又密偵富殷户揑為匠籍吳中大擾起元屢疏參劾前後所上轉加切至而內監魏忠賢以天下官吏方承順意旨稱功德趨赴恐後起元獨每與其黨類齟齬阻其威思有以殺之會朱童蒙由科臣外轉為兵備多內援驕橫斃漕卒非法吳民閧聚生變起元勃然曰天子命我撫民察吏可坐視此等虐吾民邪疏上中旨擢童蒙太常削起元職放歸里周順昌贈以序曰公去名益髙矣吳人無老少皆隨送涕哭聲塞市童蒙既竄身璫黨起元歸羣凶意猶未厭嗾科臣李魯生劾起元借講學為名與髙攀龍周順昌等朋比刺譏濁亂朝政取李實空印本至京令李永貞具草誣起元阻抑上供冒破鼓鑄逆璫遂矯旨與髙周等七人同逮緹使至漳漳士民大驚呼設木匱於郡四門投錢不數日錢滿復擁諸緹使相率泣言周中丞寃且貧緹使亦心服加慰護至都下獄拷掠備至致贓十萬遂與髙攀龍周順昌周宗建李應升黃尊素繆昌期先後俱死所謂後七君子者是也崇禎元年贈兵部侍郎諡忠愍特祠於郡學之西春秋致祭又允御史袁鯨請與楊左六君子同建祠京師而吳之閭門及清涼山江之右粵之西浙之西湖亦各有祠論曰吾鄉明季周起元黃道周皆以死著道周批逆彈姦盡瘁捐軀固其所也起元之死可哀哉劾璫糾朱為民請命乃與楊左髙魏十三君子後先死於獄有明二百餘年元氣至是盡矣起元之學不欺為本以稚圭君實自命歷官所至皆有政聲撫吳時江南大水上六疏賑災免漕吳人至今思之嗚呼又何其經濟名臣也黃道周傳修漳志作黃道周字幼平號石齋漳浦之銅山人少負竒節以孝聞當神廟時天下乂安道周見儒術日下皇綱不振憂天下將亂年十四慨然有四方之志不肯治舉子業抵博羅謁韓大夫日纘韓家多異書得盡覽所未見嘗即席酒酣援筆立就數千言名大噪天啓二年第進士選庶吉士歷編修監修國史實録故事經筵展書官奉書膝行道周謂膝行非禮也平步進魏璫目懾之不為動未幾乞歸葬父北山結廬其下所謂石養山者也旋丁內艱服闋還朝崇禎三年典試浙江以神宗實録成晉右中允明年冬故相錢龍錫坐袁崇煥事逮治媒蘖者且興大獄天子怒不測道周草疏救之貶秩鐫三級而龍錫卒得減死科臣有銜道周者托浙江典試事蜚語上聞疏乞休許之瀕行上小人勿用疏蓋指輔臣溫體仁周延儒也上怒削籍還浙江學者聞道周至則大喜為築大滌書院而稟學焉留數月乃去歸石養山日展拜墓左如新喪時踰年以有司請講學於郡治紫陽祠門人自逺至者可千人乙亥起補原官丁丑分較禮闈隨具疏乞休不允時方久旱五月內繫兩尚書道周疏請慎喜怒以回天意六月又上疏曰陛下下詔求言省刑獄然方求言而建言者輒斥方清獄而下獄者旋聞當此南北交訌奈何與市井細民申勃磎之談修睚眥之隙乎時溫體仁方招姦人興東林復社之獄故道周言及之晉左諭德掌司經局疏陳有三罪四恥七不如語時鄭鄤方以杖母被大詬道周言文章意氣臣不如鄭鄤上得疏愕異令自陳嚴旨切責道周孝謹風節髙天下而嚴冷剛方不諧流俗大臣多畏而忌之時方擇宮僚楊廷麟馮元揚並推道周閣臣張志發當國摘其疏中不如鄭鄤語為口實擯道周不與同僚遂稱病乞休不許遷少詹事侍經筵會鄭三俊下吏講官黃景昉救之道周上疏推奬旨下切責再疏以支飾譴道周前有疏纂述洪範月令等書未就乞寬假數月去有旨得卒業時楊嗣昌奪情入閣陳新甲奪情起宣大總督方一藻以遼撫議和道周草疏分劾同日上之上持三疏不下召對平臺上疑其有所為而為道周方奏辨嗣昌從旁托鄭鄤事詆道周道周奏大臣聞彈義當退避未有御前爭辨不容小臣盡言嗣昌則佯謝請去上因曰爾言不如鄭鄤何也對曰臣言文章不如鄭鄤耳又曰爾言陳新甲走邪徑托捷足果遣人行賂耶道周言人心邪則行徑皆邪上又曰喪固凶禮豈遭喪者盡不祥之人乎道周曰古三年之喪君不呼其門自謂凶人不祥故兵禮鑿凶門而出奪情在邊強則可在中樞則不可中樞猶可在政府益不可駁問久之上因曰少正卯言偽而辨行僻而堅不免聖人之誅向以爾為偏激不圖今日恣肆如此一生學問止成佞口耳道周叩首伏地請辨忠佞二字上曰非輕加汝佞但所問在此所對在彼非佞而何叱之退御筆榜朝堂示戒貶江西布政司都事未任巡撫解學龍以道周才堪輔導薦上怒疑為黨削籍逮治詞連黃文煥陳天定董養河俱下詔獄户部主事葉廷秀太學生塗仲吉先後疏救右納言馬思禮左右仲吉並杖戍道周繫獄時吏目奉紙筆乞書道周為書孝經百二十本在獄兩年感明夷事著易象正方草十二圖錦衣校徴急道周恬然謂曰俟吾畫一圖成就逮耳擁之去至北寺與仲吉廷秀對簿受械鞫廷秀與道周實未相識囚服從容交揖通姓名次及學龍相對噫嘻時姦黨必欲殺道周尚書劉澤深等謂道周不宜以建言誅得遣戍廣西既而嗣昌敗周延儒蔣德璟乘間為上言得免戍復故官疏乞致仕歸講學於邑之明誠堂及江東鄴山郡邑有司逺近卿大夫士畢至凡一再會而燕都變作福王南渡以少宰召晉秩尚書陳進取九策時馬阮亂政正人如劉宗周薑曰廣輩多擯不録自請祭禹陵夜泊龍江夢太祖髙皇帝至厲聲曰卿竟舍我去耶對曰朝廷舍臣非臣舍朝廷既報命乞歸而南都陷舟次桐廬遇唐王相得甚歡陳四通四塞三師八友之議至福州遂首政府時政歸鄭氏將帥觀望無肯出死力道周憤自請督師攜數諸生出信州會七建及江浙諸門人子弟之兵可四千人餉絶多亡走出師救徽見卒千二百人馬十匹持三十日糧行至婺源徽已破師遂潰被執七日不食不死復進水漿至留都分縶諸從者獨幽禁城改繫尚膳監夜聞鐘感舊事得絶句百餘首益悲憤不食十四日猶不死時統兵大帥日夜遣客勸降故獨寬其桎梏加殊禮使得從容賦詩作字奕棋如是者三閲月三月五日騎擁過西華門坐不起曰此與髙皇帝陵寢近可死矣方刑時從者跪曰公方萬年契濶請以數語遺家乃裂襟齧指血大書曰綱常萬古節義千秋天地知我家人無憂及門蔡春溶賴繼謹俱漳人趙士超侯官人毛玊潔六合人繼至過曹街抱其頭哭曰師乎魂其少須吾即來矣四子同時就義傳首至徽及門陸自巖以千金購得之合身首殯金陵越數載長子霓與門客趙子璧往扶櫬歸葬先人墓側初道周未第時渡釣龍江舟覆溺焉恍惚見一人前導至一殿額曰倪黃館選時元璐名第一道周第二一死北都一死南都出處始終若前定然著述甚富奏疏經解詩文旁及天文厯數共四十餘種洪範明義月令明義儒行集傳緇衣集傳四部懷宗時已進御覽其易象正三易洞璣孝經大傳詩記表記集傳五部及榕壇問業大滌問業已刋行於世惟易本傳詩表春秋揆疇象在梁山孝經外傳解齊環在大滌孝經傳三禮定本懿畜在榕壇或存或亡多不傳又有易命詩晷正春秋表正墜於婺源門人洪思作收文序求遺書而參正焉奏疏詩文數十卷尚未刋行論曰道周學貫天人行本忠孝入則言朝出則守墓講學著書清修自飭金陵一節堪為殿後矣古今名人志士傳者何限要如文章道學經濟氣節大都微有專屬道周負其聰明氣岸直欲兼之古文不循史漢八家詩歌不步漢魏唐宋而博奧黝深雕鏤古健風骨成一家矣論學宗旨於程朱精微未能洞徹要非可以博雜譏之天文厯數推驗無差幾與康節季通相伯仲他若論列人才敷陳軍國大政其呂獻可李伯紀之流歟晚乃自收成局以文信國終焉嗚呼可不謂竒人完人者乎六合賀進士鳴諧至京師訪鋐於海淀直廬相與讀二希堂文集至石齋黃公傳起而言曰傳中毛君鳴諧同里人也明季以歲貢生任福建某縣丞同黃公殉節於江寧載在邑志不知其為石齋門下士意宦閩後慕石齋之學術人品而執贄歟邑志名至潔今傳名玊潔點畫之訛當時或承寫偶誤夫忠臣義士豈計後世之傳名而後之人惟恐其傳之不真此秉彜之公心也未敢率易附識於此受業雷鋐謹識張若化若仲合傳修漳志作張若化字雨玊號蒼巒世居漳浦之丹山弱冠師事黃道周得聞明誠之學旁及律厯經綸諸務靡不淹貫崇禎丙子舉於鄉兩上公車不第而弟若仲以庚辰捷南宮因留京師時道周以言事下北寺獄若化青衣小帽雜厮役中時時進獄問起居左右之燕都陷唐王入閩徴拜御史數月乞歸事父母以志養食貧茹苦嘗搗柏葉以代園蔬諸孫嘗之喀喀不下咽若化茹而草焉山居四十年足不及城市未嘗以姓名通有司勵志獨行不標講學之名疾惡守義凛不可犯雖骨肉至親不少假而惻隱所周悉力於人者不少靳時值兵荒盜賊蜂起羣相戒曰慎勿犯張公廬鄉人依以避難終其身盜不入境丹山在羣山中巉巖阻絶日夕雲霧往來茅茨數椽上漏下溼豺虎交橫時曳杖孤往登陟羣峭徜徉泉石嘯歌自得人咸異之年六十六正襟危坐無疾而終子士楷能繼父志隱居不仕潛心性命之學稱儒宗焉張若仲字聲玊號次巒生而韶秀讀書明理以不欺方寸為本嚬笑不苟作止語默持之以敬若性成焉崇禎丙子與兄若化同舉於鄉庚辰成進士例選州牧性廉靜不願任煩劇改授益府長史居官清儉簡貴以禮匡宗藩請崇寬大戒嚴切不納以去就爭之益藩為之改容以母病乞休歸母殁既葬為土室處其傍聞狐兔嘷嘯輒泣下嗚嗚鼎革後山居五十年清修獨善藝圃一區果蔬薯蕷度給賓祭餘悉種梅竹栽蒔灌溉身自為之時蓑箬牽犢飯隴畝與野夫雜處晚歲益務為敦篤飲人以和遇鄉里有爭訟勸之以誠久而化焉邑濱海有蝗起羣飛蔽天觸禾稼草木葉噉盡民多聚泣或泥首禳之獨若仲所居數里內外無蝗患里賴以安時康熙二十九年也歲丁卯秋夜風雨大作所居屋盡拔若仲獨寢地上無恙黎明人視之毛髮為悚年八十四以壽終鄉人稱若仲兄弟為丹山二先生而不名與兄若化同祀鄉賢論曰二張當明社既屋年未強仕草蔬敝廬以終其身志亦苦矣家門穆穆兄弟相師疾惡守義纎微不苟至於盜不入鄉蝗不犯境純孝孤忠天人鑒之黃漳浦以忠烈顯天下二張苦節清操步其後塵論者方之古夷齊夫豈過哉李季豹傳李君夢箕字季豹閩之連城人年十五而孤方是時師役繁興箕斂無藝君煢煢於兵燹艱困之中獨精進學業雅知崇尚朱子一破明季披猖誕怪之習故其為文卓有繩凖既補弟子員食餼值耿逆叛即脫儒冠著犢鼻自屏深處慨然曰長鯨激浪會當暴腮士君子豈宜使波􅀈泥涴耶比大師定閩君乃出歲庚午省試同考得君文以為寸珠片玊而竟不售乙酉始領歲薦性介潔不通干謁自號穩臥先生其教人輒言為善最樂人忽之曰素聞矣曰為之難汝為之否乎繼善成性善之原仁義忠信善之實利善之間幾也善不擇則不明不固執則不能得而弗失問曰其樂何如曰不愧不怍曰孰與孔顔之樂曰熟之而已矣家苦儉然至於施捨則稱力未嘗有所吝或事倡於人亦必竭力襄之曰苟利於物惠無小也能成其惠不必出於已也歲丁丑邑大飢民相聚劫掠有司不能禁過君門則相戒曰毋犯李先生家事兄如嚴父撫姪如子每語諸子以氣質之偏使知變化易簀時謂所親曰吾生平竭力檢身將無有不及省者第言之得聞過而終亦云幸也年八十一神魄清整端坐而逝所著四書訓蒙穩臥軒詩文集若干卷論曰余見君仲子孝廉圖南京師嘉其志尚與之語窮理修身之學圖南因備述君之學行而請為之傳余嘉君以諸生獨能明大義戢景藏采於豨奔豕突之時惜乎其不究於用也夏宛來小傳夏君名駰字宛來浙之桐鄉人也少負竒氣岸然不可一世長為諸生試輒冠軍以明經選補教職未就非其好也其學自六經左史下及諸子百家方言地志無所不覽詩若文雄拔如其人好論史古今事瞭如指掌尤喜談兵嘗曰上馬擊賊下馬作露布傅修期真英雄也遊京師公卿侍從若一時名流莫不願交於君然可君意者僅四三人所不可者不肯投一刺雖請輒不往歲已未朝廷開博學宏詞科大臣以君名應薦適有竒禍鈎連事頗急比部遣吏督索君怡然就道神色自若及庭訊首事者係髙官大爵一時俯首喪氣叩頭伏地求哀君束帶朝衣冠巋然立呵之跪不肯曰某無罪也法司素聞君名優容之卒得白先是君被逮時頃刻草數千言獻當事詞意激昻不肯一字低眉權貴適值其人外出門者詰之君曰第存之爾公來示之可也其風節矯矯類如此然博學宏詞之試卒以是不得與晚年客遊秦晉名益重詩文價益髙以金帛酬者甚衆性豪蕩曠達美丰儀立身行事以古人自期名利生死一切不以動其心嘗曰求名而先喪名吾不為也朋友有過必面折憸鄙者痛絶之所著有詩文集行世然君竟以才大不得遇年六十餘卒於家蔡子曰余在邵武浙西人為我言宛來生平逸事甚悉宛來可謂英偉不羈之士也寧拙無巧寧疏無諂寧窮困無聊勿毁方喪已以得時譽可不謂拔俗矣乎惜其自命止為曠達文人耳古來抱負雄竒不知沐浴儒先以道德為依歸往往類此士固不可不辨志哉阮道泰小傳阮道泰字志同漳浦人父諱文即吾友阮君子章也中庚午鄉薦至性過人倜儻有大略天下莫不知有阮子章者奉旨賑濟漳泉招撫海寇陳尚義於盡山花鳥得之擢授陸涼州知州宰相安溪李公薦其有文武才改水師參將以亷能著聲臺厦又用薦授福州副將未任而卒道泰其次子也道泰少而頴異孝友異常兒阮君負四方之志家居不暖席道泰獨與兄奉母劉夫人夫人性嚴謹出入必告時有譴怒必長跪竟日兄道宏前母張夫人出也道泰無大小事悉聽命於兄有問以私殖者不應嘗曰兄弟合食而私異財物畛域如行路遮蔽似穿窬吾恥之交遊多父執處師友間情誼尤摯為人端雅淵靜嗜學過夜分不寐母夫人禁之不能止師友有佳作繕寫諷誦若不及嘗手抄四書大全及先儒講解唐宋諸大家文朗然成誦或笑其自苦不厭也阮君以陛見卒於宿遷訃聞號痛幾絶每念父負天下才賫志以殁益自刻苦樹立承先志肆力於經史為文章綽有聲譽歲戊戌從學我季父於梁山之麓嘗隨諸子姓聽余講論體察津津然余方期以大就曰子章有子矣是秋大風雨壞室廬且半阮君與原配夫人俱未葬道泰冒雨撫柩哀號竟日見者憐之竟以得病時時誡其兄謂父以科目起家歷階文武兄能讀父書弟死不恨堂上有母善事之病革命兩奴夾掖欲以拜母夫人夫人急持之道泰亦竟不能起泣且言曰兒不孝不能長侍膝下負吾母兒死之後乞以青布衫一襲為斂勿用繒帛重兒罪也浦人聞者皆流涕其兄至今語此猶嗚咽不能言也卒時年二十二蔡子曰余見年少有至性輕利嗜書若必進以宋儒之學窮理修身之要鄙薄中人黠者難馭録録粥粥者又無以自振顧安得盡如道泰者與之興古砥俗哉使其未死尹和靖徐仲車之流亞也陳少林余之畏友而道泰之婦翁也亦以吾言為然劉先庚傳先生姓劉諱丁字先庚始祖雲逸公自宋南渡後由玊山徙居南昌十數傳子偉公分居黃堂又數傳諱一琮天啓間歲貢例得補職聞魏閹祔文廟議以疾辭崇禎時乃就山陽訓導生昺昺生先生少失怙恃年十三即知向學五經史漢諸書皆手抄録深思默識期於有得曰學非徒論説也為諸生五十年未嘗一日去書凡天文地理典制音律醫卜皆洞晰原流尤邃於易每曰三才萬物一理應感眼前日用便是圖象此不得以傳注拘也言動造次皆有禮法正襟端坐雖夜分未嘗欹側立教在氣質上提撕講讀竣則以整齊嚴肅收斂精神為第一義就學成材者甚衆家居早起必奉先展拜拜畢以次同堂肅揖得時物必以薦曰吾不及事吾親忍先嘗乎祭先虔肅致齋禮器親自省視家嗇於財而好施族中有貧不能贍及婚葬無資者以館穀分給計無所出則纍日不懌子弟燕見讀者必問誦習若何耕者收穫若何勤則慰勞之或不副所望則曰奈何荒本業而嬉性渾厚不言人過有譏議前輩者應之曰彼好處甚多何不齒及其人悚惕無所容嘗曰吾生平無他長惟不肯為巧捷行不敢驕人所不知如是而已當鼎革初鄉為盜藪所遇無脫者盜詢知姓名驚曰君子也遂不犯金聲桓王得臣下江西人方倚之先生適郡城還密語所親曰忠信衆之師也恭敬位之表也誕則失民驕則無上斯人久此南昌其塗炭乎後果以叛伏誅有鄰人子被父譴出訴於外塗中望見公趨而避曰我不敢見劉先生由此改行故人子有充縣役者色張甚見而詰曰何至於是其人疾走強挽之不得自是退役有患讀書成疾者答曰豫年十八得血疾痛自懲治三年而平復三十而壯五十精神倍少時人七十如故此節欲效也以康熙三十一年卒享年七十有二先生制藝本經傳出入史漢古文以馬遷昌黎為宗詩倣工部無明季龎雜之氣同時名宿若袁崇熹徐世溥龔仲洙劉飛池皆以文章相切劘者也鄉試凡十八皆以用古被黜自訂制藝二百餘篇所著有詩古文八卷家居便覽歷代典略正學粹言藏於家論曰南昌之先有徐孺子者峻節髙風當漢末寇盜充斥時相戒不犯徐先生境先生得無類是乎江右風俗淳朴有明一代尤多真儒先生醇行隱德著作如林豈得僅以文人目之哉晚年得一孫名之曰紹聞曰吾不及教僅耳吾訓而已即今給諫吳龍也夫前輩風流得其一二皆可以淑身而善世况紹聞乃祖者詩曰昭兹來許繩其祖武是文孫之責也夫齊汴子傳齊君汴子名以禮進賢縣人汴子其字也先世某以給諌顯祖汝猷父之千皆名諸生以古文詞擅長汴子少而頴異年十二應巡撫馬公試第一江右有能文童子之稱年十四補博士弟子員治舉子業十八讀性理知學古貴於窮經讀書將以致用所學惟先儒是程再讀四書內外注曰向者幾為舉業誤返之於身作文在是矣徒以供作文用兩無得也讀六經究觀大義旁通百家俱有條理江右為正學名區汴子慨慕前修心追而身體之有所知即見之行薄夫記誦講解而不切於用者性孝友年四十依依父母旁不忍一日離離則每夜驚魂不寧親在未易三四宿於外也同母姊三人庶出弟四人親愛無間長姊次姊沒凡二十餘年甥來必對之泣下三姊家貧周之三十年不少懈誨甥如已子父沒後誨弟授以程朱讀書法不急近功務令通貫融洽心理開明然後為制藝居喪襲斂奠祭一遵家禮不用僧道三年寢食喪次朝夕奠必哭鄉人化之者過半近宅有魚池山地公之於衆畜魚種樹春夏禁之秋冬利用山田苦水涸出已資築隄數十丈變磽確為肥美鄉族利賴焉汴子家不貧以不善治生好施舍漸零落然行之益力五服之親無能家室者力為成之助以生計孀居旁親授室以養併其子女字之門户整齊嫡庶雍穆喜交正人相依如性命雍正甲辰舉於鄉兩上公車不第以相國髙安朱公薦授瑞昌縣教諭同人為之怏怏汴子怡然曰即此職便難稱風化之本人才之基豈易易事涖任僅五月士習一變學制一新諸生事之如安定之在蘇湖也病革潘生李生左右侍沐浴端坐而逝年四十八歲蔡子曰江右劉君吳龍舒君香嘗為我言汴子生平行事甚悉求為作傳吾閩雷鋐與交語余曰齊汴子至性過人力行可畏嗚呼如若人者豈徒鄉國之士爾哉僅試之教職未竟其施用以死可哀也夫甲辰會試汴子卷在余房余未曾薦之主司評語深期以逺大之器汴子顧不余愠反述於人且欲來見以余在海淀不果嗚呼其虛懷可挹也其方進而未止者與朱貞女傳節孝朱貞女江西髙安人今冢宰公軾之長女少司空李公鳳翥之家婦也李公子家駒實聘貞女未娶而夭云貞女幼惡華綵服加身輒驚啼稍長或以絳總其髮捫得輒擲之地酷嗜書夜偕妹挑燈繹誦不輟通四書小學周易毛氏詩禮記旁及史漢八家動止言笑必以禮不失尺寸王父母父母絶愛憐之時顧而太息曰惜女子也男也將亢吾宗矣性至孝以曲禮內則為的膳飲必躬進父母食必侍立比徹乃去膳少減即惶怖憂形於色暮必手整父母衾席出立户外俟臥乃休晨立户外問安否起乃入事諸母咸得其歡然當女黨宴笑時聞貞女至則寂肅斂容諸弟或嬉戲相訾謷戒勿使知或紿之曰至矣則皆走然貞女和愈婉娩實不知何以見憚也冢宰視學秦中陳夫人歸卒於途貞女痛絶復蘇泣血三年黽勉理家政撫教弟妹勤且周如陳夫人在日歲辛卯李公子登賢書未幾以疾卒訃至家人祕之貞女涕涔涔下曰何等訃也不使吾知者吾知之矣飲泣不食者三日王母冷夫人喻其意謂曰吾知若志顧爾知禮者獨不俟爾父命乎貞女戄然起謝復治食冢宰歸自秦貞女恐傷父心承歡若平日越半載乃申前説曰兒不能常侍膝下矣冢宰以常理譬曉貞女哽咽泣曰大人良愛我兒志決矣三日不食不得已許之旋進請曰行矣將何服而可冢宰曰於禮無之爾裁之以義遂以常服行登舟乃持服李氏聞貞女至舉家白衣冠號慟出迎聲震地鄰里皆雪涕貞女從容謁祖姑暨舅姑如儀適喪次一慟幾絶衆皆雨泣莫能仰視廟見後執婦禮甚備事兩世姑嫜猶在家事王父母父母也家人間往視之則曰歸語大人兒無苦也百年瞬息未亡人待盡而已祖姑熊太夫人疾衣不解帶者三月比卒李公致書冢宰曰我羇京師不能終侍吾母賴冢婦盡孝君女也刻骨難忘矣時縉紳士大夫爭傳貞女事當道欲旌其室貞女聞之請於姑達之李公移書峻拒乃止且書告冢宰曰兒事非中道自行所志而已脫以名加之兒滋恧矣已而不茹葷血冢宰曰何自苦乃爾對曰偶不喜耳然以是終其身冢宰自撫浙後入掌西臺李公亦官京師貞女往來兩家每見內外臧獲庀飭勤肅即不問知貞女至也亡何冢宰丁外艱時以西陲用兵先帝方眷倚奉詔奪情再疏請終制辭指懇激賓友勸阻萬端貞女流涕曰大人不得歸雖官柱國年上壽猶無與耳彼姑息之愛非所以全我父也聖主必鑒吾父之誠矣纍疏卒得歸甲辰元日鄰人不戒於火延燒數百家勢甚烈家衆倉皇遷避貞女端坐室中曰死吾分也吾豈嘈雜蹙􅀢避火求生者衆惶駭莫措逮熊夫人破户入持出之火遽息是夏之季冢宰聞仲弟訃慟甚嘔血不止貞女歸省私泣達旦以是得寒疾不令父及翁姑知又不肯醫藥曰吾女子也吾手何可令醫人疹視冢宰諭之輒云無疾以解弟户部員外郎必階孝廉璂泣請之貞女笑曰我豈畏死者寧死必不於醫人指下生也死之前三日謂兩弟曰吾何求哉吾事畢矣但恨不得終事吾父及翁姑吾父及翁姑反以我死為痛耳又曰我一生未嘗有寸金尺帛加吾身者死無負我既卒弟璂以喪歸合厝於李公子之殯宮時雍正二年甲辰十月六日也年三十有四歲論曰閨門王化之基也余觀朱貞女事可風焉昔孔子作春秋於婦人女子中有秉義守節始終不回者未嘗不大書特書屢書而不一書也隱公七年書叔姬歸於紀何休曰叔姬伯姬之媵也媵賤書者終有賢行能處約全婦道故重録之逮紀季以酅入於齊紀侯大去其國紀侯卒書曰紀叔姬歸於酅啖助曰稱紀言紀之婦也書歸善叔姬之全婦道也又書紀叔姬卒葬紀叔姬賢叔姬皆以夫人之義書之也成公九年書宋公使公孫壽來納幣公羊曰納幣不書何以書録伯姬也季孫行父如宋致女公羊曰致女何以書録伯姬也又書曰伯姬歸於宋晉人來媵衛人來媵齊人來媵公羊曰來媵不書何以書録伯姬也至襄三十年書曰宋災宋伯姬卒叔弓如宋葬宋伯姬蓋是時伯姬之舍火左右曰夫人少避火乎伯姬曰婦人之義保傅不在宵不下堂傅至矣保未至也遂逮乎火而死胡安定曰伯姬乃婦人中之伯夷也王樵曰所欲有甚於生所惡有甚於死一下堂而此足之失不可悔也故寧守義而死也今朱貞女之事可謂兼二姬而有之矣叔姬以媵而秉節不回喪滅之後歸酅以奉廟祀春秋貴之貞女未婚而守節勤家盡孝以全婦道獨不為春秋之所貴乎伯姬以成九年歸宋成十五年宋共公卒又越三十四年而死於火是時子平公立三十三年矣六十老嫠婦猶守保傅之義逮火以死此其事正於貞女合特火息不死異耳其疾篤不使醫者疹視則事異而迹同也左氏以共姬女而不婦劉原父非之以為恆其德貞婦道之至者余謂貞女雖歸夫家猶女子也即以左氏之義揆之伯姬之死過而正者也貞女之死正而非過者也余故曰兼二姬而有之也君子之道過於厚小人之道失於薄不以已之可以偷生而失天下之常義憂戚死亡造次顛沛不以動其心非安於性命者能之乎在天則與日月爭光在人則為女中夷齊此皆聖化之所涵濡河嶽之所鬱積朱李二家又豈得私而有之乎夫道造端於夫婦家人睽必始於婦人易曰正家而天下定言正家之必始婦人也禮曰禮始於謹夫婦所以附遠厚别也言别之厚者禮之至也思齊之詩曰思齊大任文王之母思媚周薑京師之婦思齊敬也思媚和也能敬且和起化之本也貞女不徒以竒節見其和愈誠孝雍肅宜家有古人所難者以此坊民猶有婦姑娣姒之間挾私財爭小忿以喪其良決其間者乎余聞貞女讀書能知大義設誠致行故其節孝章章如此今世之士乃有終日咿唔徒以課文藝取世資雖讀聖賢書漫不知所學何事至有背而馳之弗恤者異日得志又烏能守道愛君敬身勤民為國家有用之學哉此又余平日所苦口疾呼不禁因貞女發其蒙也嗚呼人固不可以不學哉洪烈婦傳烈婦洪氏者漳浦薛燕配性警敏寡言善女工歸薛十餘年夫婦相勞以禮相佐以孝不及事姑事翁以孝聞執喪哀毁如禮遇娣姒和而有節故薛氏一門四世同居共爨雖其世有令德亦洪氏之賢也燕門祚中衰家貧無子嗣罹疾洪氏侍養不離側母知壻病劇來與居先是母來洪氏愛敬甚篤至是辭母令去母微叩其意答曰吾上無舅姑莫責我以孝者下無嗣續無望我以慈者吾死義也母毋復言夫疾既篤粥飲湯藥多不入口輒盡啜或止之曰夫所食也不可棄於地母一日攜蔬相餉盡委之地曰我與壻盡不食矣安置此時長姒吳氏在旁私曰若素孝何遽如此垂淚言曰母愛我我死必念我成疾病今故違禮或減母異日哀也與母謀繼嗣吳氏有男三願以手抱者為繼則佯懇曰幸次者與我稍長易見其成立母以為然憂稍釋暫歸夫病革夜深獨小姑在側紿之去少頃夫沒洪氏為揭寢帳蓋衾自著新履服嫁時衣以帛交頸懸牀櫺而死天將曙小姑叩門無聲擠户入端坐牀中顔色不變呼之不語驚曰嫂氏與兄同死久矣家人相聚而痛曰若生平純孝重節義今果死若得矣其如我家門何哉浦人以其事聞之汪令君將以請於朝而旌表之時康熙壬辰三月初三日也死時與燕年俱三十燕明孝子薛大義之裔孫實行紀之邑志云蔡子曰洪氏上無舅姑下無嗣續死而從夫義也人孰無死洪氏生能相夫以盡婦道夫死則殉之其不亦鮮矣乎方今天子崇忠孝褒録節義有志之士爭自濯磨而我漳浦風教尤勝甚乃及於婦人吾鄉巨儒遺教其來有自亦梁山之正氣所鍾也與孝子薛大義先後並垂不朽偉哉吳烈女傳吳烈女名淑鳳閩縣鹽倉人三歲失父有至性稍長知讀書貞靜孝淑寡母與兄許配於故守備鄭朝子國桐康熙丙寅女年十九未婚也聞國桐病篤積女工直製新衣若嫁狀七月二十四日國桐卒女欲奔喪母止之女曰是母所許嫁之夫也果不得行今死矣母不得已偕往鄭家夫未及斂目不瞑女間衾視曰嗚呼我來矣乃瞑斂畢欲從死母及姑止之遂不食十餘日餓則甚矣而容色無傷也勸之食曰許我死則食紿而諾之女遂食食已復求死衆知不可奪乃許之女正容向夫柩拜繼拜母及姑家人設饌生祭之女怡然受祭答拜訖以白繒懸門一繫而絶時八月五日也夫兄天植天樹皆庠廪邀畫者作同死像懸之靈几閩邑令趙君增為像記制撫各致奠金以其事聞而旌之蔡子曰烈與節不同烈婦難而易節婦易而難烈女則更竒矣國桐從子鳴岐為我言吳氏死時父天樹以次男名煥者為嗣後煥年二十五而亡妻卓氏今寡十二年未有後方議立之嗚呼天將使節烈萃於一門也哉報之之澤正長矣烈女賀氏義婢安氏傳烈女賀氏名千金山西崞縣人貢生賀昆女也世居陽武村自幼貞靜不苟言笑許適國學生郝維藩之子琪維藩年老止一子不幸卒烈女聞訃飲泣不食欲死又念舅姑之靡依也先是同里有狄氏名悟姑未嫁而夫死適夫門立嗣奉養舅姑終身烈女欲效之父母止之曰守節事難終身路逺爾年幼無輕言烈女流涕曰我豈不知但念兒往使二老人終其天年郝氏有後兒願畢矣父亦何所靳焉且我未適人而夫死命可知矣何不使我為未亡人強我使二天也婢安氏者母所養女也聞斯言繩悟姑以贊之且曰悟姑子長名成焉苦哉果行之我當朝夕侍奉生死不負姑梁氏至賀家烈女一見執婦道情辭慨慷姑大喜謂我家無婦而有婦將無子而有子也父母知其志不回許之康熙四十二年四月二日孤車素服望門奔喪至夫家撫棺痛哭易衰絰使歸謂父母曰兒今有家矣復勸舅姑曰死者不可復生母悲傷撫嗣勤家吾責也居兩月孝敬備至乃議立後郝族無同行幼子族人利其産也阻其事不行烈女仰天大慟曰天必欲絶郝氏耶日與安氏出入必偕私相密語舅姑前則好言以慰八月十七夜二人沐浴櫛縰烈女著郝門新衣更常服以衣安氏舅姑衣履及遺父母嫂妹紉針服物各封識雞初鳴猶聞語聲比旦門不啓排户視之烈女左安氏右同梁而絶貌如生烈女年十五安氏年十七邑宰馬侯親為祭奠申報格於例雍正四年奉特旨採訪忠孝節義巡撫石公以其事聞各給帑金建坊以旌之論曰賀烈女義行卓絶抑安氏者尤足竒也烈女許適郝門安氏未嘗許媵也既媵而守節春秋貴之紀叔姬是也安氏並未許媵為其主故也烈女性行孚貞於安氏何所卬須然二人同心同死均足竒也或謂安氏言及悟姑之事有類於好名非也所惡於好名者謂無其實而事不終者也孔子疾沒世而名不稱屈子恐修名之不立安氏見悟姑而慕效之此與志士則古希賢之心何異初欲孝養尊章昌後成立事激中變賀不負郝安不負賀名垂千載不虛矣二希堂文集卷六
