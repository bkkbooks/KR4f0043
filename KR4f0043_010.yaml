body:
  text: 二希堂文集卷十禮部侍郎蔡世逺撰西湖祖祠衣冠功德進主祝文維康熙五十三年歲次甲午正月朔癸卯越十有六日戊午孝曾孫某等謹告於顯先祖考處士訥齊府君妣孺人宣淑劉氏顯先祖考逸叟友湖府君妣孺人慈靖林氏顯先祖考贈文林郎梁嶽府君妣贈孺人勤淑陳氏之神曰繄惟我祖肇基西湖纍善行仁紹開厥後天篤其慶世濟其昌伏惟鄉進士文林郎湖廣寧鄉縣知縣我湖公首開科名賜進士承德郎刑部湖廣司主事震湖公首登甲第早已偕配崇祀中龕世世不替賜進士東昌府推官中石公亦己配享廟中侍祖宗之旁矣而讀書稽古積學力行名標天府行著里族者代不乏人揆禮與情均應列在廟中奉祀配享恭惟鄉進士贈文林郎百梁公贈文林郎賡震公賜進士文林郎桐柏縣知縣升薇公賜進士文林郎行人司行人潤生公鄉進士髙人公崇祀名宦鄉賢選進士羅源學教諭武湖公或登賢書之彥或雋南宫之秀或與明經之選或邀貤封之榮守箕裘之令緒幸繼體之有人品望既隆鄉譽尤著是宜位在東龕列衣冠之祀世世配享恭惟處士丕仰公暨妣徽淑孺人熊氏處士動菴公暨妣慈儉孺人林氏原以繼别之宗祀在兩廡追維舊德緬想前徽篤行可風詒謀永久好善樂施世澤綿長是宜位在西龕列功德之祀世世配享夫文物科名纍代繼起斯為朝家望族而敦倫飭行無忘祖先乃稱家風有道敬蠲良辰合祀廟中祖宗樂得子孫之衆多長在其側子孫常依祖宗之寵庇永惟居歆惟兹廟中少長畢集自今以往永永無斁慕讀書之榮益自勤於絃誦知為善之樂尚自勉於訓行爵秩聞望等之圭璋孝友睦姻永如琴瑟見祖宗之共聚堂寢自生敦本之思知枝葉之皆由本根常懷睦族之念地靈所鍾愈昌而熾和氣所積益壽而臧謹以潔牲柔毛醴齊粢盛用申奠獻尚饗念修堂告成進主祝文繄惟我祖卜居梁麓纍善行仁天之所篤梁山之下其風郁郁己卯夏初我祖無祿窀穸既畢宗祊未卜凡我孫子對之心恧昔我始祖卜葬斯山越寧鄉公附窆此間九十九峰蒼翠斑斕奕葉有人創造伊艱維我曾祖繼起名揚克承父志厥祚丕昌購兹佳址築為享堂享堂維何在墳之旁祭畢宴斯厥制堂皇規模既逺報之亦長有子三人兩騰曲江旁及猶子名與俱芳纍代簪裾於今有光未及百年事變滄桑頽垣墜瓦此堂遂荒我祖見之惻焉心傷無力重新猶存餼羊凡我孫子誰不奮昻歲在壬辰拮据經始構兹數椽風雨足蔽以奉我祖以承先志為墳之廬為祖之祀私也而公兩取其義敬陳粢盛備我犧牲請諸族人今日告成同展一拜共布此情伏惟我祖及我髙曾佑我孫子無失令名睦姻孝友乖戾不生爵秩聞望君子之榮而昌而熾永世胥寧凡我孫子同兹致誠謹以剛鬛柔毛粢盛醴齊用伸奠獻尚饗辛丑四月同當事紳耆宿壇祈雨文農及時矣而雨澤不降小民幾無寧刻也茍居官之不職應降咎於余身百姓何重遭此戚也頃曾請水於鹿溪又化龍於橋上拜禱呼號之聲豈上有九重之隔耶天之愛民人甚矣茍粒食之不登將顛連而莫告上天亦豈其不德耶糾我紳士齊宿廟壇耿耿愚誠幾不遑乎日昃也眷望四郊瞻言百里能無傷心於日燥而地赤耶伏願速遣雨師立召風伯將己下之種浡然而興而方播之田亦得收功於涓滴也嗚呼旱既太甚其雨其雨彼蒼者天其亦念此哀迫也謹告祭座主安溪李文貞公文嗚呼世逺方在苫塊之中哭吾母也今又哭吾師哉嗚呼吾師之於余小子可勝言哉歲己丑吾師主禮闈世逺成進士吾師薦之天子特命讀書中祕嗣是惠訓不倦迪我者不徒在語言文字之間期我者有出於功名爵祿之外嗚呼可勝言哉世逺服習宋儒之書歷有年所自吾師啓其鑰而發其覆生平學識始有依歸嗚呼不謂荒陋如世逺猶欲進之以程朱之學也世遠幸際明時雖櫟社無中繩之材然野人懷負暄之獻己丑冬吾師攝行郊天之禮齊宿天壇獨召世逺與語久之謂曰子抱經濟何不盡言之因得盡吐於前質論商榷過夜分嗚呼不謂迂疏如世逺猶欲策之以經世之務也世逺雖無中智之質然有好善之心每見端人正士及一言一行足録皆心識不敢忘議論之間偶有所及吾師禮待有加時有薦拔嗚呼以世遠之愚昧猶不以可否為無足重輕也庚寅秋世遠以省親假歸臨行贈古畫一幅乃龜山立雪圖也嗚呼師雖不言世逺敢自棄乎逾年遭先君子之變睽教三年燕閩萬里愛憎不一毁譽叢加雖素號知交尚不敢保其聞流言而不信吾師確然不惑服闋入都日特薦世逺分修御纂性理精義承君子之提命受聖明之指畫人生至樂無踰於此是秋侍吾師歸里適撫軍海康陳公重振鼇峰書院問師於吾師薦世逺往主其事嗚呼鼇峰人材淵藪九郡之英咸萃竊不自揆欲推明吾師之學以振道南之緒以復鄒魯之風雖德涼學淺不自知其蚉力之負山也丁酉春吾師趨朝道出三山世逺率諸弟子請臨書院講學自開府以下觀聽者千人今所刋鼇峰講義是也方欲俟吾師致政歸里時擇其尤者攜至榕村親聞謦咳俾有成就誰知訃音至哉嗚呼古稱師弟之誼有知我之感成我之恩吾師之知我成我可勝言哉悲悼之深辭不能文敢叙其區區如此至吾師躬承絶學有繼往開來之功遭逢聖明有弼諧亮工之績此自有天下後世之定評國史之紀載世逺亦他有叙論故不贅而特云爾者嗚呼惟夫子知我也尚饗祭李訒菴先生文繄惟先生德器粹然宏涵演迤澄蓄萬千探根躡窟金渾玉堅旁流雜術亦探其𤣥生而育異鏤板神前少陷賊壘䝉難迍邅孝恭天性淳謐內淵屢躓公車不屑攀緣出膺民社嘉魚揮絃用康乂民亷聲丕傳去汰去甚不顧掣攣載陟戶曹煩劇仔肩始終一心清慎彌䖍上益向學親御講筵日佐文貞周易手編長官褒歎不日叙遷若水勇退賀監歸田某水某丘湖之山川世逺不材受知文貞夜雪春風中立光庭先生奏最我時在京飫聞至論清夜鐘聲庚寅之秋我歸漳東先生送我别緒匆匆三載遲留復入都中先生在部遂初融融我送先生祖餞臨風先生言旋我亦退隱問字榕村以翼以引文貞還朝大星告隕兩赴榕村有涕如霣先生猶健尚有典型先生諸郎又締嚶鳴寒晨判史溽暑談經經綸道義口許心盟我交京師侍從公卿豈無英達孰是忘形十載家居懶與時迎不我遐鄙書問相仍我受珠璣未報玖瓊邇來契闊心用怦怦追維先生兩世交情不謂今歲竟騎箕星心以情亂淚因德傾束芻往奠鍳此微誠尚饗祭總憲沈端恪公文人生五倫朋友居一相期重逺勸善規失維公生平學術宏正確守程朱不雜偏徑陽儒隂釋剖判是力介潔清剛潜修淑德維我與公聞風相慕公來吾閩未及洄溯時有臺警軍興紛糾公佐幕府如摧枯朽有都人士不悅於官砭愚督過如水激湍公曰安之無鼓其波薄言小懲所全實多仁人君子其心不同凡所遊歷棘刺生風公官於朝我亦來京相見促膝遂叙平生既補銓曹旋二天卿培元育材望若景星懇懇其衷嶽嶽其方帝曰豫嘉使總憲綱念國忘家積勞成悴年未及邁遂薨於位天子曰嗟臨朝灑涕喪我良臣贈恤特異公始登第名譽四馳作令中州衆母人師公嘗語豫為政初年循常而理不免具員逮及兩載民志既孚夜思蚤作朝發夕敷維學有所教之誨之以其餘羡積倉惠之三千榖石今猶存焉回思我生作令不愆分府粵西謝病言歸用薦始出遂初願違明良作合若或啓之亹亹孜孜日永矢之邇來夏秋余居海淀公來傍晚同榻寢燕爰及季冬同事禁庭九夕連牀有懷必傾勗我無疆如痿思起我發狂言公不聒耳公氣少衰遇公於朝翌日哭公始隔一宵面目如生公不能語長號疾呼有淚如雨嗚呼痛哉公之論著多未終篇周易有解朱注有箋未竟厥緒孰續其全平湖遺書公所編就我當抄存謀以垂後公之事業未展其半中途殞星誰不駭歎嗚呼哀哉敬陳鄙詞公其鑒兹公祭黃越甫文嗚呼君遂翩翩而長逝耶君有郭林宗之品識不為危激之譏議君有東方曼倩之風流亦或不恭而玩世家故儒也父祖嘗授以舉子業矣中更廓落而不就有司之試或曰以為難也而棄焉或曰君有不屑屑於此者别有玩心而髙寄知我者飲以酒贈以言共談心而出肺不然吾自適吾適焉任夫己氏之評隲而位置其為詩也質直曠朗有醉吟先生之髙致其論事也指陳了了鬚髯輒張若揮麈而攬轡皆由其屏俗而遊真故交盡賢豪而相締君又生有賢子恂恂焉亹亹焉嗣守有光而無愧君更朂以敦修曰德業更有大而至貧窶非吾患科名非止境在定腳跟而嚌其胾某等與公交幸鄙吝之常去悵一病之不起溯深情於平素偶出門之所之過髙岑而息憩見屋梁之落月疑顔色之可視陳鄙詞而薦酒君其倣徨徜徉乎斯際哭伯父習孚先生文自國家以制義取士士之隨風而靡者多致力於時文經史子集置之不問呂東萊所謂父兄無見識以得一第便為成材者何多也伯父嘗告世逺曰瞽者無以與乎文章之觀聾者無以與乎鐘鼓之聲蓋謂斯人又曰士不讀莊騷馬班一木偶人耳六經之外惟此最要而後漸及於諸子百家汝其識之其諄諄於世遠者如此其學則無所不覽詩若文重一時太史陳心齊令吾邑延修邑乘涖泮講五經若性理諸書著述多出其手素知伯父博學善屬文故也性剛直雄健自喜雜以滑稽而不軌於正與家君諸父相友愛晚而益篤讀書非夜分不寢雞鳴而起於將死之前一月猶然素强無疾癸未八月病二十七日而亡搜其遺書積成卷軸揮淚讀之淒淒欲絶因為文而哭之曰嗚呼伯父少而豪雄孔武其力有耀其瞳長加遜敏益植其躬奇書祕策羅之以胸泉湧河傾巨壑長虹先生後學動起敬恭昔當壯盛文壇樹幟老而不衰益篤其志有酒數斗飲之不醉舞劔談經登車攬轡對客揮毫停驂問字文似相如氣排賈誼吁嗟溘爾便為古人顧謂孫子我將歸真語言不亂預定若神嗚呼伯父棄我何速誨我諄諄示我三復伯有論著我曰我讀我發狂言伯不厭瀆躄者執杖瞽者光目嵩里文雄互居列族聞伯將至請入其屋迂儒走避枵士退伏操觚小技呼之為僕慰以為哀痛定復哭祭季父君晦先生文鳴呼季父竟爾遐逝世遠入京癸卯之歲臨岐諄諄告以大義跪聆誨言罔敢弗志爰及明春秉鐸安溪師道克立奬善叙彛厚德醇修薰而善良不責脯束敬業一堂祖孫父子在泮課藝不懈益勤僉曰盛事曰維祭聖備物必豐確遵祀典齊肅敬恭奉委㸃籍課業問耕老稚歡迎我家先生倐焉遘疾闔邑禱祈朝昏問省日夜攜持乞假言歸道旁祖送有百其羣感動村衆丙午仲冬溘然長寐世遠在京踰年聞訃醫藥不親飯含不赴王事則勞有淚如澍曷云能來為位而哭道之云遠燕閩不縮嗚呼季父少有至性甲寅之警兵戈不靜隨親避地涉險歷嶂忍飢朝夕讓粥以養逮及末年躬親洗滌豈無他人悲愈悅懌兄弟四人始終允諧家節情話相對顏開事我先君至老不回奉如嚴師撫如嬰孩嗚呼季父赤幟文豪受知督學連冠其曹歲薦明經晦迹自韜學成不有通郡是師令君致餼遂設臯比由以成名不可指數豈獵其華言敦其素戶外不與家産不營屢空蕭然金石歌聲纍躓棘闈一席寒氊未竟厥用靜正怡然嗚呼哀哉山川阻隔設奠陳誠朂哉孫子勵志揚名克篤前修和祥蔚蒸永言無斁慰此幽靈尚饗哭從兄右章文嗚呼兄之死可哀也世遠與兄少同居長相聚也平居相朂以文章相勉以倫理也憶甲寅之亂王父避居梁山之麓吾父與仲父季父從而聚居焉歲庚申兄始生壬戌世遠始生兄乃季父出也幼讀書沈潜善入倜儻有志氣己卯春學使者將校士至漳王父時年八十二召兄與世遠詔之曰勉之吾猶及見汝等之入泮也命與兄讀書於叔父之旁小室每月夕風晨抗首論列蓋近以慰王父之心而遠以古人自期許世遠尋補弟子員兄雖被黜歡然喜色曰是可以慰王父矣王父既沒兄屈滯童子試中卒不遇兄為人重義輕利性謙退和婉善下然義所不可輒凛然有不可犯之色孝於親友於兄弟循是而基之可至於聖賢而無難即其一端片善亦足以厲頽風而起末俗邑俗家有子婚娶畢多自私其財帛父母取之猶有難色兄弟則居然畛域矣世遠嘗與兄痛憤謂人雖不肖何至父子兄弟之間而有利心幾何其不入於禽獸耶兄自婚娶後所得毫不自私嫂氏又賢嘗脫簪珥解所服飾以事親佐日用之需嗚呼此事本自尋常何足為吾兄稱道然亦可以愧天下之重財帛而輕骨月者矣王父沒二年葬期未卜吾父與諸父寢食不安兄倣徨不己嘗與世遠登髙山眺峻嶺周歷矌野平原間曰堪輿家之言雖不足信然此事自未可造次既卜兆營窀穸兄始帖然嗚呼使兄不死其亢吾宗也必矣世遠少而廓落疏於世務與兄弟相勸勉者大都皆迂闊不近時嗚呼惟兄知我也家居離邑治十里適吾父與諸父授徒於外世遠凡所作古今文未脫稿即以示兄兄曰某句字當換某句字未妥凡兄所言皆中子心嗚呼朋好相聚忽然遠别涕涔涔下不能自止况重之以兄弟之親溘然以死終吾身而不可復見乎此余之所以仰天而悲也且兄之知我更有竒者王父徙居梁麓時得一佳境名别有天泉石幽勝世遠嘗一夜不寐思有以營度之亭池臺閣大小廣狹朗朗胸中晨起走兄卧榻呼兄起告以故兄曰止勿言視吾見何如及至某所兄所云云即吾夜中所思者也又世遠凡有外遊將歸前一夕兄必見諸夢且謂諸弟曰聞之今日至矣十數次皆驗此皆瑣屑無足重輕之事然亦是一奇也今歲世遠捷南宫讀書中祕方自幸進身有階平日與兄談論者庶幾不墮空言乃兄竟未有書來秋八月始知兄以六月六日死矣嗚呼人誰不死兄之死可哀也兄今年三十生有二子一女雖小聰慧可愛將來教養之使成人及婚娶之事季父自能了此然世遠自不敢忘兄其勿以為念嗚呼哀哉祭從兄修永文嗚呼昔我仲父有子三人過期莫娶無怙且貧我先大夫視子猶均遂厥婚媾恤其苦辛仲母暮年式克舒顰爰及數載淹喪伯氏言立其繼仲氏之子仲氏繼殞嫂氏靡他撫之拊之匪我則那獨兄之存傷心雁序信諾惠心里推古誼養蒙於鄉為家之計體又素羸喀喀病肺我官於朝音問絡繹薄俸雖分有如涓滴如何昊天旱荒繼疫丁未始秋聞訃愴惻嗚呼痛哉兄與二昆溘無留者藐爾諸孤一門數寡獨鶴支霜啼烏月下呱呱哀號有涕無灑嫂氏貞賢寄語來京今歲無飢我心則寧越兹以往我當自營我聞斯言悲不自勝維兄有子食之誨之逮及長成婚之配之我聞苦節其後必昌安貞淑慎天祚汝以無疆子母相依娣姒相將克儉且勤迪厥子以義方茍盡人修有赫彼蒼萬里緘詞我淚汪汪兄其鑒兹式相爾後於不忘尚饗通族合祭紫泥庶常文嗚呼痛哉吾紫泥之亡也吾聞達者之語曰家族之得第居官者不足喜惟其孝謹純篤有學問志氣者為可喜則其亡也亦不以得第居官者為足悲而以孝謹純篤有學問志氣者為足悲紫泥生有異質少不問家人産勤學好問以遠大自期年二十補博士弟子員踰年失所恃紫泥痛母亡事父篤謹處兄弟益友恭折節讀書五經躬自注解治史鑑頗能記其因革得失未幾食餼於庠纍試冠軍甲午登賢書中乙未進士第二人殿試制策進呈第六復御試詩古文第七紫泥顧不自多限程讀書清晨溫經午前讀宋儒書午後閲綱鑑晚讀詩古文時與兄聞之同在京邸坐卧一榻以力學躬行信今傳後相刻勵手書來家相勸勉者無非修門內行明體達用之學吾家子弟方有所觀感而興起焉丙申六月十四日眷口進京時己得病七月七日憮然曰吾不及見吾父矣遂卒年方三十同年同鄉同館諸友以及朝之縉紳大僚聞訃哀愴􅉠金四百有奇祖奠相續於道嗚呼一庶常何足輕重為其學問志氣如日月之方升悲人才之淪沒為國家惜也十二月二十四日馳驛抵里寡妻稚子扶柩同歸悲傷動行路况叔伯兄弟哉嗚呼家門不造撫昔念今潸焉出涕癸巳夏我雀人以公車終於京都是秋我爽亭又以公車卒於宿遷雀人勤學博聞著於天下爽亭和厚修謹孝廉中之望孰意其偕亡也今又喪我紫泥四年之間喪車自遠至者三人何其痛哉嗚呼夫子之稱閔子也曰人不間於其父母昆弟之言今與祭者盡吾家之諸父昆弟也吾家諸父昆弟非妄歎者合之人言其亦可定吾紫泥矣爰哭之以詞曰梁山髙兮湖水泱泱有閟其色有遏其光國之良兮族之坊心藹吉兮身健强胡方三十兮汝年以不長子幼弱兮父在堂靈遠來兮歸家鄉汝之達兮何之而不可翺翔我懷愴以傷兮夫何日之能忘六一姪孫哀詞嗚呼謂亢吾宗者必汝也今竟如此耶汝自冲齡淹貫五經旁及羣書年十六遊庠序朋試皆前列去歲從余學於鼇峰汝之文章行誼獨為開府所推重同學所畏服翩翩然年少名士也鄉試制藝雄深贍雅制策皆本所學以抒為經濟余益喜曰是不論得舉與否行當讓此子也出一頭地矣入夏以來積羸成疾時余方講學會文於西湖祖祠汝獨卧病不能在列相對時猶津津心喜也孰謂有今日哉嗚呼以余之闊疏方欲鼓七建之人相與明倫學古克己勵行暢前哲之休風去俗學之蔽錮鼇峰中不數人也而汝與焉吾家中不數人也而汝又指屈焉嗚呼天不祚余使此子之未逮成立也嗚呼天不造吾家使此子也夭也汝今行年二十有一尚未有室父與王父皆在堂哀不能自禁汝其能瞑目哉雖然汝之才名著於閩嶠志行追乎古先雖福壽不長孰與庸庸者泯泯焉以終其身哉自汝視之皆塵土耳汝病革時王父許以從兄之子為嗣汝嗣必昌汝靈是依維余知汝􅏰然念之因哀之以詞曰牿其性者溺於習馳於華者汨其實今之人兮鮮自力汝之英兮信兹不惑我望之奢兮珍什襲胡棄余兮歸何域能不汝思兮汝志己立祭同年黎少司寇文維我同譜落如晨星或處山邱或入泉扃迪德廣業孰翼孰賡維公邁志行砥名成初登瀛洲露爽英英典試粵西得人有聲繼視楚學石介氷映楚風徑雄澤之以正報政歸來天子有喜擢居給諌邪觸佞指帝顧在廷巡察需人髙安相國以公名申天子曰都是謂直臣劾兩大憝封事密陳大臣才識譽命津津維時聞者驚耀偉節謂公有此如矢如鐵天子不言同朝莫知公亦不言不伐不居天子聖明公勇有餘按湖南北耨奸櫛宄咏黍歌棠昔時人士竣事言旋命視南河沿流相視籌核無頗遂進廷尉廷尉稱平九列有議謇諤盈廷出衡南國南國是式馬首無譁浮僞悉斥帝謂盛京國之根本晉二司寇兼職京尹惟此盛京榖賤物平公來涖止繁阜盈寧宣天子仁不狎不驚言渥其膏言虗其囹始及一載溘爾上升嗚呼我公渺不可即魂來夢清魂返塞黑年未周甲事業未半一往不還能無寤歎憶歲己丑登第方新三百進士六十翰林過從頻仍蚤夜談心月窟可探蒼生作霖維時安溪道侔伊周師生誼篤宴見綢繆或坐密室濬我靈修或隨杖履吟弄優游溯洄洙泗湖海盡收陶然亭中怡園石上分韻得句三爵不讓郭外花紅窗前草緑魚躍鳶飛印川對菊公於是時嶽嶽郁郁二十年來星霜頻改函丈何依同門鮮在公能奮首天子葵之望公為鵠尚肩隨之廣陵散絶顔色何照七八同輩誰與同調公之尊人觀察陜右素號青天撫綏績懋以其緒餘嫻及文史我朝作者巋然鼎峙公能趾美有蔚家聲兩世純臣系出閩汀聞公柩來束芻蚤戒疾驅過郊不及奠拜渺渺緘辭寫此一哀朂爾諸孤揚顯將來嗚呼尚饗哭從弟誠符文嗚呼吾自始至終所望於吾弟者實有加而無己何一朝竟至於此吾弟事親孝處兄弟友恭撫孤姪以成名待人以信剛直尚義家極貧介以律躬不為卑瑣茍合之態年稍長受業於余未及壯補弟子員研經究史髙自期許詩文尤傑出丁酉歲從余學於鼇峰九郡之英咸在課藝屢屈其曹乃不得與鄉薦命也丁未春余官於朝眷口入京以書促弟同來始至體玩宋儒之書者幾一年歷代名臣傳名儒傳各研閲一遍相國髙安朱公太僕學川林公及靈臯方先生皆加重焉今年肆力時文四鼓方就寢得病中止者一月猶不休三戰文場表策各至千言大抒所學竟以此得病又不得售越兩月而亡命也嗚呼痛哉吾一不知夫科名之纍人一至此也傷哉自得病以來吾為呼天祈神欲讓己歲天不我諒吾行負神明也嗚呼吾同堂兄弟十二人雕零者四人吾弟又與余聚首京師二年今竟何往哉嗚呼痛哉吾官至九列家未嘗肉食菜根布素吾弟恬然安之吾待子弟每刻責求備吾弟恭和受之視吾事如己事視吾財如已財臨終猶恐余憂愁託言稍痊嗚呼痛哉歿之前一日口占遺訓以貽妻子朂以大義告以安命誨汝子皆至言也嗚呼痛哉雖然生寄也死歸也男子有四方之志吾弟名信於公卿而行孚於族黨與庸庸死於牖下者何如也妻子雖不及見然吾在此兄弟子姓咸在侍疾送終尚克誠備父母未葬吾能成之子女婚娶吾悉心力以任之饔飱之需吾何忍忘之吾弟其可以帖然無憾矣冥冥之中其克相爾子爾女爾室爾家母相悼恨汝子今己為諸生顯揚褒大吾拭目俟之嗚呼吾弟尚克鍳余之言尚饗哭第六男長注文雍正十年四月三日汝柩將隨汝母柩回家汝父以庶羞果品設汝柩前呼汝而告之曰嗚呼吾以雍正元年入京汝以七月始生吾不及見汝聞汝生而多疾痛憂苦汝母濵死者數矣五年冬隨汝母來京年方五歲已能曉句讀性醇良至孝汝母病私於無人處叩頭祝天與吾同寢吾時起坐汝急起取被帖吾背恐吾寒也有客來訪豫汝嘗從旁聞緒論好與大人長者處不樂與小兒偶吾嘗問汝曰汝欲敝衣蔬食名行垂千載為聖賢耶抑將豐衣美食駟馬髙車漫無所表見而作官耶則應曰吾為聖賢今年方十歲能誦小學四書詩書易三經及古今文若干篇為講解粗知大義去歲夏四月得疾腹大左旁稍硬急令醫者治之不令汝讀書汝時取書於卧榻自讀常為汝母汝姊汝嫂講小學至性所發亹亹動聼歷夏至冬腹終不小顧飲食起居猶如常也或謂針灸之術甚神吾謂汝曰汝父欲汝速愈法用灸汝至孝幸勿啼號灸三處二十七次汝忍痛不出一聲汝母時病卧在牀猶強起為汝拜跪祝天顧不得效元氣轉弱汝妹以十二月除夕亡汝哭之哀汝母以正月晦日亡汝又哭之哀猶能視斂成服越半月而亡嗚呼痛哉吾自兩載以來疚惡叢滋行多拂亂致汝夭折皆以余故也吾嘗獨居深念負汝多矣吾官至卿二菜根家風無肉食吾一日見汝與汝兄同飯食只豆腐白菜有難色汝母告豫曰吾須看之食不然二兒食數口便走余曰年小須不時啖以魚肉既又念汝諸兄皆食此能長成姑不汝慮嗚呼汝得天薄以是致弱未可知也吾居京師雖隆冬盛寒不設爐炭汝手足凍裂猶講誦不輟以是中寒成疾未可知也汝喜讀書吾欲汝速成課程數倍汝諸兄汝不之苦以是致腹疾未可知也汝好食生果飴品吾謂汝曰醫者云忌此物俟汝痊時隨汝所欲吾不汝靳汝聞吾言節至終歲不敢近竟不得食以死嗚呼痛哉汝臨終前一日猶誦父母惟其疾之憂時文若重有悲者汝不知死事吾亦不言死事至口不能言吾謂汝曰汝聰明尚默佐汝諸兄使有成以慰吾心又至孝尚使余勿思汝以成疾病汝向吾㸃首及氣絶半日目猶不瞑撫慰再三始瞑嗚呼痛哉汝母既亡留汝使吾朝夕撫摩誨導猶可自慰并汝而奪之吾何能不悲哉吾以服勞王事朝出暮歸入汝卧榻汝母汝妹及汝皆無存者吾痛曷有極哉嗚呼自汝之亡吾欲為文哭汝一痛即不能執筆今汝柩隨汝母回書此以寫吾哀嗚呼汝而有知尚使余勿思也汝母有靈備聞斯言尚使余勿念汝也嗚呼哀哉二希堂文集卷十
