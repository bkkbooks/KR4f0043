body:
  text: 二希堂文集卷十一禮部侍郎蔡世遠撰勸輸粟引康熙己亥仲冬有事於家廟事畢君奕叔父井門兄宮聞兄伯行兄諄諄然合詞以命世逺曰姪孫張之子吾父祖東昌公之宗子也生而喪父張婦洪氏賢伶仃撫育之上無舅姑旁無兄弟今六歲矣寄食母家吾等雖有所周然歲無定額朝不謀夕者屢矣夫以孤兒寡婦萃於一門又係我東昌公之宗子家貧而子弱其可聼其飢寒而不為之所乎恭惟我東昌公致身科甲政績懋著創垂宏巨子孫得蒙業而安蒸田歲入數百石尤不可使宗子之以孤弱獨困也凡我一脈隨力輸之供其母子歲以為常俟其子長大成人而後再圗子其為我書此意於簡端吾將令長蒲長溗長濠主其事世遠聞而再拜言曰東昌公在天之靈其慰矣乎苦節之後必有達者非徒此子將大有成立也族姓相敦睦情誼相聫屬家其昌矣夫誰無率祖之心恤孤之念乎世遠於東昌公則從祖也於張之子則從孫也目擊心動實有同情承命書之以成兹美詩曰無念爾祖聿修厥德傳曰葛藟猶能庇其本根敬以是為朂募刻黃石齋先生遺書引蓋聞因雲灑潤則芳澤易流載響乘風則音徽自遠無鯁亮清忠之氣雖潘江陸海僅供覆瓿為天地河嶽之鍾則琨玉靈珠自當壽世近代石齋黃先生者志存忠孝學貫天人了生死之一關嚴忠佞之二字明朝三百年養士之報正學而後一人漳浦九十峰積氣所成東溪之武堪接生徒遍天下仰寶座之春風正氣塞古今留石壇之化雨驅宣公於腕下奏疏洵為百代之光駕陸子之書厨詞華豈但一時之冠罔非繼往信足開來觀緇衣數傳見講學正切於匡君講續騷一篇知忠臣必由於孝子明九疇之義所以佐書洞三易之璣亦以補繫丹心激韻髙律呂之聲碧血成歌動乾坤之色他如松花别業早擅昔日文壇即至駢枝巵言逺勝古來談藪耽書性癖己極刻骨鏤心私淑情深豈徒梁峰鹿浦嗚呼九串十朋四恥三罪公自灑氷天之淚我巳興拾桂之思幸生講學之鄉遺澤未斬於五世即慕先生之義頌聲己溢於四方無謂斷簡殘編廣陵散於今絶矣尚曰丹山碧水正氣歌其猶存乎誰非好古應共效王稌集正學之書諒有同心勿徒令桓談重子雲之價書李文饒傳後李文饒古今才相也余觀其在浙西也汲汲不忘君其治蜀也聲施爛然而其相武宗也事功幾過於韓琦當武宗時天下可謂多故矣藩鎮之橫擾於西夏之師也小人雜進非如治平之時也文饒雍容其間天下晏然受其福琦相英宗何以過是哉就唐代論之氣節不及宋璟而才並乎姚崇風度不及張九齡而行純於張説髙志不及李祕而功績著於令狐綯就他代論之呂許公張江陵輩遠不及之矣莊聖太后臨朝時許公功為多江陵相業亦未可輕如貶韋宏質貶范文正貶劉臺其專擅亦適相類然文饒雖抑樂天而不用猶與陷富弼髙拱者不可同年語也雖其朋黨之心執而未化然牛黨皆小人君子諒焉且洛蜀猶不免復何怪於文饒哉朱子作綱目書曰李德裕卒而不具其官余不能無憾焉書李杲堂集後杲堂自謂喀喀病肺奄奄不振今觀其作古文氣甚凌厲夫文章有識有氣無識不可以立體無氣不可以致用譬如大將部分措置量知彼巳識也鼓三軍而進之率先為士卒前行氣也杲堂有識有氣溯源於子長規範於韓歐可謂脫盡明季之習矣明初諸家方正學氣烈近蘇劉青田屬詞近子宋潛溪該貫瀏亮體勢近歐要皆詞氣疏暢不肯作骩骳險僻何李興遂為有明樹幟然何不及李遠甚王茅二川相繼作卒不能掩北地而上之然自李滄溟倡為左史之説作家多習為強澀繁瑣割斷難句稍變者又緝綴詭僻誕謾而無結搆一則曰吾由西京而追左史也目中無東漢何論韓歐一則曰吾本兩漢而倣莊子韓非也以淺率為奇奧吾不識左史莊子韓非豈專為是強澀緝綴哉專為是強澀緝綴則不足以為左史莊子韓非矣效左史莊子韓非而為強澀緝綴者力不足也力不足而強澀緝綴以為左史莊子韓非是皆吾所不取也杲堂得之矣書陳靜恪先生傳後人生百行莫過孝友就其造極而言之則孝為難父母之恩大矣哀哀父母生我劬勞蓼莪之詩備極深痛自非立身行道養志尊親行造其極未足以語於大孝也孔子稱大孝者舍舜之外無他焉就世俗而言之則友為難愛父母者子也愛子者亦父母也人子能如父母之所以愛子者以愛父母則孝矣不然安常處順奉養服勞雖未為孝亦未嘗以不孝聞至於兄弟其始也分形聨氣傳衣共食至戚也逮其後也妻子間之財産間之奴婢間之始則財不相通繼則氣不相下私意一起寖以踈薄自非友悌深至外盡其和內盡其誠鮮能免此書曰克諧以孝蒸蒸乂不格姦解之者曰進進於善不至於姦也余聞之師曰非也言其和孝懇至自能進進於善不格其姦也格如格君心之格君臣以義合故積誠以格之陳善閉邪格其非心父子兄弟以天合蒸者詩所謂蒸之浮浮也若以格君心者格之則有所不合矣記曰人子之事父母也起敬起孝悅則復諫余亦曰仁人之於兄弟也起和起誠務修其極茍以其難處也而置之是恝也以其必不可己也而驟之是激也不激不恝起和起誠弟之至也常則既翕而和樂變則同憂而共患誠與和之所積也余讀陳靜恪先生傳有感焉壬辰海氛之亂先生仲季同圍城中仲兄以拷餉就繫先生自詣軍門請代帥憐而義之餉得稍減事平家既落以眼疾廢仲氏家尚饒或勸分其餘財不答此二事者余甚偉之常人爭錙銖於平日者有矣况己詘而兄饒乎悁悁於毫髮小事有矣况遭難而肯代之乎是真可以風世矣先生之子名元麟字石民與余交最篤石民之事親也至孝與先生晨夕相隨蒔花茹茗考古談經父子之間優遊怡愈樂之至也故先生兩目復明石民登鄉薦先生猶及見之先生行事李約墅先輩既為之傳林君佶人又書而跋之石民屬余書於後余嘉二事之可風也故詳論之且以見能孝者必能弟能弟者必能孝能為悌弟者必生孝子凡百君子敬而聼之書先王父季湛府君遺集後古今卓然自立之士多不為祖父兄弟所掩是故賈曾謝鳳不能掩其子陳仲弓不能掩其孫王子敬蔡九峰不能掩其父士衡子瞻不能掩其弟數子者之名至於今豔慕不衰先王父年十六為諸生師事黃石齋先生先生尤器重之詩若文多先生風味氣骨更肖甲寅之亂居梁山之麓鄉人薰其德化焉盜不入境民不訟於官者幾三十年年八十餘飲於鄉為邑人所重蓋公以溫醇沖和之氣發其英偉俶儻之才故其人與其文若詩俱傳也公以己卯年沒伯父嘗手定其書越一年世遠取而讀之涕涔涔下因志之其末曰祖父兄弟之不能相掩也信夫公以上三世皆歷甲乙科先刑部震湖公學行載道南源委公以立德立言承厥緒無墜兄弟三人公最少二兄皆一時名進士人謂公潛德幽光殆將過之祖父兄弟之不能相掩也信夫抑又聞世之稱公者曰制義不如詩文詩文不如德行是公之詩若文幾為德行所掩也雖然公可以無憾矣黃門雙節紀略余鄉人黃鏞妻張氏及其子元吉婦康氏者龍溪邑乘所志一門雙節者也張氏二十三而寡卒時年九十有二康氏二十而寡今年七十有七矣張之歸於黃也誠孝修婦道盥櫛紉針烹溉維謹鏞病殞舅姑在堂長子元吉方七歲次五歲又次方襁褓煢煢孑立莫知我哀當壬辰海棼之變鄭氏悉衆圍漳凡八閲月城中絶食兵卒餓鬬呌號割死人肉以果腹張翁殁張慮尸難免密以錐刀鑿地爪土出之鑿己復爪十指破裂出血深三尺許裹尸而藏焉會王師至圍解翁尸得斂而葬而張十指爪甲盡秃每對子孫言輒嗚咽流涕鄉人歎曰逢此百罹仡仡勇夫不免於及張以一嫠婦乃能完其翁之尸誠且智也嗣而元吉有婦生孫次與季亦長成人謂張且色喜無何而元吉復夭婦康氏抱呱呱之兒姑婦相依姑撫而謂之曰我以不肖子纍汝婦賢應獲天祐奈何蹈吾戚邪康泣曰竹有筠松有心敢不體姑之心守姑之節晨理膳羞夜紡績事姑以禮教兒以義姑歿哭之哀毁骨立邑人既以其事紀之邑志官斯土者又以其事上聞而旌之張之孫瑛為名諸生思欲表陽其先烈康之子橙羇旅入都求余文橙性至孝言及輒泣余嘉其志而歎雙節之萃於一門也為紀其略使覽者有所徴信焉跋祖祠規條右家規十六條乃世遠所稽之於古及聞之於今者已正之父兄叔伯以為可行願吾家長上各以此朂其子弟相規相勸則人知尊祖敬宗而相親相睦之意行乎其間矣世遠更推夲平日父兄之訓以為衆子弟朂曰凡人之所以為人者在篤於倫理而絶其自私自利之心而己薛文清公戒子書曰人之所以異於禽戰者倫理而己何謂倫父子君臣夫婦長幼朋友五者之倫序是也何謂理即父子有親君臣有義夫婦有别長幼有序朋友有信五者之天理是也於倫理明而且盡始得稱為人茍倫理一失雖有人之名實禽獸之行仰貽天地凝形賦理之羞俯為父母一氣流傳之玷將何以自立於人世哉文清公此言極為親切世遠竊謂倫理之虧大抵由於自私自利自私則忌刻之心起雖同祖共宗之人不免自利則止知有巳雖同氣兄弟不顧夫忌者小人之尤况施之於同祖共宗之人利者害德之物乃至同氣兄弟之間因財業而生嫌隙此真禽獸之不若也嘗見兄弟不和之人其家必有死亡之憂自古及今無得脫者人即不懼身入於禽獸獨不為禍患計耶吾宗素奉祖宗之明訓凡所云云皆不至是然履霜堅氷防其漸也抑又聞之人有常業必興其家忠厚居心天必福之勿以氣陵人勿貪非其有勿為賭蕩不法之事勿為遊手無常之人遊手則必入於匪類賭蕩則將無所不至古今來未有好賭而不喪其品破其家者其事則卑汙苟賤貪鄙不堪其歸至為父母所不齒妻子所厭惡人每自知之而自蹈之何耶凡此數者由於其人之趨向關於自心之洗滌雖父母且不能勢禁豈旁人所能理諭忝為一本之親有同祖共宗之誼故不能以默默饒舌及之非敢為文以示戒也至世遠有過吾父兄叔伯必加嚴督方有親愛之心或兄弟之間以錢財而分畛域或尊長之前以褻狎而致侮慢或恃已之勢奪人之有或明犯禮法以自取戾吾父兄叔伯必切指其事而明訓之仍撻責於祖宗之前以示戒焉可也康熙辛卯人日世遠謹書跋五思録前卷先君子以康熙辛卯秋七月捐館時名卿大夫舊遊戚友或哭之以文或銘其墓以表之先君子嘗秉鐸羅源羅人祀之名宦吾浦人賢而祀之於鄉守漳郡者採入府志焉古人有言曰大孝尊親其次弗辱世遠愚而失怙惴惴然懼終不免於辱也爰編次而存之名之曰五思録者不忍居處笑語志意所樂所嗜之或忘也康熙甲午春二月男世遠識跋五思録後卷辛卯秋七月先君子捐館舍越三年不肖孤世遠彚次志狀祭文及名宦紀鄉賢紀都為一集名之曰五思録以志思慕式子孫也丁酉冬又喪我先母喪葬事畢謹次名公卿若戚友諸銘志祭文以附於後嗚呼先母賢德焜耀鄉邦始遭亂離窮餓播遷神明眷之篤事尊章心力瘁盡殷勤誨子慈滃義炳不孝孤兄弟三人忝竊科名兹益愧勵廪廪焉栗栗焉懼無以為瀧岡之揭也康熙己亥夏四月男世遠識東江姓氏跋右東江姓氏六十餘人聚吾漳行誼文章之選而為此會也易曰麗澤兌君子以朋友講習學記曰相觀而善之謂摩夫近文章砥礪廉隅非友不可余自庚寅乞假趨省常至郡芝山與諸友談經論文間拈題面課互相切劘雖於諸公無能為役然入芝蘭之室久當自化矣撰義則依據六經不墜浮夸軟美之習説理則原本宋儒不落致虗駕空之旨載籍極博務為返觀內考定從違别是非以為守身用世之學循是以往吾黨其盛矣乎夫文詞爾雅而內行克敦閎覽古今而乘時建立豈徒科名乎哉因以齒次其姓氏而并志其邑里非以自耀也亦指視之交叢也嗚呼可不朂哉敘鼇峰學約世遠雖少承父師之訓不敢自外於學然資性淺陋既寡昧而一無所明過失叢滋復昏怠而不能自克荏苒歲月恐終為天地間無用之人乃承中丞雷陽陳公禮聘使主鼇峰書院戰懼方深敢當斯任顧念先君子主鼇峰時世遠曾侍書以行兹又親見兩臺所以長育人材化民成俗之至意爰至斯地與諸同人共勉之至於書院條規昔者儀封張先生撫閩創立書院時嘗刻學規類編一書中載朱子白鹿洞學規程董學則真西山教子齋規胡文敬續白鹿洞規等書巳為明備陳公又公暇輒至其於義利之分亷隅之飭痛切為諸生言之同人循此而行無俟增益不揣愚陋推本兩先生之意以附於後既以自警且以共勵云敘家禮輯要閩中素稱鄒魯為朱子講禮教義之鄉朱子生於延老於建而宦於泉漳及門髙弟率多閩産五百年來風流未歇是以冠昏喪祭之禮尚能由舊本朝會典煌煌聖祖仁皇帝御纂性理精義刋載家禮以風示天下我皇上仁孝天錫盡倫盡制立萬世禮法之宗特諭九卿等恐風俗以奢僣相尚非以禮教天下之意官民喪葬婚娶務從約素參酌典禮雍正元年五月奉旨通行我閩既承文公遺澤又際聖化翔洽禮教修明之會臣庶率由凛遵蒸為風俗盛於曩時顧窮鄉僻壤間有不見全書狃於習尚者是用備考成書輯其簡要以合於鄉俗之易行而省其無益之繁費各郡中有一二處沿陋愆禮者共為指明期知往習之誤悉歸於正云爾題陶存軒歸去來館圗余與江右陶君存軒同歲舉於鄉已丑成進士又同同讀中祕書越明年給假省覲同舟車至浙存軒嫺問學負節槩不肯苟同於人顧不余鄙志亦同也存軒散館後授檢討南歸有終焉之志余亦家居十年雍正元年蒙恩特召侍禁近又十年于兹矣存軒雖不出顧當事欽其行慕其學延主豫章書院修省志倡學大江以西為不朽盛事君子之生于世也或出或處或逺或近迹不必同要本此不愧吾心者以不虛其生有益于世焉斯己矣一日謂其子弟門人曰吾將山隱矣匡廬山有歸去來館茅廬數椽靖節先生之故址也存軒購得之悠然獨坐其樂只且歲壬子長子學樞以中翰進京出圖索余題其首余素慕匡廬名勝而未得至者異日得假南歸道江右過匡廬遊白鹿洞拜謁文公遺像讀楣間洞規之揭誦象山義利之章體文敬諸先生續規領要而觀在洞從學之士復有昔時之傑乎又將繞而西訪存軒於歸去來館以訂新知而商舊學荒落之餘未知其果同焉否耶喪葬解惑葬必擇地自古有之故程子有草木茂盛土色光潤之説閩地多山水不比北方一望平原故為風水之説者審擇夫氣之所流貫勢之所凝聚山則拱衛而不背水則環抱而不瀉無風隙水蟻之患此亦何嘗不是蓋祖宗安則子孫亦與俱安理固然也乃有惑於其説不修人事專恃吉地以為獲福之資遂有遲至三年而不葬者夫停柩不孝也世有不孝之人而能獲福者乎且天地人一理也地理無慿飭行於身行善於家天則報之以福幾見有檢身樂善孝恭敬睦而家不興者乎幾見有存心險刻門內乖隔而能獲福者乎舍昭昭之可慿索冥冥之莫據獨何心哉其至愚者則隂謀橫據相爭相奪以為福在是矣不知其為禍基也大矣又有鄉俗寡識惑於房分之見者夫風水之説不可苟略而房分之説理所必無有何所見而謂左為長房中為二房右為三房不及生三子者何以稱焉生子至十以上者何所位置之按之八卦方位謂震為東方震乃長子則所葬之地未必盡南向也度之五行揆之五方細求其説卒無有合即考之郭璞葬經及素書疑龍經撼龍經諸書亦無所謂房分者此乃後來術家欲藉此使凡為子孫者不敢不尊信而延請之陰以誘其厚利陽以得其奉迎不知其遺害之深至使死者不得歸土而生者不得相和皆此説誤之也此亦如時日之説古所不廢吉日良辰經有明文但不可過為拘忌如襲斂入棺之時有造為的呼重喪等名目謂至親不避必有大凶俗竟有不察而信之者抑情壞性莫斯為甚他省鮮有此説即吾閩如詔安等縣但棺物具備即入棺無另尋日時之事最為合禮此亦術家藉以為獲利之資與風水房分之説所當亟斥者也讀書識理之士固無此患其有中心實不信而不能自拔於流俗者曰寧可信其有夫信無稽之説至於啓疑論而不葬徇拘忌之失至於將入棺而不臨斯何事也而可信乎惑之至矣徴修漳州府志啓代魏太守作溯自初唐辟疆閩漳始為屏翰之重地逮及紫陽過化濵海上嫓鄒魯之名邦戶口田疇每日增而日盛聲名文物或代廢而代興苟無文獻足徴何由繼志而述事不有簡編明備何以彰往而察來漳乘始於有宋淳熙成書遞至前明萬厯迄今百餘載典故無聞從前三十科人文闕略又况鯨波屢沸兵燹相仍氣節如周忠愍黃石齋數先生未曾作傳儒林如何黃如張小越諸君子有俟特書在明季己失搜羅洎我朝有待編葺修政齊教於是焉資省方觀民於是乎在夫國之有史專隸於職方而郡之有志責成乎司牧仰惟聖天子文教覃敷於四海功烈遠邁乎三王稽古右文頌御製於九州之學崇儒重道升文公於十哲之班極曠典以昭兹觀人文而成化允矣當陽遘運斯道大亨宜乎紹述前賢諸廢並舉某世荷恩眷慚報塞之未能叨守名邦惟顛覆而是懼念兹郡志缺軼不敢因循以蹈前愆嘗與父老僉謀莫不踴躍而襄盛舉梓邦紳士不乏韓歐之才寓公名賢賸有左馬之學並擷華藻勿靳宏裁家乘野史悉搜求以俟表章墓志碑銘亦咨詢而備採擇識大識小皆典章之所不遺宜雅宜風固邇言之所必察藏書安在巷議謂何為孝為忠孫支諒不忘夫祖德或貞或烈女流亦獲佐其家聲以及遁迹林中抑亦棲真霞外蓮祥芝秀之呈其休蝗災蟲警之乖其候凡兹參錯皆藉搜羅莫為究末而忘原若應劭之志人物可摹昉也莫為貴遠而賤近若王充之作論衡可式程也要以耳目新知質之舊聞庶幾按據明審可備法戒百年之因革損益賴此以傳一郡之人物儒林永垂不朽豈惟清漳之地靈人傑載其寵光屬在有司之補闕修殘均有榮幸焉謹啓庚子秋帖示族中子弟數年來集族中衆子弟在家廟課業勤勵有加今秋闈在即纍纍佳篇吾何能不快然然文章特一端耳立心制行更為要著願諸子弟篤倫理之際嚴義利之辨現在居家處世何若將來居官理民何若醇此孝恭之念守其亷潔之操今日強毅立志終身守此不移盟之幽獨質之鬼神則更獲天人之祐助非徒科名可必也抑余又聞家祚之昌由於父兄所培積更願諸為父兄者各宏裕其量洗濯其心去其斤斤沾沾卑卑之念常存此藹然惻然惇然之心曰克臻斯日加勉焉尚或不遑速自淬焉則子弟藉為獲福之資父兄亦享安榮之樂矣不佞閲世閲人頗多凡所諄諄非迂闊之言皆肝膈之要也帖家孰凡子弟生徒午飯後各粘楮片於壁間嘉言善行皆可書或小學或日記故事或綱鑑性理末書某月某日某人書既有以觸發其性情間邪心而起善念又有以長益其記誦日人一條每年則有三百條十人同學則有三千條不寫及重抄者有罰事不勞而月計歲計甚有益二希堂文集卷十一
