front:
  text: 二希堂文集跋欒共子曰民生於三事之如一而橫渠張子則云師不立服不可立也當以情之厚薄事之大小處之蓋人各有師曲藝且然舉業授受場屋遭逢士大夫固有終身不忘者況乎立身之本末學問之指歸豈等諸泛泛師弟子云乎哉嗚呼吾師文勤公之于鋐固鋐所當事之如一者也昔吾師主教鼇峰書院鋐丁酉負笈從逰耳目為俗學久塗塞見鼇峰學約惕然有警讀二希堂文集曠若發矇勃勃然不甘自墮方半月師聞太夫人抱疴馳歸每附書問業輒加奬勗庚子徒步漳浦侍側十日癸卯師赴先帝特召侍今上講幄鋐適叨鄉舉計偕入都師引以見儀封張清恪公曰此鼇峰後起人也嗣是在都追隨數載師與名公卿論人才必首及鋐曰是有守有為始終不渝者也嗚呼鋐烏能踐師言之萬一倘自安呰窳竊位苟容無所樹立獲戾于師何可勝言今鋐年已六十矣嵗月蹉跎轉瞬遲暮憶懷往訓顧影自慙未嘗不汗下如雨也師仲子巨源監司重刋二希堂集屬綴以言敬述吾師之誨我知我者如此至吾師之道術經濟氣節文章天語褒揚日星炳耀海內莫不宗仰豈待小子之私言哉
