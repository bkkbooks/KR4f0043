body:
  text: 二希堂文集巻八禮部侍郎蔡世逺撰與鄭魚門侍講書在京師時朝夕過從俛有孜孜志相同道相合分袂時先生獨有所不忍於中者迥岀於交情聚處之外不可不謂之知我也前嵗附張次修信有江南閲巻之命心怦怦欲往以兩弟公車外出又繼以臺灣之變不如所願嗣聞先生清望日隆公明之譽溢於近逺然世逺竊謂此不足為先生譽也我輩誦法古人安肯以文衡而作商賈之行辱名喪心自好者不為况先生道力素定哉明則比公為難然以理眞辭雅二者律之空疎者不録浮雜者不録驗其心得審其學力昭昭然若揭其衷也此亦不足為先生難者竊謂學使之官在有以振士風而變士習下車伊始行一令於令長學官曰有能敦孝弟重廉隅者以名聞并上所實行有能通經學古奇才異能者以名聞并上所論著行之各屬揭之通衢雖所薦者未必皆賢而賢者未必薦然本之以誠心加之以詢訪擇其眞者而奬勵之或譽之於發落諸生之時或薦之督撫或表宅以優之試竣或延而面叩之從容講論以驗其所長有行檢不飭者摘其尤而重黜責之如是而士習不變者未之有也且夫士子荒經久矣勦襲撮摘以塗有司之目侮聖人之言莫此為甚今於嵗科未試之先通行於各學曰書藝二篇之外不出經題但依所限抄錄本經多不過五行少不過三行不者文雖佳嵗試降等科試不録科舉至期牌示曰某經自某處起至某處止各書於巻後夫勒寫數行本經非刻也先期示之使知成誦非慢令也有能兼通者塲中又牌示曰能成誦四經五經者庠生給餼禀童子青其衿如是而不自勵於經學者未之有也昔兩漢之選博士弟子員也以好文學敬長上順鄉里出入不悖所聞者為稱選送之太常太常籍秀才異等者以為郎又有孝廉一科得人最盛今縱不能薦之於朝私自褒揚亦學政之大者唐時有帖經墨義之科今亦倣此意施之使士子無荒經之患於學者大有裨益先生嵗試若未暇及科試行之未晩也且小學一書為敦倫飭行之要修身齊家之本士子少小先入以養正之言虚憍鄙陋之習悉去内聖外王之學畢基於此昔嘗以此作次藝論題取士矣後又移之覆試士子多視為具文學使亦有以具文視者遂使父兄師長不以此朂其子弟小學之廢風俗人心之憂也今莫若確遵功令先期飭示曰童子試書文二藝次依所限起止書小學數行不記者定行黜落如是則人爭自誦習恐後矣夫内篇者十三經之精義也外篇者十七史之精華也許魯齋云吾於小學敬之如神明今士子尚欲通經學古豈以簡便精要如小學反使束之髙閣乎世逺此數載在家鄉凡課授子弟以及從遊之士皆令讀小學講期必與經書性理叅講閩士化者頗多然與其處卑之苦口大聲孰若學使之行一文不勞而嘉惠靡窮乎今之持論者皆曰外官惟縣令與學使最難供職世逺竊謂此二者為最易夫縣令者朝行一政則夕及於民興政立教無耳目不周之處無中隔之患古人所謂得百里之地而君之也學使無刑名錢穀之繁惟以衡文勸學廣勵學官振飭士子為職業草偃風行比地方職守者尤易或又以為是二者皆有掣肘之患不知所謂掣肘者多由於自掣非盡人掣之也夫布衣則古稱先自强不懈人猶稱其嚴毅清苦力行可畏况居官哉但氣不可勝事不可激當謹確完養以合乎中耳謂見掣於人吾未之聞也世逺邇來無四方志今嵗撫軍呂公又禮至鼇峰日取先生所示羞惡之説與諸生深切而講明之㑹城氣習甚重然就中亦必有超俗成材者心誠求之而已江南學使前有余林二同鄉前輩繼為同門謝君皆未嘗有一字之通獨於先生惓惓者恃惠子之知我也不宣與總督滿公論臺灣事宜書日者臺灣告警草竊小寇烏合鳥散山卵之形不足為喻顧承平日久沿海愚民轉相驚惶延及内地五月十五日閣下駐節厦門爵秩威望足以鎭壓全閩驚寒賊膽趣提帥施公部分速發知南澳總戎藍公忠勇檄同出征内地凶倔虚憍之輩招以從戎使逞志於海外執戈荷矢之夫束之舟中市上岸旁無一跡山無伏莽野無流言此皆由閣下懼思不懈加以度量之宏愷惻之周恩信之著咨訪之密故能動皆中於機㑹古人所以貴有重臣者此也昔者羊祜杜預部署平呉方略而王濬收其功裴丞相度宣撫淮蔡而李愬奏其烈即以臺灣前事言之制府姚公啟聖多方誘諭施侯琅一舉而定之閣下望實逺追羊杜裴姚諸公而今之草寇奄奄就盡者既與呉蔡不同又非如昔日之臺灣逋誅積寇者等世逺於是知賊不足平也但私心所慮者恐土崩枕藉乗勢追逐不免過於殺掠耳昔曹武惠將破江南忽一日稱疾不視事諸將咸來問疾告之曰吾之疾非藥石可愈但願諸君誠心自誓克城之後不殺一人則疾自愈矣後果守其言虞詡戒諸子曰吾事君直道行已無虧所悔為朝歌長時殺賊百餘人其中何能不有寃者自此二十餘年不增一口知獲罪於天也臺灣吾故土故民但為一時脅驅所迫伏望嚴飭將士并移檄施藍二公約以入臺之日不妄殺一人則武惠之仁風復見於今永無虞詡朝歌之悔矣陳生梦林聞已招致幕下此君性行經濟蚤有國士之稱又嘗修諸羅縣志熟悉臺中情形咨以商確必能有所裨補海峙炎蒸眠食珍重不宣再與總督滿公書邇聞大兵由澎湖齊發載聖天子之威靈禀制閫之節度長驅入鹿耳門遂據安平鎮乗勝由七鯤身轉戰皆捷北路兵由西港登岸進克臺灣府賊窮蹙潰散臺地悉定閩人抵掌相慶世逺前書所謂賊不足平者今果然矣又聞閣下先期諭飭將士凡村庄城郭有掛大清旗號者即為順民諸色人等但有寫大清二字帖縫衣帽者即免誅戮此自離其黨之要計也且所全活無慮數萬人世逺前書所謂曹武惠復見者又不爽矣是役也不患臺寇之未平而患山寇之竊發自閣下鎭厦門以來威靈所播事事咸服人心故能内安外寧迅速至此何也承平日久大兵所至動多需擾民未苦賊而先苦兵閣下調發三省㑹討臺灣在道人不知兵既至市不改肆此其大服人心者也兵衆既多米柴菜蔬之用動以萬計若科及民間好亂之民藉以為名閣下調發有方州縣奉行惟謹此又其大服民心者也又聞諸路兵之下船也天氣炎蒸人人撫摩而噢咻之纖物必周既至澎湖又令貿易者多載菜蔬魚肉供其買用兵機神密七日而果大捷今沿海郡縣不論黄童白叟皆曰此番非總督不能成此功總督非急至厦門不能成此功未事而券之有由然矣世逺更有陳者夫平臺匪易而安臺實難臺灣五方雜處驕兵悍民靡室靡家日相鬨聚風俗侈靡官斯土者不免有傳舎之意隔膜之視所以致亂之由閣下其亦聞之熟矣今兹一大更革文武之官必須愼選潔介嚴能者保之如赤子理之如家事興敎化以美風俗和兵民以固地方内地遺親之民不許有司擅給過臺執照恐長其助亂之心新墾散耕之地不必按籍編糧恐擾其樂生之計三縣縣治不萃一處則敎養更周南北寛闊酌添將領則控馭愈密為聖天子固海外之苞桑為我閩造無疆之厚福惟此時可行亦惟閣下能行之安集之後常懷念亂之心是區區之嫠恤也不宣復張漢瞻書辱書稱許過當勸誨交深世逺烏足以當此哉此乃先生抱負鬱積閲人閲世借世逺以發之於文耳世逺學既不充行能無足取見人有一言一行之善每識之於心而不敢忘此鄙性之所樂也居官者行一良法施一美政則亦識之於心而不敢忘此又鄙性之所樂也貧人見富者而羨之豐衣美食以為已艷固其所耳若云滿腔皆惻隠之心又云以天下為已任則萬萬不敢也世逺曩時亦嘗用力於古文矣少年氣盛不肯自局於制舉之業妄有論著嗣後稍有知識不喜作無益之文所作者又皆粗疎平淺先生乃以光潔淳粹雄剛俊偉當之不增人愧恧乎吾黨學問經濟必講求篤實堅確可見之施行博雜之學不足貴即略見影響空言自大究竟何益世逺初知學時視天下無不可為之事邇來竊不自揆以所見者修之家而行之一族尚有所難況天下之事乎見當事有可與言者忘其固陋間有敷陳退而自悔者亦多矣知我者嘗以靜黙謹退為朂猶懼其不吾變也今先生乃以范文正韓魏公相舉似雖先生與人為善之心無所不至恐擬人不於其倫適足以增其咎戾也至世逺此行先生謂不必以格於成例為患區區之私進退綽綽向使在京聞訃而此日恬然補官為人子者之心其肯以此易彼乎且夫欲有所希冀以圖其私世逺亦不為也舟中無事率此奉復且以自白於知我者之前不宣與林于九前擬有粤東之行過雲霄觀西河之風規既而不果雲霄山明水秀科第人物抗衡上國邇來五十年不得一登賢書豈山川之秀鬱而未舒抑師友之砥礪有未得其道歟足下行修名立有經師人師之望今嵗授徒於兹所示以入徳之方作文之要必能敦懇詳盡啟發宏多斯誠雲霄之安定也竊謂文章之要以氣脈清眞詞義精采為主顧清眞非體認儒先講解不可精采非窮經讀史不能根柢盤深而出之以雅醇此文章之秘鑰也非為科名然科名不難得也抑吾聞凡為師者非徒敎人以文也必使之篤倫理嚴義利馴致為有用之儒孟子所謂其子弟從之則孝弟忠信是也今之為師者多不務此講章句課八股而已風俗之所以不古若者以此然必欲人人執而敎之甚難莫若講小學數條敦切開示又令午後書古人嘉言善行各一條粘之壁端不書者有罰重出者有罰不拘何書但據所見或取心得大能裨益性情次亦可資記誦先入之言聞之既熟則行誼敦而風俗可轉習俗移人初猶目以為迂行之既久則非笑者翻自非笑矣凡作一事必須劈頭斬截不然直是泛泛悠悠無一下手處也石民大兄止有一孫今又喪矣數窮如此奈何與李巨來同年拙稾承改正評示倒廪傾囷非知愛之深負大見識大手筆者不肯亦不能也尊稾髙闊雄博飽讀十日强分為三間附末見以正髙明諸儒語録奉繳細閱尊評極有卓識然尊陸子可也尊陸子而詞氣之間不免過激因而不足於朱子似可不必吾兄以人之議陸子為非則人不以吾兄之不足於朱子為非乎凡講學不在辨别異同貴能自得師知得一事便行一事弟生平不敢言學然總以力行為貴徒講解剖判皆膚詞也適館想已多時規模氣概安能降格但抑畏之心不可不時存言論尤貴三緘於不知不覺中防之又防耳與黄貞吉三載相違厪我寤思近於親友談論時常稱姪倩至孝至友上成父母之慈名中善事其兄下撫庶弟篤摯愉婉雖古王覽莫能逺過姪女亦被刑于之化善體夫志又聞昔嵗執太翁之喪小祥以内俱卧棺側去年丁太夫人艱亦然哀毁至性内則心摧外則合禮此眞近今所難可以風示天下不佞私自歎佩念禮部有表揚風化之責謹擬扁額孝友端化四字前後用銜款服闋時掛之願勿讓也更取小學近思録大學衍義及我閩公訂家禮輯要一書切已體驗務使一言一行不染於俗有立於世不宣答李立侯性理精義附至甚喜隨令書院同人抄寫以為講解之資來敎云論人物當先學問而後經濟論讀書當先六經而後子史世逺年二十以前心粗氣浮嗣後讀宋儒之書知學問本原非此不可務須從此體察本深末茂非徒藉一時意氣之激發也至於有一二全不看史書者每規之亦謂其既知研極宋儒藴奥因而遍覽古今考鏡得失必能大有補於推行處自餘指相規切者皆反此至平日所規箴足下者大都以英氣過勝必以從容涵養為主此遭所論則又以不要畏避為言天下除是作一庸人則悠悠過日若有所抱負設施自不能如意順適况處家鄉尤難之又難正不必以來敎所云謗議為患但藉此以收斂畏懼更見長益耳嘗讀昌黎詩云磨礱去圭角浸潤著光精六七年來嘗奉以為座右之銘願以移贈亦同病相規之意也歴代名臣言行録未知編就否學約乞速改正莊元仲囘家束裝不日當來湖山不宣與黄唐堂學使燕臺領益未暢所云每念孤鴻天外獨鶴雲中未嘗不矯首徳輝係念山亭也邇來學政振飭壺冰之操不足為賢者重獨難得此風雅之宗一段苦心眞氣纒綿淪浹於七建人士之心腹賢腸今雖陵阿舊澤海嶠黄童人人有學古之思身有之故言之親切心誌之故歴久弗衰此固非刻鵠好龍者所能襲取也貴好友顧君小厓同侍禁庭朝夕説項謦欬益親兹因其阿咸南歸肅此奉詢道履弟固非妄歎者不宣寄朱髙安相國數載相聚誼兼師友情如骨肉曩聞太夫人之訃感愴傷悼實非一端既又念孝經之所謂顯親揚名者閣下已無餘憾加以八十餘嵗之壽母六十餘嵗之孝子更可無憾矣伏惟節哀順變養身以全孝即以全忠道非有二也太夫人墓表承命為之愧歉殊甚中有參錯及鄙謭處即為改正父母前稱名自唐宋表誌以來未之有改故不敢從俗稱名之後或稱字稱官韓歐已有為之故不敢拘古知禮者定之答鼇峰書院諸生頃接諸同人手書意緒懸懸即欲奮飛以造三山奈家母所患尚未平復若欲遽離左右寸心憧憧不能自遣伏念同堂聚處將及一年不佞既無道徳又無文章顧所日相諄切者大抵以立志為始以孝弟為基以讀書體察躬行克己為要至於講論經書性理及所改竄時文鄙誠硜硜諄復不厭吾黨有相信從者即不必朝夕相親亦可以自勵矣不佞所望者非徒得巍科膺顯秩而已也凡我同人亦望其希賢聖飭廉隅循循不息以振道南之緒而已此言非迂也以此言為迂者皆無志庸碌之尤諒吾同學無或出此至於時文乃拜獻先資秋闈在即尤宜體玩不但無負當道養育之深心亦已之出身得以不負所學處大抵以清眞雅醇為主起講不欲其多而犯實也起比不欲其長而寛懈也㸃次欲其簡老而明白也實疏欲寫其心得而言有物也收結用整欲其精嚴也用散則欲其古宕也至於後塲主司所以覘人學識平曰讀古所得異日施行正見於此務須竭一日夜之力不可以苟簡速出為主不佞雖在漳浦此心無一刻不在鼇峰同堂所深信諒者倘邀天之眷家母忽爾平復七月杪尚欲倍道而來以覩觀光之樂且再敦勉暢敘何快如之已具賤函達之中丞公附此奉復不宣寄寧化五峰諸生貴業師貫一相聚都門屢稱諸賢志道之心甚鋭深為喜慰是日重陽正當休沐持諸賢請業之書相示不佞見之喜而不寐也年富力强何事不可為只直捷要學聖人夫求為博雅則限於資榮顯富厚則限於命惟直捷要學聖人可以操之自我眼前立大志向定大規模隨所讀之書身體心驗隨所行之事遷善改過開其學識使益宏裕養其徳器使益堅定焉斯已矣藎之來書謂澄本清源惟在義利一闗此最得之義即天理利即人欲當認得透徹斷得斬截如寫書來京所言學業有一毫不本中心發出或拾前人成語要使見者稱為有志此便是浮外為人之心即利心也思大來書稱近日體認吾未見剛者一章與整齊嚴肅四字覺更𦂳切甚是朱子謂徒得一二謹厚之人未必能自振拔而有為故聖人止思得一剛者葢氣質剛勇始足任道但戒浮氣矜氣耳眼前非必便能事事合中尚須細加涵養然軟靡無氣骨人必不能有為也程子論學之功莫要於主敬曰主一之謂敬無適之謂一又曰只整齊嚴肅則心便一一則自無非僻之干然此際加功最難過於矜持則苦而難久稍寛緩又便怠弛惟立志既堅躬行又力用謝氏心常惺惺之法常自提撕斂束自然坐立不至放佚心體不至昏怠以此窮理心極清明以此克己氣極勇決更日加涵養自然徳成而學就所謂徹始徹終工夫也又謂時文恐荒正業欲暫去之夫時文亦代聖賢以立言者只要心得而寫以時文之體勢耳心有實得則文字自有精采科名在其中矣程子謂科舉不患妨功惟患奪志此言盡之至文公家禮最切日用未有學道之人而不行禮者此時得行即行不可有待也且化民成俗莫大於此思源嚮道自比北溪却誰當得朱子惟取朱子北溪之書體究實踐不遺餘力則亦朱子北溪矣況家有賢父兄庭訓之下益加刻勵使父子繼美與宋代胡文定蔡西山二家比隆是所深望也與之來書謂取誠意章黙㑹愈覺警切此欺慊之介體察入細則毛髪竦然願更䇿勵居業録體勘極有益敬齊只一布衣唯能立志居敬苦學程朱故能廟祀百世觀其辨别何等精嚴用功何等堅苦身有與浮慕者不但鬼神不可欺天下後世更不可欺也學山謂朱子全書閱畢欲讀近思録全書中有無限道理體用俱備近思録則領要存焉總在讀時句句切已行事時刻刻對照耳昔在宋代吾閩名儒甲天下多在延建今日臨汀風土人情最近古貴業師倡之於前諸賢互相講勵如上灘之船不上不止則道南之盛復見於今矣不得面暢屬望之深忘其鄙謭然皆肝膈之要不宣與雷貫一兩載都門相晨夕也以令祖母年高急於趨省不敢欵畱歸後忽忽如有所失不佞有疑莫析兒輩不得聆誨言能無繫念不佞自數年來曾友天下士要如賢友之純心篤志以第一等人為可學而至講明踐履不少懈者有幾人哉學者患於無志有志矣又苦不能篤實篤實矣又苦不能曉事以陳北溪之賢受業漳州與聞至道越十年往見朱子於竹林精舍猶謂其尚少下學之功勉之曰當學曾子之所謂貫勿遽求曾子之所謂一當學顔子之博約勿遽求顔子之卓爾北溪自此精進有加葢篤實之難也以司馬温公之學識一代寧有幾人明道猶謂君實不曉事使明道得大用於世其明通公溥比之温公自是不侔然温公尚未足當曉事之稱由是言之學之進境豈有涯哉賢友年方三十有三朝之巨公見者無不崇奬庶所謂篤實而曉事者然以北溪司馬二公律之有不爽然若失乎又何加焉仍在精義集義二者交朂而不息焉耳五峰諸生得承指授英特不羣皆任道之器也然今之士子囿於科舉牿於習尚久矣鄉人知所不屑矣必勉之使為天下所不可少之人匪徒為天下所不可少之人又當為一代所不可少之人匪徒為一代所不可少之人又當為千百代所不可少之人志鋭守堅捐其所甚利而追其所必至自然日進於高明臻於光大夫鼓其趨而指其程途師友之事也餘則在學者之自勉而已有己未克誰則知之半途而廢誰能禁之不佞望之深幸為我朂勵之不佞粗疎寡陋然此心實未嘗一刻少懈賢友嘗朂我以靜時加功靡日不體斯言庶後日相見時稍進故吾也不宣答王槐青太守辱書知賢友刻苦勵志上下咸有聲稱雖曰苦節不可貞然歴觀古今名人志士未有舎澹泊寧靜而可以致逺者況賢友甫成進士即膺太守新命倍加惕勉亦所以去咎戾嚴始志之一端也太守之職雖不若州縣親民朝行而夕及然所治者廣大都以察屬安民為最要屬令有貪惏苛刻者則劾之有庸昏怠玩者則劾之所屬有蠧胥悍役訟棍及大奸慝則鋤而去之至於事故錯誤則原之有心實無他而才能可用者則愛惜保䕶之非徒為愛才起見實為百姓植福也為政一年民信之候益加蚤作夜思以一團精意與萬物相終始嘉績所孚寧有既乎古之化民成俗者必以教化為急務毎觀自昔名賢所涖流風猶堪數世賢友學有本原者也興徳敎明禮法擇秀者於學數親至與之講論自紳士以至里民有敦門内行者或禮請以明敬或表宅以示優人材輩出風俗醇厚恒必由之此皆俗吏所指為迂逺闊疎者然所望於賢友正在此而不在彼也家禮輯要一書乃不佞與敝鄉紳士合訂通行者質之有道而後付梓秉禮者試閱之或亦可推以為楚俗之一助乎壬子九月寄示長兒汝扶汝母柩至家必丙辰公車始得侍吾左右當時時哀痛刻勵勿使吾憂汝無成且憂咎戾日滋所示粘壁間朝夕警省汝當時思汝母病篤兩月餘常呼汝不得一見汝至京汝母汝弟汝妹不知何往時念及此嗜欲懶怠之念自消刻勵顯揚之志益篤矣汝見人不可言笑自若高子臯之執親之喪也泣血三年未嘗見齒朂之居喪不但酒食之宴不可與即家居酒肉亦須戒汝仲弟在京至今尚不近酒肉而外寢也有生客至酒只三巡已執杯而不近唇切不可如平時畱客也居喪遇親朋嫁娶吉事汝但冩吾名帖往賀不可親往喪葬事則酌行之平日無事不出門即往來族友間亦白衣冠家禮輯要所載吾閩已通行汝毫髪不可越我以文公家禮倡吾閩三十年而敎不行於子不大可羞乎在家事叔父當如父事兩叔母如母凡事如已事不可推諉凡藉端避嫌者皆孝友之心不摯也我在家時由親及疎應為謀者必悉心力人亦相諒汝所見也從父弟視之如胞不時誨訓或飯後或晩聚皆當有嚴憚敦切之意勿使墜於閒談不義浮薄成性好美衣食為念第一是使之知重倫輕利使一生之根基牢固又須刻刻告以讀書當切已身體以所言為法戒不是只敎汝為文章也家中内外之防最宜嚴即大石灣潭二處尤當時時照察如捧飯菜男女授受限以閾男僕不可適便自入㕑房捧置宜守此我之從兄嫂寡居二人從弟婦寡居一人各有一女皆及笄我此間無力可分助汝在家治喪欠負未清亦甚艱然不可不勉力助之將適人時或先期字來或自行措助成我志也平居則米鹽相分以澹泊有月給米石者無失家中須節用為先每日食用須有限制輕用不節其害百端又切不可鄙嗇為心凡義所應用不可有一毫吝心也自家用度即紙筆油鹽以至微物皆宜愛惜宜用處則不然若只以求田問舍為心人品最下恥惡衣惡食志趨卑陋之甚者推之凡事皆要虚體面以誇流俗此最壞品立心行事讀書作文不如人實可恥也待僕從不可刻薄然不可不嚴有玩法者立刻處置錢財不清亦即酌其輕重而處之讀書最要限程讀經史性理隨力自限總是毎看必返已自考古文亦隨力讀時文以應試晩間以餘力及之我與汝兩叔父俱不在家汝年少毫不曉事只是閉户讀書誨朂子弟不可一毫與外事但族中事有宜與知者亦勿推諉我原立有家規隨家長贊成之凡事須至誠至公至謙和處之自無咎戾亦無過分處我在家時鄉鄰三百餘家西湖本族皆勸禁賭博二十餘年已成風俗汝力不能本族當與家長申明之鄉鄰則日與鄉耆里正同勸戒自然依我前約也凡行事揆之情理裁之以義切不可為人所愚宵小之輩動以利不聽則脅以名欺誑於初後則云不可中止須自主張不拘何人守義要切父命當遵待人須要從厚人待我不循理我以薄施之是我無以異於彼也只循我分盡我心今日接汝桐鄉季父來字云汝凡事好自以為通曉其實一毫不識蓋家中被人欺誑順奉故也當牢記痛改與人言語切不可有爭氣我見汝在京與人言説常有爭氣此損福損徳之一端須戒晩間方㸃燈時先生為小子説小學數條汝與從叔父諸羣從同在坐要義各為提撕小子傳集不可缺一將來子弟重倫輕利不染習尚庶可不墜家風且或可成人物凡事只可罪已不可尤人薛文清云不忮不求何用不臧是守身常法不可不三思吾家子弟最宜常朂以立大規模具大識見不可沾沾焉貪目前安卑近朱子云天下事壞於懶與私最切今之弊懶則不肯勤勵學殖荒而志氣亦墜私則自至親間尚分畛域有私心尚望其有器識有所建立哉村俗秀才株守時文一冊止望得第夢夢一生與時循環全不計及異日設施若何結局若何者此鄙陋之尤最所當戒即學古而止以為作文章用講學而不能躬行亦甚可恥也我老矣諸子弟有能副吾望者此心何日忘之二希堂文集巻八
