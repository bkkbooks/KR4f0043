body:
  text: 序不謹案是載於樂善堂文集定本而此集實以冠首後題雍正八年八月今據以恭錄云欽定四庫全書集部七二希堂文集别集類六國朝提要臣等謹案二希堂文集十二巻國朝蔡世逺撰世逺字聞之漳浦人康熙己丑進士官至禮部侍郎諡文勤是編乃其所作雜文冠以耕籍賦聖主親詣太學頌青海平定詩序日月合璧五星連珠頌河清頌樂善堂文抄序共六篇不入巻數志榮遇也其餘序四巻記一卷傳一巻論說書共二巻墓表志銘行狀共一巻祝文祭文共一卷雜著一巻目録之後有其門人寧化雷鋐附跋稱其堂所以名二希者世逺嘗自作記言學問未敢望朱文公庶幾其真希元乎事業未敢望諸葛武侯庶幾其范希文乎其務以古賢自期見於是矣前有雍正庚戌皇上在藩邸時親製序一篇稱其講學鼇峯教人以忠信孝弟仁義發明濂洛闗閩淵源有自也及立朝而風采議論嘉言讜議足以為千百世治世之良規則又國家棟梁之任也今觀其文溯源于六經闡發周程張朱之理而運以韓栁歐蘇之法度所謂藴之為徳行行之為事業發之為文章者吾於先生見之煌煌天語載在簡端睿鑒品題昭示中外非惟一時之恩遇實亦千古之定論矣迨我皇上龍飛御極於甘盤舊學篤念彌深乾隆己夘論正文體舉世逺之文為標準癸巳詔編纂四庫全書世逺著作又䝉褒録絲綸宣示均字而不名寵禮儒臣於斯為極今讀其集大抵理醇詞正具有本原仰見遭際聖時契合非偶其上邀知遇固不僅在文字間矣乾隆四十六年閏五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書二希堂文集巻首禮部侍郎蔡世遠撰耕耤賦有序皇帝御宇之二年始耕於千畝之耤禮也臣世遠謹按耤田之禮其義有三已所自親以供粢盛至孝也躬習於農以知稼穡至恪也對時育物為天下率以勸田功至勤也行一事而三善備者耤田之謂也我皇上挺睿聖之姿追皇王之化闢四門以通言路頓八紘以招茂才飭官常以修百職卹民隱以撫萬方弊吏則揚清黜墨移風則尚儉崇淳祗祗庸庸日旰而不遑暇食期月之間典則具舉風教滂流臣竊憬然知隆古以来唐虞三代其無以侔盛也廼修耤田之禮躬率三王九卿秉耒而耕之三推加一禮成念農為天下本詔自京畿以暨河之南山之左右民有積逋賜以緩征所在大吏訪其地老農之儉勤敦樸身無過舉者寵優之秩以八品臣嘗推周頌思文桓二章之指以為粒民者稷之所以配天也豐年者武之所以綏邦也周家宗祖世以農事為緒遂同疆界以陳常天命匪解克定厥家盛徳大業播為樂章其聲鏗闛盈於天地我皇上仁育恩覆無逺弗届而憲古修文重農敦本於前聖有光宜有撰述以摹萬國之歡心導兩間之和氣臣世逺以遭逢之幸抜自海表簪筆螭頭侍學鸞署際兹盛典媿無文章以華國敢忘固陋謹拜手稽首而獻賦曰偉元聖之制禮兮重耤田之親耕洪卓爍以煒煜兮維聿将其恪誠詎鄉甸而無良農兮匪大糦之所馨謇獨俶此春及兮用以供乎粢盛駟玉虬以戾止兮軫深䎩之民情所無逸以知艱兮固王心之所寧兆九域以豐穰兮欻風聲之倰儯􅝨萬乗其猶辛勤兮矧細甚之農􅡦度三時以著制兮媐王政之有成惟􅚳􅚳以敐敐兮舉徳輶而若輕斯憲古以修文兮燀㝢縣而光亨於穆我皇徳崇業廣有典有則以教以養側席而求有言惟讜占善必録擅長斯奨施慶春温旁燭日朗觀民則如風之行涖官則如天之象聽政不遑於曛夕視朝早辨於昧爽聲明旁溢於瀛寰神化同流於穹壤捷若驊騏之驫􅮝應若龍鼉之鼔響憙憙訔訔巍巍蕩蕩洵六五以四三與天參而地兩於時嵗在閼逢律中夾鍾農祥既見韶景方融天廟躔次土􅓊瀧涷史占初吉瞽奏協風天子乃順月令撫時雍念民力敬天工修王制勅秩宗前期祗肅将有事於先農於焉封人設其埓堳稷官申其警諭奉禮序其班階大胥展其樂具常伯獻播殖之儀宗人省牲帛之數其在羣后百執莫不攝威儀竭誠素恪恭待事㒺敢遑寤逮夫元辰既届暁色澄鮮初晞漙露漸歛游烟葩瑵擁簇雲䍐連飜象輿蜿蟺豹尾飛軒天子則被龍袞佩蒼瑌出青陽之左个協鸞和於鈞天介御間以剡耜用稅於千畝之田爾乃降金根之車陟青壇之位考鐘敔兮嚝鍠舉焚燎兮􅀈煝揚祝嘏兮正辭搢珪璋兮大瑞薦明徳兮馨香享孝誠兮斯醉臚駿奔兮就列篤邦祜兮以對祀事孔明薌鬯猶􅤩乃下壝壇乃就耕次乃命廩犧解韜出耒乃命太僕牽牛執轡乃涣絲綸金洪玉晬自古在昔農為重事矧是千畝以享以類曷敢不勤加三為四爰推御耦洪縻手試騬繱犗而服紺轅轛縹軛而馭黛耜軼河鼔以比馴象坤儀以為利維時爾公爾卿為五為九凡厥庶民薄終其畝穜稑孔嘉神倉孔厚用以昭居歆兆時􅀈鳩三農康九有湛湛露兮樂胥侑壎箎兮我牖垂髻兮髫童掎杖兮台耉其心兮克忠厥角兮稽首感大禮之既成慶遭逢之非偶皇上乃念畿以内河以南並太行之左右繡壤錯而相銜泙沛施膏逋徴弛嚴易潞活活嵐憲􅬆􅬆日觀之佳氣益釀崧嶽之膚寸長瞻既近輔以優渥復薄海而均覃考力田之賜爵自漢世為美譚昏勞農以終老揆鋤雲而觸炎茍淳龎其可風錫愚賤之華簪俾皓顛以沾榮庶糲藿其益甘耿聖人之作則皎朝曦之方晝濊霮䨴之波施廓天造之廣覆彼連山之播穀甫肇業而未究粤唐虞之命稷錯鮮食以在宥至夏啟以牛耕始少憩乎人勠洎耤典之既行畫鄉郊而井授相隂陽以渉澗豳可籥而口授編周禮以勤民爰吉蠲乎登豆維斯禮之矞皇值運㑹而重覯炳千古而有光召休祥之輻輳書歸禾以為嘉禮餘三以為富易大有以占亨詩多稌以擢秀經有年之必書斯豐登以屢遘惟設誠以致行故天錫之孔厚賡衢壤以春熙頌我皇之萬壽聖主親詣大學頌有序粤若我昭代誕膺天命撫臨萬方垂光錫祚右文典學昭灼涵煦東西朔南罔不暨訖皇帝纘承鴻庥明哲作則帝王師儒之道萃於一身天下懐徳秉義博聞有道術者莫不近文章砥厲亷隅爭自奮於聖人之世皇哉中天之景象也皇帝重念尊師講道謁聖崇儒風示天下莫急於此雍正二年春三月乙亥朔天子乃盛法服建龍斿蹕清路噦和鸞躬詣大學大昕鼔徴淵淵皇皇釋奠於先師禮成御彝倫堂講明徳新民之經精一執中之㫖厥彰厥微既繹既闡王公卿尹侍從之臣聖孫賢裔暨厥肄業成均之士合二千有餘人咸侍日月之旁飫聞至徳天子乃頒綸綍廣崇聖之配隆褒徳之典傳經之彦衛道之儒孰已退而宜祀孰未入而宜増昇平日久向學蔚蒸擴博士弟子員之額加五經孝秀之升徳化洋溥教澤大洽近光之士八表之遙龎眉童稚莫不延頸企踵鼔舞懽愉曰聖人首出天下文明此其時也粤稽唐虞典樂有教米廩有庠五典有惇直温寛栗剛簡廸於厥中時則四方風動萬世永賴亦越周文亹亹翼翼雝雝肅肅靈臺辟雍其典則隆其意備美故其詩曰肆成人有徳小子有造古之人無斁譽髦斯士惟無斁然後能使斯士奮興故其詩曰文王有聲遹駿有聲又曰濟濟多士文王以寧言文王作人之效而賢才之為國家寳也爰及武王陳書敬勝訪範叙倫師氏以徳教國子保氏養國子以道大司樂以成均之法治建國之學政曰中和祗庸孝友故其詩曰鎬京辟雍自西自東自南自北無思不服無思不服者服之至也長肓有法王心有加故服之者亦報以心也我皇上孝以事親誠以馭物仁以恤下推心以用賢多方以訓士所以豫養奨勸漸摩成就之者靡不曲盡故能使近說逺懐奔走忭躍駕成周而軼有虞漢帝圜橋之聽唐宗建學之盛宋代三舍之規史氏所誇又烏足云哉臣世逺備員講讀躬逢盛事揚扢有懐忘其鄙謭謹再拜稽首而獻頌曰帝徳廣運表正萬邦文同有截化溥無疆金樞丹穴若木扶桑光華所燭錫極陳常聲靈炳彪於斯尤盛五緯集祥九州無競廼稽古制廼溯道宗斆學之本伊維辟雍鄒孟有言後先一揆夫子之道我皇齊軌如月印川圓暉不滓如日中天萬世同晷體厥大成誕敷㝢縣息息相符羮牆若見二載季春朔日既練遂詣寝楹舍菜初奠笙頌西磬其鐘在南樂具奏止事以在三尊師訪道磬折是甘皇之沖徳海負淵涵廼御彝倫横經講義菽粟為膏布帛為賁曰維大學曰明曰新克止至善天下均平曰維聖心傳十六字危㣲之幾誠則無事皇建厥中一而不二錫厥庶民惟中是視臣工生徒百千其偶亦有聖嗣率彼賢後圜橋聽觀有孚盈缶涣若釋氷肅若拱斗緬從洙泗粤若放勲聖聖則同治教攸分肆我皇上為師為君丕宏厥緒咸秩其文既祠崇聖錫厥王封兩廡羣儒亦折其衷如衡之平得禮之義升進廣崇毋失其類煥我宫牆教道扶樹朝陽升梧南山騰霧經生復額弟子增數翕其從風九閶湛露皇矣帝徳於穆昭融跨虞軼周巍巍崇崇天降時雨滂沛浺瀜化澤所協以兆年豐威加鹿塞玉門韜弓止戈為武在泮之功小臣多幸際兹昌辰而目斯擊而身斯親懿我皇上受福無垠於萬斯年保佑天申青海平定詩序維我皇朝受天眷命道徳侔於虞夏土宇擴於漢唐九服寧一萬姓惠康絶島窮徼㒺不置吏争為臣僕其有不率折之以威懐柔震叠赫臨乎方外皇帝膺圖立極纘列祖之緒仁孝廣被聖武布昭虚已推心知人善任一民一物咸厪聖𠂻誠哉天下歸仁四方以無拂也蠢爾羅卜藏丹津青海部落偪近甘涼曩以平定朔漠天威所加震慴納欵聖祖仁皇帝嘉其歸誠寵以王號兄弟數人皆膺顯爵乃隂懐僄狡内憤外巽怙惡日滋悖徳滅義潛通逆冦䇿妄阿剌布坦阻兵安忍同氣自戕梟張豕突皇帝哀矜庶頑不忍加誅遣使暁諭敦誠順而撫之用綏靖我邉疆小醜執迷不思悔禍敢肆陸梁帝赫斯怒指授方畧雍正元年十月命将出師摧其部落散其黨與二年二月我師乗機進克勝氣兆於風雲先聲震於沙漠揚威叠勝得降勿殺訊得虚實批空擣堅鴞喪其林兎迷其穴乗其踣藉取彼鯨鯢生擒羅卜藏丹津之母并取助逆渠魁八人俘男女數萬馬牛羊數千晝夜兼追斬馘三千餘人賊衣婦人衣僅以身竄三月乙亥朔振旅凱旋㨗聞羣臣咸上功徳請御殿受賀帝謙讓不居曰是惟皇考簡用之将豢養之兵用宣乃力克奏膚功朕何有焉但朕躬即皇考之躬俟祭告諸陵勉從所請臣等謹按前代撫外服逺紀有功勲然或利其土宇或貪其寳物横挑威掣非以討罪為心即漢世之平東南越服先零定西域史氏雖誇其事然不免於好大喜功唐平淮蔡韓碑栁雅鋪張揚厲炳耀鏗鍧然用天下全力久而後克孰若我皇上大仁大勇不得已而用兵不踰時而奏績兵不過數千人役不過十有五日勞費少而成功多較之高宗鬼方之伐不需三載方之虞舜有苗之格未及七旬此皆由我皇上神機睿算動合天心聖祖仁皇帝在天之靈呼吸㒺間豐功駿烈於是益光由此櫜不戰之弓造可封之俗申有截之威受無疆之福恭讓哲惠中孚化邦薄海承休永永無極臣等叨侍禁廷受恩深重愧無江漢常武之作揚厲神功各賦近體詩六章謹再拜稽首以獻日月合璧五星聫珠頌有序臣聞天開景歴表儀象以垂庥徳協乾行彚祥符而昭應惟神明之黙契自經緯之潛孚凡當極盛之朝必顯非常之瑞然而司天入奏惟是星輝雲爛之文太史登書無非日麗風和之兆乃若三光聚舍七曜同躔合星辰日月以聫暉歴元㑹運世而罕見溯休徵於上古傳盛美於伊耆欣承隆遇於中天快覩嘉祥於此日欽惟我皇上堯天復旦舜日重華行健勵精贊兩儀而成位體元廣運協五事以均調時當御極之三年令值春明之二月仁風普洽陽徳方亨慶兩曜之重光瞻五星之聚彩恍天衢之輯瑞琮璧煒煌儼玉殿之齊衡璿璣璀璨海天濤湧䨇丸如夾鏡齊飛斗極雲開五緯似編珠並綴祥光繚繞遍八表以騰輝瑞靄繽紛近三垣而拱極而況日維吉午恰符景命之辰時正清晨實際升恒之始舍在娵訾之度位屬乾宫次當營室之躔星名清廟将行吉禮示至仁大孝之徴特顯苞符昭峻徳鴻功之應而廼乾衷益懋巽命謙承辭大美而不居表䝉庥於聖祖却賀牋而弗受謹告瑞於景陵是天意凝禧洵獨超於萬古而聖心躋敬更逺邁於百王臣世逺猥以庸愚備員禁近瞻雲就日慙握管之難窺紀月編年喜簪毫之多慶謹拜手稽首而作頌曰太極渾淪兩儀肇分五行順布逓嬗絪緼其氣在天斯成七曜其理在聖斯成王道王道之成㑹其有極惟純乃備無非天徳維天之徳聖祖肖之聖祖之徳皇帝紹之皇帝膺籙放勲嗣嚳天心黙祐錫兹祉福錫之維何猗歟孔多山川清晏風雨休和詩詠降康史書大有穟穟嘉禾盈於千畝祈穀圜丘同雲沛澤先天弗違應念斯獲惟兹庶徵至治之輝乃瞻上瑞純徳之歸紀年當三嵗次在已朝野昇平賡歌喜起時維夘月萬彚勾芒和風翔洽澹蕩春陽吉日庚午天齊七政燦燦璇樞何徴非應其應維何淺莫測之管窺一二若或得之曉籌初報曙色曈曨咸池騰旭焜燿璿宫曰若聖祖合體乾剛皇帝敬承健行有常緝熙於爍周於八埏是用㑹合為章於天粤有太隂同度齊行儼如䨇璧異彩晶瑩曰若聖祖中和參贊皇帝敬承剛柔合撰以位以肓繼照重光是用㑹合如珪如璋木徳之精厥名維嵗其位東方豐登之瑞曰若聖祖仁育黎首皇帝敬承恩敷九有年穀順成恱豫且康是用来聚降福穰穰南方有爛伊維火徳居丙位離文明是宅曰若聖祖丕崇禮教皇帝敬承於昭大孝聲律身度經曲燦列是用来聚有文有節位中央者厥名曰鎮土徳所鍾光明黄潤曰若聖祖秉信立極皇帝敬承至誠無息格于上下神人以愉是用来聚萬邦作孚西有長庚徳旺於金齊其躔度光彩森森曰若聖祖精義入神皇帝敬承裁制洪鈞惟精惟一執中以運是用来聚宣昭義問辰星在北清影潭潭是惟水徳澄澈淵涵曰若聖祖睿智首出皇帝敬承亶聰如一普天坐照如日方中是用来聚昭明有融惟兹日月協於隂陽惟兹五星應於五常若龍之圖爻象顯設若龜之書九疇燦列是昭至徳廣大精㣲爰標竒瑞集福承祺伊惟上古陶唐之世璧合珠聫遙遙盛事道統治統堯始明之四千餘載皇帝成之丕顯丕承其道大光欽明恭讓光被平章昊天垂象符兆顯然二五叶度億萬斯年河清頌有序臣聞聖人在上天不愛道地不愛寳是故河出圖包羲則之以畫卦洛出書大禹則之以叙疇盖天地一元之氣分而為隂陽播而為五行五行之生以水為先而四瀆之水又以河為大天降嘉祥兆自河洛理固然也欽惟我皇上四徳根心五氣順布孝以事親本愛敬之心以推暨乎百姓誠以事天體元善之長以涵濡乎羣生澄叙官方揚清激濁而百官以治心周蔀屋愷澤旁敷而萬民以察乃雍正四年十二月自陜州至徐邳淮揚黄河清二千餘里歴有數旬臣聞陽氣生於冬至而盛於春清於十二月者陽氣寖盛嵗功方成貞元㑹合之時也清於豫徐揚兖間者宅土中央萬𣲖同流四方之所和㑹也經數旬如一日者皇上中天之治日新月盛光被靡極也仰惟聖祖仁皇帝深仁厚澤涵肓天下六十餘年皇上丕承而光大之以言乎心則清明在躬以言乎治則清和咸理觀乎人文以化成故日月五星徵其應人情以為田故嘉禾瑞麥發其祥兹又見黄河之聿清昭聖人之大瑞天氣感動而地氣應之地氣寧謐而河伯効靈此三才合撰之至理一徳感孚之明驗也乃天眷彌隆聖敬日躋羣臣請陞殿受賀皇上謙讓弗居謂事天如事親受寵若驚敬畏弗懈善則歸親䖍告景陵恩推臣下交儆懋修詩曰昭事上帝聿懐多福孔子繫大有之卦曰履信思順是以自天祐之我皇上乾惕益深位育益宏翼翼謙謙巍巍煌煌所謂多福而天祐者莫大乎此臣叨侍禁廷珥筆起居領訓周詳受恩深重欣逢道寳之昭彰竊慕賡歌之盛事謹拜手稽首而獻頌曰巍巍帝徳上通穹昊髙明博厚誕膺大寳惟徳之徴五行順布川泳岳輝昭回呈露百神受職四靈来遊五緯垂象萬𣲖安流惟河之清千年罕覯上瑞聿彰光啓宇宙皇心緝熙雍雍肅肅江漢秋陽以濯以曝至化所孚洪瀾渟泓清且漣漪正在嘉平河從西来星宿濯波既踰葱嶺積石攸過北繞河湟亘於地軸龍門磊砢澔涆洄洑元氣和㑹誕降嘉祺白魚赤鯉朗映鱗鬐一碧長空素練成綺陽亨嵗成榮光在此貝闕何明珠宫有爛晶潔瑩輝爽徹霄漢豫徐兖揚歴二千里越有數旬其清未已凡兹臣工懽忭盈廷曰惟我皇蕩蕩難名自建極来嘉徴懿鑠是宜致慶聿懐多福惟帝曰俞天實貺予予加抑畏永念前謨皇考陟降在帝左右乃眷既渥申以保佑䖍告皇考以彰瑞應篤叙明昭丕承有慶惟時臣工肅然敬聽謙尊而光聖不自聖孝思維則歸善於親推恩錫類交儆臣鄰昔在包羲寳圖聿獻亦越軒轅魚人来見黄龍螾蜿當舜之時徳水現靈禹則覿之我皇首出邁帝軼王有開必先以有斯祥誰則澄之河伯呈之河伯則辭匪克為之曷為不滓洪鈞是使洪鈞不居伊誰之司究厥淵㣲惟聖成能太極在心即物即誠廓然太虚静正靈瑩孰先感召天一所生四瀆之長爰効其靈功峻崑岡澤浹環瀛稼穡惟寳明徳惟馨三事允治萬象光亨於千萬年永奠清寧樂善堂文鈔序雍正元年世逺䝉恩特召入直内廷隨侍皇四子皇五子讀書相晨夕者九載於兹矣仰惟聖祖仁皇帝尊經典學久道化成我皇上聖以繼聖學貫天人萬邦作則凡所為詒謀燕翼建極以錫天下臣民之福者莫不是訓是行訓誨皇子尤為精詳愷摯皇子仁孝聰明遜志時敏自四子書五經性理綱目大學衍義諸書以及古文淵鑒名臣奏議之有闗於學術治道者莫不講貫習復藴之為徳行發之為文章不為雕飾藻繪之辭而皆有以合乎仁義中正之㫖八年秋九月皇四子自訂其前後所作論序雜文詩賦分為十四巻名曰樂善堂文鈔命世逺序之夫所謂善者在天則為元在人則為仁元者天地之心舉天下含生負氣靈蠢動植喙息之倫莫不有以若其性而資之以始仁者萬善之長愛恭宜别俯仰酬酢莫不由惻隱之心以發故在天曰元善由天而之人曰繼善賦之於人曰性善吾性髙明廣大與天同體樂之者必至於浹洽暢遂烏可已而不自知然其要有三曰窮理曰克已曰虚心人倫物則之原未徹則好善之心不篤書曰惟精中庸曰明善言善惡之介當精以決擇也然累於有我曷以克樂大學曰慎獨濓溪曰果而確言念之初生當謹持而充擴也已克則私去私去則心虚易大象曰君子以虚受人虚則誠誠則公公則人我之界胥忘咸之感以無心貴故曰天地萬物之情可見矣皇子以此内治其性情敦善行而不怠因之著為心聲情深而文明醇茂而雅則皇子勉之哉古之人無斁示我顯徳行樂已性之善即樂天之善也樂人之善猶已之善也以裕諸心以措諸行若榖種之生生生而不息親之若芝蘭之臭聞之沛然若江河之決善孰大焉樂莫至焉徒文云乎哉二希堂文集巻首
