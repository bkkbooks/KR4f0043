body:
  text: 二希堂文集卷四禮部侍郎蔡世逺撰安溪李先生壽序君子之壽於世莫大乎與人為善與人為善之心是天地之心也天地之大徳曰生生生之理所謂元也元者善之長也於時為春於人為仁君子體仁足以長人體生生之理於一心而行之於無窮也人之心本有是天地生生之理牿於氣囿於習而善心之遏絶者多矣仁者完其理充其心以及於物其道之行則舉君民而堯舜之其學之傳於天下後世胥千百年而不敝焉所謂壽也吾師安溪公少禀異質自弱冠時體驗乎經書沉潛乎宋儒之學者有年長而不懈老而益加明焉方其入中秘躋禁近教習庶常禮闈取士時薰其徳而善良者不知凡幾矣天下巍然奉公為正學之宗而公方退然自挹損也天子命公督學京畿旋膺巡撫重寄助朝廷分陜之化深且溥矣迨由冢宰陟政府䕶持元氣激濁揚清所奬㧞士初不令其恩自已出也嘉謀嘉猷入告我后天下莫能窺也欽惟皇上濬哲文明崇經重道公出所學以佐吾君凡諸經書性理躬自編摩上親加訂正自朝至於日昃亹亹不遑聖君賢相相得益彰用紹明前緒折千百年之中廣錫類於天下天下靡然向風昔韓魏公元勲盛徳聞人有一善則曰琦不及也然嘉祐治平之際不聞其君臣相與闡㣲言剖大義也二程張朱一登仕籍即以格心為急懇懇焉務積誠意以動其君然所遇無明主故其教不能自上而下未有遭逢堯舜主臣一徳矻矻孜孜如日中天明以覺世者也乙未秋公自政府假歸所為家規鄉政本至孝至弟之心以行於家以達於鄉以普於物泉漳時方亢旱獨湖山前後隂陽順序年穀豊穰豈非善氣之所積歟生生之理善之長也已與物之所共也貴與賤之所同也何間於在朝在野哉體吾仁以及之而已公所識㧞甄陶之士前後成名者衆或以功業見或以道徳顯獨世逺碌碌無似惴惴恐懼辱公之門也今歲應中丞陳公之招主鼇峰書院竊不自揆欲本公之學推公與人為善之心聚九郡之士而諄勉之使不牿於氣囿於習以復其善心之本然而學殖荒落尚恐咎戾之不能自逭也秋九月六日值公嶽降之辰謹率鼇峰諸弟子望湖山而祝焉各為歌詩世逺敬序之如左云蔡母林孺人八十壽序吾族於閩稱故家散處漳泉間康熙戊申族兄介溪公隨其叔父涖任諸暨道出浦城卜居焉至今族姓繁衍文物蔚興遂為西山望族云庚寅仲冬余丐假南歸過浦適值嫂氏八十設帨之辰諸子若孫咸請一言侑觴余曰欲觀嫂氏之徳者觀於其家而知之矣介溪公傳至於今四世子三人孫七人曾孫二人又所撫猶子三人三人所傳又有子八人孫二人猶與介溪公一脉合聚而居也余既羡同居之美嘗細舉以問其家諸孫廷鑣等告曰是皆吾王父母之訓也王父以壬午年考終王母時年七十餘猶手營家計總其大綱而誨以徳義平居嘗召諸子婦輩命之曰凡吾子婦無私貨無私積無因小利而忘至親毋以小嫌而成釁隙讀書者勤於家貿易者勞於外凡有所入悉歸之公又曰凡家之不和多起於婦人婦人之患在於各私其夫各私其子各私其夫雖其夫之兄弟不顧各私其子雖其子之雁行不恤分離乖隔寖以成大汝等戒之吾一門合食者子姓童僕將百人汝等惟以親睦為心無多言無生事不率此訓者非吾家婦也治家以儉待下以恩故雖食指繁多而家計不嗇事務叢雜而踴躍爭先大小尊卑各事其事無間言也以至於今余聞之不禁爽然若有失也曰是豈不可以風世乎夫家者國之本也和者福之聚也雖有貴顯富厚之家而其父兄子弟之間稍有離心家之衰也日可俟也雖有貧窮困苦之家而其父兄子弟之間常有和氣家之隆也可預卜也今嫂氏能以其訓訓之家人四世同居如膠漆之固琴瑟之調焉此在古人猶難之余方將聞之當事以旌其閭以表其徳庸不出一言以進一觴乎余又觀諸子弟賢而能文秀而不凡光逺有耀自今基之因書以為序孫封君壽序孔子曰人之生也直解之者曰生之理本直也又曰非此則不生也直之發為剛明為公正為惠愛是皆生之理也剛明之反為暗弱公正之反為邪私惠愛之反為薄狹則生之理已失雖生猶寄也孔子繫易曰天地之大徳曰生又曰生生之謂易何以明之天有太極健行不息二五逓衍變化生生惟人也得生生之理以為生故直養無害則可以塞天徳貫古今彼年壽之生氣也數也然理足以生氣亦足以起數詩曰樂只君子遐不眉壽書稱壽考康寜必次於敬用五事念用庶徴之後是也衆人蚩蚩非無年壽之生徒與蠕動卉植芸生於大造之中非吾所謂生生之理也抑天有生生而所生之物若山峙川流其苞孕涵育又生生而不息斯亦如人之裕生生之理者其子若孫又各衍生生而總以歸之其大生也合河孫封君其諸所謂備生生之理者歟封君少孤力學憤俗學之弊以儒先之書及古文振興之範族和鄉有疑者争者羣往質焉咸釋難平心以去邑有岢嵐州兵米數千石歲饑建言於官以米平糶以價予兵其抱經世之略多此類也長子無端被禍封君入獄手刃讐人遂棄諸生所以律身誨子者益篤合生平行事觀之庶所謂剛明公正而惠愛者歟子三人皆成進士叔曰嘉淦與余交最篤為國子監司業通經飭行人以為陽亢宗胡安定復出也乙已正月二十有八日為封君七十有一初度諸生咸走徴余言以侑祝因舉生生之説以為壽而証之以易詩書所云焉昔歐陽崇公懐好生之心有子文忠公為一代偉人胡文定家範尤嚴戒子曰立志以明道希文自期待立心以忠信不欺為主本諸子致堂五峰果有名徳司業兄弟勉之克已修身學為世用光大髙明歸於大成使人稱曰是某公之子也所以壽封君者不更顯且大歟此亦天地生生之至理故推而及之是為序何介伯六十壽序吾浦當明季時何黃如先生氣節文章與石齋黄先生齊名天下至今稱黄何云先生之嫡孫曰介伯嘗刻先生遺集屬余序而傳之余於是益稔知介伯之為人介伯性行溫良交遊不苟少補龍溪弟子員壯遊學京師家居以詩自娛興至徜徉山水間又嘗修築宗祠不惜已力值兹六袠之辰同人屬余為文以壽之余嘗謂世俗澆漓後生小子轉觚琢樸鄙菲前輩巧吝日滋見老成之渾質則指以為陋也見長者之風範則詆以為拙也元氣已削壽命何足言甚有結納自豪豐衣美食而至親一介不與者矣可已之費恣如泥沙而祖宗先人事則棄之如遺且與族衆爭絲毫者矣人心風俗之隠憂豈細故哉介伯自浦之鎮海遷居郡城合族而聚子姓繁衍登科第遊黌序者踵相接也介伯厚以居心和以睦族自兹以往日取乃祖忠孝大節諫垣抗疏野處思君者與父子言慈孝長㓜卑尊以敦以序書曰立愛惟親立敬惟長則元精之妙合者此也日取乃祖勤學好問註經研史日夕不遑者以朂子姓懦者起怠者奮詩曰我日斯邁而月斯征則族屬之熾昌者此也余自十載家居嘗惴惴懇懇於此亦夫已氏所譏為陋且拙者故因介伯之序而論及之以當侑祝壽退巖兄七十初度序夫壽之大者莫過於聲績流乎無窮而子孫賢而有立位不必居髙也貴善厥職焉子姓不必貴顯也貴世厥家焉謂其為徳之輿而光之逺歲甲辰八月一日退巖伯兄七十初度子弟在都門者羣徴世逺一言以為壽世逺不能文以親故亦不敢文也兄自㓜敦行善屬文登甲子賢書謁選得廣西興業令地僻山深猺獞習為盗前官莫治兄初視事許以自新不悛者擒置之法有龔渤海之風踰年丁外艱歸民遮送餽金却不受粤西人至今稱之服除補任丘任丘畿輔地當南北孔道往來供億歲率用銀數千兩往例設十二里輪值民苦焉兄悉肩之一錢不以擾民邑東北被水田廬漸湮百姓請開欽堤河官持不可兄曰朝廷設堤本以為民吾豈可避考成不為民請命乎遂洩之奉命賑災實政均沾胥吏不得毫髪私凡兄善政多端皆此類為令十二年以引年歸邑人立書院於西闗以志思世逺去歲奉召進都夜宿任丘旁近民聞有蔡姓自閩中來者爭問曰吾父母安否此吾邑第一好官也對曰吾兄也康强猶昨則大喜奔相告趨蹌敬禮有加余於是喟然歎興曰一隅戴徳千秋俎豆豈不信夫彼封已以自戕者獨何人哉在任丘日不用内幕以二子自隨二子長賓興次元成皆孝亷也他人有利父得宦資以為已地二子獨以亷惠佐父牧民二子賢也家貧公務有不充者仲弟詒皇鬻産資之不惜已私以成兄之仁仲弟賢也是時從弟藐村為山左魚臺令亦以亷明著燕齊賢令有二蔡之稱從弟賢也賓興後登乙未進士第今為令長寜能傳父教藐村奏最入都令為工科給事中獻替於天子之前聲藉公卿元成詒皇亦以公車在都詒皇又將為令矣所謂子姓賢而有立者吾知其涵濡朂勉以競爽而鳴鏘也詩曰樂只君子民之父母又曰樂只君子保艾爾後以此壽兄其亦怡然矣乎兄自先世分派居泉州王父太僕公與吾先人同官於朝兄弟相敦善今吾復與諸羣從子姓同聚京師悦情話而規徳業靜言思之竊有餘幸因稱觴而念祖且以侑勸也熊封君壽序雍正六年八月十一日為巖叟先生七袠之辰子編修暉言敘次美行求余一言以侑觴余閲之憮然曰是古之所謂孝亷也可以壽世矣漢時重孝亷之科或舉孝或舉亷或孝亷並舉東漢始分為四科然不聞得人盛於孝亷也孝亷取實行不試順帝時左雄始奏試之諸生試家法文吏課章奏然不聞已試之後得才盛於未試也隋唐以來專以文辭第甲乙故今謂登乙榜者為孝亷名似而實非矣先生學成雋於鄉應孝亷之稱三上公車不第以父母暮年絶意進取承歡膝下色養志養無忝可謂孝矣性介潔嘗曰薦紳不苟求猶人不為丐不苟取猶人不為盗可謂亷矣司教彭澤敬學勸行不沾沾於文藝之末其所謂師道立則善人多者乎水有源而木有本吾聞先生王父大仰公以冒刃救父傷目睛突出人稱為孝眼先生則孝之所由來也父脱塵公以還金見稱則亷之所由來也先生萃祖父之美以體於身以教於人光啟開麗克昌乃後編修勉之孝者仁之本也由愛敬之心推之至無不愛無不敬孟子所謂親親而仁民仁民而愛物皆孝之所流也亷者義之立也由不為穿窬之心推之至於事各有宜以協天則南軒所謂無所為而為是皆廉之所充也先生之篤行流光人子之顯揚褒大止此而已又多乎哉敬以此復於編修而以壽先生焉二希堂文集巻四
