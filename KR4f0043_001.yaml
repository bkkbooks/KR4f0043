  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 二希堂文集卷一禮部侍郎蔡世逺撰稽古齊文鈔序世逺官翰林時䝉聖祖仁皇帝命分修性理精義親承誨㫖者將一年逮我皇上嗣登大統纍膺不次之擢得侍日講注起居忝與經筵沐恩光而親訓誨至深且渥又喜得侍書皇子相與講貫討論無間寒暑人生遭逢之幸報稱之難無以逾兹雍正八年冬皇五子彚訂其古文詩賦名曰稽古齊文鈔夫所謂稽古者豈徒博覽泛涉專為記誦組織之學與文人學士爭雄長競才名而已哉稽古忠孝之大節根于天性而不容已發揮流露於云為動靜而罔不充浹則敦本明倫之實昭矣稽古聖狂之分義利之判是非得失之所由然因革損益升降汚隆之所由著則謹幾慎動之功懋矣皇子至性過人孝恭肫摯與皇四子朝夕相聚飲食居處同所讀之書同所作之文同怡怡愈愈歡悅無間日體皇上之訓以朂其德業以慎其起居故其發之文者光明洞達微彰畢露若網之在綱若玉之在璞若珍藏寶物之生于溟渤廣淵任人搜取而不竭此豈文人學士習為靡麗雕鏤者所得舉似其萬一哉書曰其稽我古人之德程子曰稽古正學明善惡之歸言力行之必由于稽古也皇子其日以古人之所善者為法古人之所非者為戒即以己所自作之文之所善所非者以自律其躬而考其言行所善者必躬自行之所非者毋躬自蹈之夫集中所載經書性理歷代帝王名臣之論皆究研精微慷慨論列使見者鼓舞奮興悠然神往而不自禁他若雜文詩歌皆心得所發也皇子誠因文以考行敬德而不遑則動巽之益日進無疆矣歷代名儒名臣循吏傳總序學術之與事功孤卿之與庶尹殊途而同歸百慮而一致者也民受天地之中以生五性粹然至善用直內之功敬修而不怠方外之功集義而無歉則元善之長充周而不可窮先聖傳心之學于是乎在上之為論道經邦之儒次亦為一民一物之所恃賴故曰同歸而一致也譬之原泉廣津發自崑崙放而為河海流而為百川潤桑田而滙沼沚皆是物也顧人生而靜而後質與學之所近或偏得其一體漢唐以來通經履道之賢匡君定國之彥親民濟物之選代不乏人就其合同而論之三者本一無事于分其本充者其末茂使董廣川大用于漢文中子及遇興唐功不過于蕭曹房杜哉程朱大儒也明道勸神宗防未萌之欲以十事進君能堯舜其君者也及出令晉陽扶溝化理昭彰非守令所當法乎朱子在朝四十六日進講奏疏名臣風烈萬代瞻仰及觀其浙東南康潭州諸治績豈兩漢循吏所易及乎且如司馬公許魯齊復何分于名儒名臣哉故曰無事于分也然使語魏丙姚宋以精一之學則粗矣抗召杜卓魯於魏陸韓范之列則遜未逮矣三者之中又各有等級次第則亦不必于合也方今天子神聖道統治統萃于一身以至道醇修朂士類以臯夔稷契望臣鄰以亷謹仁明飭吏治一道同風之盛于斯乎遇之高安可亭朱先生服儒體道負開濟大略入為卿士出為牧伯由冢宰陟台輔以襄聖天子之盛治與世逺同事禁廷一日語世逺欲纂漢唐以來至于宋元名儒名臣循吏等傳各為一集合為一書世逺在鼇峰書院時故嘗校刋先儒諸書又私纂歷代名臣言行録實有素心顧以均服職事未遑手録屬諸同志四五人分纂傳論高安公定其領要重申討論世逺亦旁覽廣搜細加參訂再閲嵗而書告成事蹟繁多年代久逺或恐有紕漏舛錯之譏要可為高山景行之藉士幸生堯舜之世懷三代之英三者之中服膺砥厲備其全體固足以求志達道成曠代之人豪即得其一節亦足以寡一身之過淑躬而濟物藹藹吉士維天子使人材之盛比於成周風俗之美躋於陶唐是則編輯是書者之惓惓也歷代名儒傳序聖人之道具于經故必知道而後能明經然傳經亦所以存道自孟子後漢儒有傳經之功宋儒有體道之實漢初董江都學貫天人定一尊於孔氏罷申韓蘇張之學儒之醇者矣然伏毛孔鄭諸儒各有傳經之功不可忘也有宋周程張朱五先生繼起直接孟氏之傳聖道如日月中天道統之所由集矣而其時師友之相與講習而衍𣲖者何其盛也輕漢儒者以為徒事訓詁而少躬行心得之功不知代經秦火漢儒收拾於灰燼之餘賡續衍繹聖人遺經賴以不墜漢朝得收尊經之效定四百年之基六朝反之而替唐貞觀因之而昌漢儒之功其可掩乎議宋儒者以為研精性命恐少致用之實不知修已盡性功施靡極使程朱得大用於世隆古之治可復也宋季指為僞學國隨以微魯齊之在元略見施用有經邦定國之功明初正學昌明成𢎞之際風俗淳茂近古嘉隆以後人不遵朱學術漓而政紀亦壞非其明效大驗歟譬之談周家王業者漢儒其后稷公劉古公也宋儒其文武成康之盛治也今尚論文武成康而忘后稷公劉古公之肇基纍仁可乎然使但稱后稷公劉古公之能興周而不及見文武成康之盛治其遺憾也不又多乎我皇上尊經重道作君作師超越百王漢宋以來諸儒特增從祀兩廡天下靡然嚮風矣高安朱先生體究正學服膺儒行論道經邦之暇與世逺議修歷代名儒傳因屬其及門安溪李君立侯纂為傳論李君通經考道得家學之正傳自漢至元編摩閲嵗高安公與世逺又討論而考訂之毋取其濫飾節而墜行者雖有儒名必黜毋取其隘服古而清修者確守先緒必録學者茍能志道以明經復因經以求道不岐於異說不汨於功利明善克私惟恐不及以兼收漢宋諸儒之益將藴之為德行行之為事業國家有用之儒彬彬然輩出矣歷代名臣傳序名臣傳之始於漢何也秦以前左氏史記簡而備矣秦無名臣也削陳平趙普何也羅豫章謂立朝以正直忠厚為本陳趙於四者有歉焉非所以示訓也故削之也茍其心有可原雖濶疏如陳竇張浚必録之茍其心有可議雖事功如陳趙必削之猶名儒之不列揚雄循吏之不列趙廣漢也廣漢猶純用鈎距之術揚雄為莽大夫故均削之也漢唐以來人材輩出後先相望略綜其概雍容翊贊有始有終者魏丙第五倫姚宋王旦李沆韓富也才本王佐學為帝師諸葛武侯陸宣公范文正司馬文正也身為開國功臣而遂相之紀綱百度者蕭曹房杜耶律楚材也抱負經綸鬱不得施嚮用方殷遽奪之年者賈誼楊綰也頗見施用功在天壤竟以齟齬不究其材者裴晉公李忠定也屹如山嶽不可動搖所遭不偶蹇蹇匪躬王嘉李杜楊震褚遂良嶽武穆也苦心調護輸忠報國者狄梁公李鄴侯也劭德高年蔚為國瑞者高允文彥博也盡行所學魚水相歡貞觀致治幾於三代魏鄭公偉矣蘇綽王朴雖偏安之臣未可小也安邦戡亂德盛禮恭郭令公尚矣周勃父子溫嶠李晟祖逖宗澤孟拱察罕帖木兒或功已成或志未就亦足欽也謀略蓋世寵利不居張子房髙矣東京鄧禹亦可嘉也抗節不屈則張許段顔文信國余闕最烈直言不諱則汲黯鮑宣劉蕡陳瓘胡銓最顯合千數百年之巨公碩彥崇勳峻節彚次成書若聚之於一堂而親聞其謦咳緒論也若設身處地而親見其設施張弛溫恭之度剛明英卓之概也觀其人論其世名臣之行事備而古來用舍得失君子小人消長之故亦略可考矣編次者誰自漢至隋南城張君百川也唐至後五代漳浦藍君玉霖也宋至元安溪李君世豳也高安公既定其規模三君纂討之世逺僭加修飾之高安公又從而潤色之蓋高安公贊襄密勿於帝廷時聆疇咨之訓賡明良之歌世逺又簪筆起居忝在講筵侍從之末四載以來每親聞聖天子之所以誨飭臣工示以忠誠體國忘私忘家者諄懇詳盡非語言記注之所能繪可以垂之千百代而為典謨爰推本此意與諸君合訂此書以備朝夕之省覽起臣子之興觀有志之士奮乎百世之下以斯書為階梯而上溯焉臯益甘傅周召可比隆也漢唐以下云乎哉歷代循吏傳序昔在帝堯克明峻德平章百姓協和萬邦帝治之隆萬古為昭及考二典終篇而知時雍之化雖本於峻德之明實因內有九官外有十二牧師濟盈朝循良布列也內無九官不能以成都俞吁咈之盛外無十二牧則承流宣化者闕焉又何能官得其職吏當其材蒸為風俗哉十二牧之職即漢之刺史牧守宋之節度觀察廉訪轉運等使也帝之咨十二牧曰食哉惟時柔逺能邇惇德允元而難任人蓋亦不外養之撫之厚德以風之飭屬以安之而已此後代循吏之極則也欽惟我皇上留心民瘼選飭吏治凡廉聲丕著實績昭彰者必加以不次之擢反是者則降且黜天下親民之官爭自濯磨以成時雍之化矣竊謂親民之官以廉為基以仁為本引而近之欲其親格而禁之欲其嚴理之欲其明措之欲其簡慮民之不給也為之課農桑訓節儉輕徭役廣積蓄遇有故則賑貸之又加詳焉慮民之不戢也為之教孝弟敦睦姻懲誣黠息訟爭以事至者誨諭之又加詳焉根於中而不徇乎外者賢守令也結歡上官而不體下情者民之蠧也自恃無他而張弛不協者誠不足識不充也視猶傳舍因為利藪者本心既失殃及其身者也審此數者其於帝廷咨牧之意聖天子懷保之心庶有合乎南靖張君季長學古通務有守有為之士也適髙安公與世逺欲修歷代循吏傳屬其手纂既成加以釐訂與名儒傳名臣傳並梓以行世逺不揣固陋敬論之於簡端以質天下之有志於化民成俗者四書朱子全義序聖賢教人之法莫切於四子之書解四書者莫備於朱子朱子之解四書也有集注有或問有中庸輯略有論孟精義議論往復則散見於文集語類諸篇讀四書者即朱子之書三復之而義具矣四子之書平近無竒長國家者恐人之不肯誦讀而玩索也於是以經義取士定為程式使自證其心得而發揮其藴奧非由此者雖奇材異敏魁閎博通之士不得以自進又恐人之背馳其說附㑹舛錯而莫知所折衷也於是以朱子之注頒之學宫使天下讀是書者有所依據而返之於身以措之天下國家者可不留餘憾矣沿習既久學者視為具文甚者惑溺於異說汨沒於講章厭棄傳注支離剽竊無有力究聖人之微言大義者嗚呼朱子之學不明而四書之義亦因以晦矣朱子竭一生之精神以作集注精微洞徹銖兩悉稱然必參之或問以暢其說參之輯略精義以致其詳參之文集語類以博稽其義類而辨别其㫖歸其覽之也全故其研之也悉其知之也至故其行之也力以之為文章則是非不謬於聖人以之建功業則巍然為命世之豪傑然則今之讀四子之書者專求之朱子之書而已足而朱子之書簡帙浩繁無力者若不能遍致又不能合聚於章句之末以得其要約之方也柏鄉相國魏貞菴先生有憂之採朱子諸書彚於集注之後名曰四書朱子全義先生輔弼兩朝聲績論著炳烺天壤顧此書尚藏於家未鋟以行世嵗庚寅季子念庭來守吾漳始出以授詹兼山先生校而刋之兼山為吾漳隱君子考訂既核剞劂成書念庭屬世逺序之世逺海濵末學何能窺見萬一顧嘗讀此書而歎其義藴之畢該編次之盡善也前乎朱子之解四書者朱子或則存之或則為說以辨之矣後乎朱子之解四書者其佳者多不出朱子之範圍其自詡為奇異可喜者皆朱子或問中之所刋駁而不遺者也其駕空躐等恃超悟而誇新得者皆朱子所彌近理而大亂真者也其句釋字解使本文語意反以沉晦則近世之講章而朱子所詆為俗儒者也方今天子神聖久道化成特躋朱子於十哲之次凡朱子之書靡不通貫而表揚之是書之出適當其㑹吾知天下之讀是書者由朱子以上求之四子沉潛反復不囿於科舉而有以自奮其身於聖賢之歸治隆於上俗美於下則貞菴先生之嘉惠後學誠宏且逺也念庭克承父志而梓之以行世亦可謂繼述之大者矣薛敬軒先生文集序文以載道也古之人文與道合而為一今之人文與道離而為二合而為一者本之躬以立言發乎邇見乎逺離而為二者馳騁以為工靡富以為博骩骳險僻使人割斷難句以為此真古文也不知其離乎道也逺矣聖賢之文如日月經天江河行地由其根柢深厚故其發於言者不求工而自工自孔孟以至程朱無異道也有明薛敬軒先生由程朱而上學孔孟者也當其時稱之者或曰今夫子或曰真鐵漢或曰本朝理學一人或曰學已至於樂地亦可以得先生之為人矣今讀其文和厚易直止求於理之至當達其意之所欲言若不顧執器滯言之譏要其言之不合於道者鮮矣抑吾於先生贈送之文更有取焉人生有友明之贈答有仕宦之往來道益廣則言論益多名益沸則慕其文者益夥豈能逃之以自高先生之贈守令則勉以守令之職贈監司則告以監司之道贈同朝則朂以直已行道務以達其欵欵之忱而後已嗚呼此皆惻隱之心所發也向使先生欲見才於文而馳騁以為工靡富以為博骩骳險僻割斷難句以為古豈不堪與文士度長潔短哉然終不肯以彼易此者欲使文與道合而為一也朱子曰古之聖賢其文可謂盛矣然其初豈有意學為如是之文哉有是實於中則必有是文於外先生得之矣楊龜山先生集序道學經濟文章氣節四者合而為一者也俗儒不講以道學之人論多迂疏而不適於用詞尚質朴而不合於時其為人大抵簡易平淡未必有一往不可回之氣嗚呼為此言者猶夏蟲不可語於氷井蛙不可語於海其無與於道也審矣夫學貴有本無本之學縱修飾補苴無用於世有本之學其根沃者其葉茂本聖賢所以出治者發而見之事業是則莫大之經濟也與師友講明而論著罔非載道之書是則莫大之文章也可死可辱而浩然之氣剛大常伸是則莫大之氣節也吾於楊龜山先生見之程門高第稱楊游尹謝獨先生之學最著上接濂洛而下開考亭之統其傳又最廣而余獨歎先生經濟之宏氣節文章之高士子懷奇抱異散處下僚未有不以才大用小自傷淪落者先生浮沉州縣四十年自為徐州司法歷知瀏陽餘杭蕭山諸縣絶無出位求進之心非所謂進不隱賢必以其道者乎及其晚節立朝人方持祿養交以竊榮貴先生嚴氣正性章數十上排和議收人心肅軍政論三鎮必不可棄方田水利花石綱之害必不可行李邦彥李鄴之徒必不可用使從其言豈有靖康之禍哉當蔡京貴盛之時先生以一縣令抗之卒之浚湖瀦水之事格不行是其氣固已蓋天下也當王安石邪說盛行之日先生抗疏排之是能放淫辭以間先聖也讀其文發揮義類抒寫性情然則先生之氣節文章何不備哉或又以為先生於數者實所兼長豈知皆本其平日明善復性之功所流而貫之者乎夫宋儒之中夷猶恬曠莫先生若也然其樹立議論卓卓表見如此亦可以知其餘矣因序先生之集為發其大凡以見士貴本實勝也居業録序居業録向未有刻本世逺始見儀封張先生於三山署中授以是書曰玩此則見理自明心自靜且曰人可不自奮哉敬齊先生一布衣耳巋然獨立蔚為一代儒宗遂至從祀廟庭享食百世人可不自奮哉世逺讀而識之不敢忘至是將以受梓因不辭固陋而序之曰當正道顯晦異學爭鳴之日徒得一二拘謹之人不足以追踪往哲而振拔流俗謝上蔡稱孟子强勇以身任道所至王侯分庭抗禮壁立萬仞由其氣足以勝之也朱子曰曾子大抵剛毅故能獨得斯道之傳子思行事他無所考如孟子所云何等剛毅由是觀之血氣之氣不可有義理之氣不可無豈故為矯異哉不如是則無以仔肩斯道而畏縮囁嚅之態必不足以挽頽風而起末俗也然茍非其心之細見理之明則雖揚躒踔厲不過湖海豪氣矜已傲物與聖賢道義之氣何涉哉詳考敬齊生平以求放心為要以居敬窮理為宗其研極天人剖析理欲真不遺餘力矣而其剛大之氣發見於語言行事之間觀其主白鹿之教毅然以斯道自任與白沙同遊康齊之門至譏其凌虛駕空儱侗自大羅一峯張東白皆當時巨公往復論辨無所屈攘斥佛老痛抑功利使其立朝則伊川經筵之疏橫渠召對之言斷可為敬齊信之也且使敬齊少貶其道以徇於人勢位豈不可立致然終不肯以彼易此者見理明而浩然之氣勝也張先生平日得力於是書者已久兹特刋布以開示來學世之學者茍能不懾於卑賤收其心養其氣於以入聖賢之奧不難矣周易淺說序閩自龜山先生載道南來理學之盛甲於宋代沿及有明風流未歇正嘉之際姚江以良知之學倡天下龍溪心齊流弊益甚獨閩之學者卓然不為所惑同時若虛齊蔡氏次崖林氏紫峰陳氏尤其較著者也虛齊之學篤守程朱經書講義䝉引尤為學者所宗存疑淺說相繼出遂與並峙一時次崖蓋私淑虛齊者紫峰則虛齊之高第弟子也自宋元諸儒以後言講義者必推三家我聖祖仁皇帝御纂周易折中旁求遺書於三家易說多所採録顧䝉引存疑皆久已行世惟淺說尚未重梓以故其傳未廣雍正十年先生裔孫孝亷松茂謁選至京擕其書屬余序以付梓余惟易之為書潔淨精微廣大悉備邵子言其數程子言其理朱子兼之發明象占實指為卜筮之書以前民用夫數未始不本乎理理未始不兼乎數君子居則觀其象而玩其辭動則觀其變而玩其占數先生之指一也先生之解經也探羲文周孔之精意而出以淺易之辭語必求其可據不涉於影響亦不務為艱深使讀者了然於文義之間而體玩服行庶乎可以歷進退存亡而不失其正矣嗚呼易之用廣矣大聖人尚欲加年學之以寡過况其餘乎本之以孚守之以貞而因時以善其用又能懼以終始焉此寡過之方也松茂能褒揚祖德俾是書得與䝉引存疑並垂不朽且使天下如我閩學之精且詳如此有志者亦可以奮然興矣學規類編序中丞儀封張先生以伊洛之傳開閩中正學仰體皇上崇儒重道訓飭士子之意特設正誼堂於三山㑹城手訂學規類編一書示學者以從入之方用功之要書成命世逺序之因述先生之意而竊有言曰堯舜禹湯文武周公之道至孔子而大明孔子之道至孟子幾息而復明孔子孟子之道至周程張朱久息而復益明凡其循循啓迪皆使人復其性而已其要有三曰主敬曰窮理曰力行不主敬則無私之體何以澄之不窮理則天下古今當然之則何以考之不力行則所謂道聽塗說而已何由有以復其性之本然哉明儒有言道學不明士子或趨於勢利或溺於詞章或流而入於禪學世逺竊以今世之病大半在於勢利詞章其後焉者也禪學又其後焉者也士子束髮受書凡父所以教其子師所以教其弟者不過以拾科第取利祿為急務身心性命有如外物甚或攀緣趨附以為進身之階幸而得志則以持祿固位肥身保家為長䇿其有能卓然自立成一家之言以垂不朽者有幾人哉宋之眉山明之北地詞章之雄者也雖其於道未能有聞然素所樹立類皆髙自位置有所不為豈肯與夫已氏者決榮辱得失於一夫之口哉今之以詞章自名而不雜於勢利者實未數數見故曰今世之病詞章其後焉者也宋朝當理學昌明之㑹周程張朱數君子比肩而起德性問學之功昭昭若揭於天壤學者有厭若於格物窮理之煩者倡為心學之說恃其超悟凌躐等級一以致虛立本為宗其弊不為佛氏明心見性之學不止是以有心斯道者起而攻之然其為人大都義利辨取與嚴出處正特以學術之差有以誤天下後世不能不急為辨耳今之人方且營營逐逐於外而無所止尚慮其流入為明心見性之學哉故曰禪學又其後焉者也先生以一代醇儒當倡明絶學之任欲返禪學於道藥詞章以正而力啓夫勢利者隱微深錮之病首刻是書尤為深切著明學者茍能純主敬之功窮理力行以復其性之本然將歷聖相傳之道萬古猶一日也洛閩之學其復興乎濂洛風雅序以詩傳其人不若以人傳其詩以詩傳其人者詩不傳則人不傳猶茂樹之一葉廣厦之片瓦也以人傳其詩者人傳則詩亦傳猶桂林之枝崑山之玉也以詩傳其人者幸則為陶五柳杜少陵使人讀其詩而想慕其人不幸則為宋延清劉夢得溫飛卿使人讀其詩反因以議乎其人以人傳其詩者雖其遣調屬思不與詩人爭一字之奇一韻之巧要其流風餘韻使人觀感而興起者諸先生若曠代同堂此倡彼和也儀封張先生以人傳其詩者也生平讀書明道及所以修已而撫民者一以濂洛諸君子為宗自濂洛下迄羅整菴既訂其文集若語録刋而行之矣兹又彚其詩訂為一集以行世先生蓋懼人之逐逐於詩而不思其人以可傳也且曰詩以道性情諸先生之詩得性情之正者發乎情止乎禮義三百篇之遺意或庶幾焉向使諸先生不思以人傳第思以詩傳鏤心刻骨區區於聲病對偶之間勿論其人無甚足稱者而其詩亦為無所關係也久矣真西山先生曰古今詩人吟諷弔古者多矣斷烟平蕪淒風淡月荒寒蕭瑟之狀讀者往往慨然以悲工則工矣而於世道未云有補也夫君子之論詩亦有補於世道而已是則先生之意夫古文雅正序康熙乙未嵗余自京師回閩家居數載評選歷代古文自漢至元約二百三十首子弟及門私自抄誦未敢以問世也雍正元年特召入京與同志李君立侯張君季長參論考訂又是正之高安朱可亭先生逮季長作令長洲取以授梓余因而序之曰是選也採之各家文集者若干篇採之二十一史者若干篇若漢魏之叢書文選文粹文苑文類以及名臣奏議偶有所喜則登之文雖佳非有關於修身經世之大者不録也言雖切而體裁不美備則賢哲格言不能盡載也其事則可法可傳其文則可歌可誦然後録之不及三傳檀弓者檀弓經也三傳雖傳經也不及戰國䇿者多機知害道之言也荀韓莊列不載者斥異學也嗚呼虛車之飾與犬羊之鞟交譏也不加體察躬行之功徒誇閎博雕鏤之用先儒之所羞稱也言不能以足志文不能以行逺亦大雅之所弗尚也措之為君臣父子夫婦昆弟朋友之倫發之有經國大業不朽盛事之美言為心聲辭尚體要斯集之所由選乎凡余所評論自寫心得不倫不次貽笑大方弗恤也名之曰雅正者其辭雅其理正也重修漳州府志序康熙庚寅春柏鄉念庭魏君守吾漳余時在京師君以治漳之政下詢余曰夫正已清操撫民率屬君之本所學以措之治者無待余言也顧吾漳郡志自萬厯至今闕百年矣此政事之大者非君莫可君慨然曰是吾責也治漳三年政洽民和百廢俱舉君已得其山川户口風土人情盛衰因革之大概余時守制家居謂余曰都中所言今可行矣願以相屬余退而慘然不寐者久之曰嗚呼故老盡矣薦紳老成備知明季國初之事者凋喪無餘余小子何知敢與斯役且吾漳自百年以來兵燹頻仍典籍散失守令將校尚有不能紀其名况於鄉曲里巷匹夫匹婦之微其孝義節烈烏能家考而户按之也哉顧及今不修後將益難因與陳君石民李君麟蒼陳君少林汪君嘉仲等經始於癸已四月君不憚搜羅不惜糜費凡九閲月用就厥緒甲午春余以服闋入都人物賦役二卷未及定稿陳李諸君相與續成之首末序論以及義例傳記君又增損而潤色之是冬剞劂告成君以書來屬余序之余惟賢人君子之為善也非有所慕於其名也而名卒歸之庸人之不能為善也非有所顧於其名也名亦不及焉然逮其身已沒其子若孫往往以得載志乘為榮以不得與為辱豈非恆性之若秉彛之好有不可泯者耶維漳建郡始於唐初僻陋瀕海然山水峭冽鬱積雄奇有宋朱文公涖郡以後陳北溪王東湖兩先生親承其統緒道術既一禮法大明勝朝陳剩夫蔡鶴峰諸賢又起而賡續之沿及明季周忠愍黃石齊何黃如諸公氣節文章尤巋然為天下望流風餘韻至今猶存吾漳人之不自菲薄也得無望前修而加勵乎且夫訪古者考其山川審時者識其風土察變者詳其沿革官斯土者雖千世百世之逺猶得按其宦蹟姓氏而知其賢否有所鑒於前斯有所惕於後而凡生斯地者知科名爵位本不足重要惟砥行修名者之得垂休光於無既也是則君所以修輯是書之意也夫漳志山川小序清漳多名山大川梁嶽大峰太武天寶天柱雄跨羅列南西北三溪環繞回流各滌其源相為支𣲖蓋漳之為地負山瀕海山川居十之七八可室廬而居田畜而食者二三耳然山水峭冽鬱積清奇故其為人大都負氣岸尚節概歷觀史册漳之在朝者多正人斯亦山川之靈也舊志志山川條貫脉絡倣禹貢成文今仍之百餘年來或地以人傳名以義起增潤之功所不免焉漳志學校小序詩書禮樂所以造士德行道藝所以考其賢能也萃郡邑之士學於學宫欲其以聖人為法聖人無不可學而至也倣周官黨正州長之意有社學有義學欲使比閭族黨皆知學也書院者聚其英而教之也建立學田賢司牧體朝廷養士之心恤其私而厚其餼廩也故類聚而附之自有宋仁宗用范仲淹之議詔天下州縣皆立學漳於是乎有學紫陽涖厥土風徽懋焉婚喪嫁娶一遵禮法大儒之澤也世祖加意膠庠重頒臥碑今上御製訓飭士子文以廣厲學官向學之士彬彬然盛矣漳志藝文小序著書總目自漢書以後多有載所謂藝文是也然止紀篇名而已近代志書則採其文録之非繁也紀營建之初終明政治之好醜載川嶽之靈秀考古者咸於是乎稽之然言之無文行之不逺欲以垂不朽盛事難矣漳雖僻爾龍湖以一代之才啓宇於兹詩則初唐正聲表奏則文以儒術風徽所被嗜古之士後先相望守土賢大夫若他鄉前逹又各有撰述有留題高牘雄編爛簡䇿矣困學録序吾師儀封張清恪公所著困學録正編續編仲子師載校梓竣事郵京師屬世逺序之世逺讀畢肅而歎曰中州古稱理學之區國朝則湯潛菴耿逸菴二先生最著先生宗仰潛菴而與逸菴相師友其學以立志為始復性為歸生平所自勉及所以勉人者一以程朱為凖的深憫世俗之汨沒於勢利惑溺於辭章其高明者又為姚江頓悟之學所誤大聲疾呼如救焚拯溺嗚呼先生之於道可謂不遺餘力者矣憶康熙丁亥嵗先生巡撫吾閩世逺年方二十有六先生使郡守禮致晉謁之際授以讀書録居業録二書曰由此而體究程朱由程朱而上溯孔孟由孔孟而上溯堯舜道豈有二哉侍學二年奬誨有加每念庸虛不甘暴棄不敢忘所自也先生生逢明盛遭遇聖祖仁皇帝及今皇上眷遇之隆始終一德聖祖每稱曰天下清官第一皇上賜之匾曰禮樂名臣學術事功炳耀天壤生榮死哀鮮有倫比世逺獨歎先生躬行實踐之功為不可及也立心以忠信不欺為主本先生自少至老未嘗一言欺人可不謂不欺者乎整齊嚴肅者主一之功先生自私居以至羣萃未嘗戲言戲動可不謂主一者乎學必先義利之辨而大發其惻隱之心先生分巡濟寧時值嵗饑擕家資數萬賑活數十萬人所屬倉榖不待申請輒行賑糶幾以此得罪而不顧自中書洊歷內外至大宗伯常俸之外未嘗受一錢寸絲粒粟皆取之家中深惡古節度之進羡餘以自凂者凡有公餘悉為恤民養士之費可不謂義利凛然而滿腔惻隱者乎自古聖賢莫不以好善為心先生見人則朂以第一等人事業有一善好之不啻口出撫閩時訪求讀書敦行之士知其人則令所屬資送未得其人則令薦送來見則接以賔主之禮延入書院厚其既廩月三四至躬為講論爾時閩學大興窮鄉僻壤翻然勃然至今風聲猶昨及身為大臣薦逹皆天下之選及已薦而人不知者何限此所謂身有之故好之篤如斯也或以為先生溫厚和平而風節未甚表著此又耳食之見先生歷官四十年未嘗以私干人人亦莫敢干以私撫閩三年舉劾悉當吏肅民安撫吳則直劾督臣噶禮之奸貪疏辭有除兩江之民害快四海之人心天下傳誦卒賴聖明公道得伸夫為大臣而稍動身家之念守令監司茍有攀援之私者罪狀昭彰尚依違繫戀欲上彈章而不能自決先生直節徑氣憂國忘家雖朱子之參唐仲友許魯齊之劾阿合馬何異大儒風節萬古一轍俗子徒以其小才曲辨而傲體道力行篤學守正之儒亦見其不知量而已矣先生刋布諸書合理學經濟氣節之彥共五十餘種所自纂輯者則學規養正諸書集解則四書濂洛關閩書及正䝉等書皆刋行於世斯録多先生心得之言自效力河工以至垂沒之年皆有成卷䇿躬覺世言之重詞之切總不外自為聖賢與勉人共為聖賢之心先生往矣撫卷沈思懼玷河汾之門常羞櫟社之木用志余愧非能表揚萬一也大學衍義補參訂序余嘗謂朱子小學一書內篇萃十三經之精華外篇採十七史之領要修身齊家之道悉備於此若西山大學衍義則大學之統匯也合經史子集而條其篇目附以論斷擇焉而精語焉而詳道德具備法戒昭然由小學而讀大學衍義本末精粗體用隱顯一以貫之矣有明丘文莊公廣之曰衍義補即治國平天下之要分為條四庫全書文淵閣目次其源流定其取舍忠言偉論絡繹聨貫亦西山之功臣也南匯顧子凝是敦修慕古奮然為有用之學讀文莊之書摘其要補其闕間附以已見其言平正通逹要可措之行以不悖乎大學之㫖顧不自信質余而求序焉余惟俗學之溺人久矣卑者以發䇿決科希世取寵為事其高者務記誦工詩文以為終身之業在是凝是有慨於此覃思博覽手録是書以研之已者公之人所謂學欲博不欲雜守欲約不欲陋者耶抑余聞之程子曰天德王道其要只在謹獨謹獨者曾子釋大學之要㫖誠正之實功也凝是勉之由暗室屋漏之不欺以定道義文辭利祿之取舍匪惟知之實允蹈之矣四書集注衷義序雍正二年秋吾友鄭君淡之以書來曰某近為四書集注衷義凡朱子前後說參互考訂以歸於一附以宗廟明堂井田郊社圖制方梓以問世願得一言以辨其首書方至而淡之旋已下世余未見其書不敢輕為之序越二年黃君雙玉寄數卷示余余讀之澘然曰嗚呼此吾亡友淡之玩心研志十數年所成之書也淡之為吾漳名宿試輒冠軍篤行敦義著於漳江余自翰林十載家居常與東江諸友談經論文相朂以宋儒之學淡之博觀內考研究澡浴胸中常有不可窒塞磨滅之氣今天子御極下詔舉孝廉當事首以淡之應薦病不能赴以死嗚呼天之祐善人也其謂之何哉是書以朱子定厥中旁採諸儒下及近賢皆取其有合於朱子者録之其涵泳白文運衆說而出之者尤簡直有體余嘗謂讀書者貴在心得躬行不徒尚講明然講明所以寫其心得而啓天下以服習訓行漢儒之解經重在講明宋儒之解經多有心得程朱之書如麗天行地尚矣餘則講明與心得有不能兼者即明代之䝉引存疑雖並垂不朽然䝉引之心得為多我朝四書講義首推平湖陸先生安溪李先生堪以覺世而垂後他如汪武曹諸賢考辨採録非無足取然揚已徇外之意多求之躬行心得之功微矣夫言者心之聲也心發於聲不可欺也不可掩也余非敢輕論前輩蓋嘗探討而體驗之然後知其不可誣也今衷義之書已行於世識者自有定論顧考其篤行以觀其論纂猶逃空虛者之聞足音矣其及門高第黃希上諸子參訂而刋布之均可傳也四書尊聞録序蓋嘗觀於六經諸子而後歎四書之語切也觀於古注疏及有宋以來諸儒講義而後歎朱子之心細也讀六經諸子者但即四書為權衡焉足矣讀四書者但研究朱子集注及或問語類諸書以為參㑹焉足矣明成祖詔儒臣修四書大全其擇焉不必精語焉不必詳然㑹聚諸儒講解以資考核有功於學者不少嗣後䝉存淺逹說約諸書發揮衍繹要之皆使人體之於身驗之於心發之於文措之於事焉斯已矣誦聖門之問孝也則宜反之已曰我當如此以盡孝誦聖門之問仁也又必仄之已曰我當如此以求仁誦誠身之㫖則曰我如何擇善固執以誠吾身誦知言養氣之說則曰可使吾之氣有怵於私利而不剛大充塞乎夫茍不能體之於身驗之於心發之於文措之於事雖遍觀廣取何益於我茍能體之於身驗之於心發之於文措之於事雖單辭隻句皆可以勉之終身進而上希賢聖然踐履必先以講明參考㑹通而後心靜理明庶其有以體之於身驗之於心發之於文措之於事乎則講明之功亦烏可緩也長洲戴生景亭閉户窮經十餘年志尚不凡自四書大全以及䝉存淺逹諸書罔不究覽又參之我朝平湖陸先生安溪李先生講解擇而存之彚為四書尊聞録既成求序於余余讀其書力索潛思簡而該詳而有要不必旁搜逺覽而儒先義藴畢具讀是書者可以體之於身驗之於心發之於文措之於事矣夫今之士但思發之於文而已其三者皆視為不甚切之務夫不能驗之身心其文亦不能親切有味不能措之於事則所謂道聽塗說而已我國家正學昌明超軼前代皇上崇聖右儒學貫天人每當經筵進講便殿燕見輒剖示精微心源若接聖教之所薰蒸天下學術日進於醇戴生之為是書也其日以勉人者自勉以不負發憤下帷之苦心以應文明之㑹而讀是書者益復體之身心以措之於事無徒思以發之於文焉則幾矣桐城夏氏忠孝節烈録序萃一門之中而克全君臣父子夫婦之倫豈非揭天經扶地義植三綱五常亙萬古而不滅者哉桐城夏孝子某少有至性六嵗喪母持服如老成人父病割股以饋及葬廬於墓始終如一孫忠烈公某初授黃陂縣丞用薦補麻陽令未行賊至公出沒烽火矢石間血戰死守城陷賊署僞守公指賊罵賊解其左右手猶罵不休賊遂斷其舌剜其目戕其足以死有女適潘氏者夫死僅一女守節十八年如一日有女適江氏者未有子江君以應試卒於旅次柩至焚香沐浴更衣而逝忠孝節烈萃於一門吁何其盛也或謂割股非孝詳考孝子生平始有無方之養終有廬墓之誠其割股乃孝心懇摰不知其所以然而然者此所以為純孝也或謂縣丞小官難與古死節名臣並傳夫位高而不死其罪甚於卑官位卑而能死其節過於高官此論古之權衡也忠烈公不以升職而有諉責之心不以官微而茍忍求活不受僞職至解支體猶詈罵不止此與唐之張許宋之文陸何殊乎二女之賢一以生一女而守節一以未有子而殉夫此皆權於義之所當然以行其心之所安者可謂仁矣余讀宋史見崇安劉氏自忠顯公韐慷慨殉君子子羽孫珙等皆大節炳著一門之中以忠諡者五人建陽蔡氏自牧堂公發篤學守道子元定孫沈等皆登聖賢之堂一門之中以賢名者九人此皆吾閩之表異特出垂聲千載者今以夏氏較之其不可與比隆矣乎彼科名爵位烜赫蟬聨為庸夫俗子所羡慕而志節碌碌無所表見者嗚呼淺之為丈夫矣黃氏宗譜序古者建國立家宗𣲖秩然左氏傳言君卿大夫世系明晰精詳而國語史伯論祝融裔苗絲毫不紊蓋簡籍可稽流傳可證所以推一本篤宗支恩誼通流敬歡備至意念深矣後世民版之獻久廢户口之數秪屬虛文越鄉遷徙者往往而是文編散失氏族無可考憑漢晉以來韋孟陸機之倫世德家風咸有陳述間或逺推夫受姓命氏所自出年代荒遼豈其盡有可據者耶是以近世君子每汲汲乎家譜之修者追本之思也而斷自譜牒所可稽以為始者致慎之志也豫謂宗子設而後族姓聨寢廟修而後情禮聚宗支興廢程張每慨乎其言之至於花樹韋家宗㑹法猶有取焉豈不以遡祖考之情通親愛之誼能使本心孝弟油然而自生也哉嗚呼以父母之心為心者必能愛其兄弟以祖宗之心為心者必能聨其宗族仁孝之理秩敘自天為人為子者必有所不容已於斯也溫陵黃君淡園閩之望族也雅厚以文令魏郡之東明著有惠政既營其家廟復輯自先世譜牒可紀者以為家譜追本之思致慎之志皆於古有合仁孝之思又足以聨之黃氏其世昌乎豫故因其請而序其端云此序為孝廉李君鍾旺代作而先生稍加㸃竄者也李君窮經學古持躬不茍賫志以殁先生每悼惜之故附於集中因藉以傳焉受業雷鋐識二希堂文集卷一
