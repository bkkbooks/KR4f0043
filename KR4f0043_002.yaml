body:
  text: 二希堂文集巻二禮部侍郎蔡世逺撰安海詩序皇帝誕敷文德敉寧武功厯數綿長版圖式廓敷天之下覆幬涵煦罔不率俾其有阻疆自雄傲虐不共則赫然奮雷霆之師擣其區域畏威輸誠爭為臣僕臺灣故紅毛地鄭氏竊據三世皇靈逺播命姚公啟聖施公琅削平奏績置一府三縣四十年來休養生息衍沃富饒顧土著鮮少火耨草闢多閩粤無頼子弟地廣則易以叢奸民雜則易以召亂加以重洋浩淼官吏有傳舍之思兵役更番不盡馴性制撫控馭阻於鞭長康熙辛丑夏四月二十三日羣不逞之徒呌號嘯聚蹂我民人賊我總帥安平副將許君雲游擊游君崇功北路叅將羅君萬蒼各率偏裨血戰死之賊遂據有全臺服優衣冠相稱以名號文武逃遁澎島賊勢益張五月五日制府覺羅滿公聞變投袂而起别母夫人曰兒不剪滅此見無日矣晨夜疾馳軍於鷺島大治樓櫓調八郡之兵尅期進取提帥施公先已提師駐港滿公素知南澳鎮總兵官藍公忠勇檄以副之將校卒伍分路責成撫軍呂公調餉佐軍不科井里應時而具部署既定合大小戰艦六百餘艘兵萬六千餘人滿公釃酒臨江天氣霽朗義聲昭布將一其心士百其競覘知賊將内訌頒發文告設幟懸賞賊棄逆效順自相攻擊六月十三日癸卯自澎湖齊發丙午施公遣其裨將林亮董方乗潮入鹿耳門諸軍銜尾繼進兵已過險人懐必死之心乘勝克安平鎮轉戰七鯤身賊衆尚數十萬藍公率精鋭由西港登岸繞出賊背紅礟鍧裂賊遂大奔薄至官寮悉衆相拒復大敗之走塗角埕又連敗之癸丑長驅直入府治悉定先是滿公未至厦門時邊郡洶洶城市山村惶惑轉徙米價沸騰訛言流布既至汎舟之米四集平糶輯奸市不改肆人不知兵羣策畢張紀律大肅衆於是知賊不足平也向使滿公不蚤鎮厦門則内地山莽四伏鷺門盡逃澎湖將潰施公雖激厲三軍而兵少餉涼其能浹旬奏績乎即滿公駐厦門不檄藍公同征亦未能成功若是速也三旬治兵七日奏績宣天子詔縛其渠魁撫其脅從不殺而威不令而行此皆由皇上知人善任皇天眷佑篤生良傑同徳一心式遏亂畧豈偶也哉吾漳處最濵海回思鄭氏之亂海孽山妖同時並作酷餉焚巢言有餘痛今兹之喜不啻口出作為詩歌用誌永久名曰安海者謂是役非徒平臺邊海郡縣皆安之也既安於臺警方熾之秋必能安之於臺地克定之後溯厥亂源選用㢘能布昭徳教芟其莠民漸次更始我閩人實世世食徳孕育蕃息歌詠於靡窮也世逺忝在史氏有採風之責因與陳君元麟張君福昶郭君元龍彚摭篇什以付之梓焉桐城張公焚餘草序世逺官翰林時侍安溪李文貞公嘗為余言先進張文端公之為人舉其大節傳其逸事以為美談因曰文端公卜相一年遂初致政君臣之際恩禮始終圭璋之品有瑜無瑕今仲子洗馬君懿哉淵乎光逺有耀者也世逺心識之不敢忘洗馬君即今宫保丞相天下所稱為桐城公者也皇上龍飛公由卿貳晉尚書遂陟政府且命授經皇子世逺以菲才䝉思起用亦濫厠講席之末公不余鄙辱誨愛之晨夕禁廷殆將五載私喜拳曲之木上邀不次之恩得受繩削于廟廊之上又喜得追隨諸巨公後若條風細雨之吹潤萬物也公一日出其詩一册命世逺序之公自翰林供奉二十餘年稟學于家服勞于國所為詩根心諧律藻耀舂容大㫖不外于忠孝而出之以慎厚平中若天門日觀之峯而托基厚阜也若汪洋㵆涆納溝瀆包蛟鼉而育魚蠏也若壺中之氷太璞之石也我聞在昔有以人重其詩者有以詩重其人者有詩與人並重者以人重其詩者程明道邵堯夫也以詩重其人者孟襄陽韋蘇州也詩與人並重者蘇廷碩張曲江也亦猶父子之間有以父重其子者韓魏公之於忠彦也有以子重其父者李德裕之於吉甫呂公著之于夷簡也有父與子並重者范文正忠宣也國朝百年來父子繼相自公而外指不多屈所謂詩與人並重父與子並重者後之人其必有以位置之矣公自名其詩曰焚餘草葢嘗燬于火于記憶中得之斷自康熙六十一年以前後集尚未編定公遭逢堯舜蚤作夜思臯陶明良之歌召伯巻阿之音吉甫清風之頌揚扢燮和與日俱新世逺又将執筆掛名以自耀焉家忠烈公遺詩序吾蔡在閩多理學節義之士明季流㓂之亂捐軀殉節者四川威茂道忠愍公諱肱明長沙司李忠烈公諱道憲其最烈且著者也雍正十年表弟陳君矩亭令長沙即忠烈公之死所也彚刻公遺詩合前後輓詩都為一集世逺讀之不禁憮然三歎也當獻賊之破武昌下襄陽而窺長沙也撫藩監司以奉吉藩為名相繼遁衡州時太守入覲公攝行守事練兵措餉為死守計賊知公愛百姓曰不降吾且屠長沙公泣曰寧殺我無殺百姓即手刃乗城者數十人賊駭而退總兵官尹先民隂送欵於賊與戰詐潰長驅逼城公急出百姓十餘萬户以孤城自誓城破被執脅公降公怒罵不屈使先民説公公罵曰恨不斬汝萬段手批先民先民羞走賊擲刃揕公胸血濺賊首仆地賊膽落以刃加頸公揚眉舉足自若賊斷公足裂其眉截其兩手罵益烈鈎舌毁齒抉眼劓鼻寸磔以死先是公被執時有役九人從公不去賊先殺其五人以懼公公不為動公既死次及淩國俊國俊者九人之一也國俊曰俟我𦵏吾主後受戮賊許之國俊枕尸呼天大哭解衣裹肉骨𦵏之城南醴陵坡還詣賊賊義而釋之國俊曰是我藉義名以偷生也遂自經死事聞贈公太僕諡忠烈廟祀勿替兵使者堵公引錫為具衣冠改葬籍諸紳士從逆者產為公祠田吾鄉倪君康年令善化倡新公祠復祠田之被侵没者撫軍丁公學孔趙公申喬相繼表墓釐祠事以國俊從祀公以名進士起家死時年方二十有九所為詩清幽峻肅凛凛皜皜如其人嗚呼自古國家多難擾攘急迫之時豈無賣國求降偷以全軀身躋顯秩者顧其後世子孫以為榮乎否乎即其鄉之人以為榮乎否乎引而近之乎推而逺之乎公死已近百年而凡官斯土居斯地者莫不憑弔嘘唏感仰而不能自禁况於譜系之末梓桑之舊乎忠愍公之死緣松藩鎮帥朱化龍内叛脅降兄弟妻子家衆死者三十二人公之死因尹先民欵賊忠義所激感及從役豈不長垂天壤乎淩國俊一徒隸耳一旦舍生取義遂使官紳兆姓瞻拜敬慕歴千百年而不衰然則偷生者貴乎義死者貴乎讀斯詩者可以慨然奮矣李思亭同居詩序余同年友李君思亭兄弟八人奉母以居合爨而食恂恂然雍雍然門以内無間言也康熙丙申冬思亭自為百韻詩紀其事孝愛友恭溢於言外吾漳紳士各為歌詩以美之思亭曰吾非以自多也吾懼其合而離離而不克復合故述先訓以勉吾子弟令吾子弟各勉其室人以和娣姒幸得相親相忍以永無斁也余曰賢哉思亭思深哉周子曰家難而天下易家親而天下疎也凡事疎者非難親者為難又推而論之多者非難少者為難顯者非難微者為難是故國難於天下家難於國家之中猶有父子兄弟長幼尊卑之等也身止一耳身為難身之中猶有耳目手足百骸之司也心無形耳心為難心之發為意而意之誠又最難茍能誠意則正心脩身齊家治國平天下一以貫之是故君子之致力也以誠意為先其立範也以齊家為要賢哉思亭兄弟八人猶一氣也娣姒則聚八姓為一家合子姓童僕又百人而無異詞焉豈非誠之所積哉聞思亭之治家也總其大綱出入㑹計皆仲君主之餘各安其業以讀其書仲君賢而無私故至今安之夫家人之睽始於婦人克勤克儉非婦人所難病在於自私自私而因以化其夫若子而家道壞矣由斯以言非獨思亭之賢亦仲君與諸兄弟娣姒之厚於天性互相勉以至於此也思亭將宦京師推此心以理民育物立愛立敬始於家邦曷有涯哉余兄弟三人亦奉母以居食指不及思亭三之一惴惴然懼吾誠愛之心不足以聯之也讀思亭之詩不禁慨且慕也於是乎言黄元杜文集序人材之所以不及古而國家少可用之才者由為士者識趣卑近志量薄狹淺陋株守時文一册以為平生之事業在是遇督學使者按臨試高第則翹然自喜雜於儕偶則拂鬱不悦久而後忘之值省試之期則又取向所株守者而加溫習焉被放則又拂鬱不悦又久而忘之如是者循環以至於終身老死而後已即幸而得第亦不過與時俯仰隨事補塞無志氣以鼔之無師友以勵之無學識以充之遂至以得第為成材居官為事業自非志尚卓然不囿於折楊皇荂者烏足以語經國之大業不朽之盛事哉邵武黄君元杜少負不羈所讀經史子集一發之於文欲與古作者匹休康熙戊子歳儀封張清恪公撫閩開鼇峰書院延有志之士脩書講學其中元杜侍其尊君存菴先生來與是選尊君為閩中名孝廉拒耿逆不受偽職倡學家鄉以終老元杜本其淵源刻自砥礪余時亦侍先君子得厠講席之末讀元杜之文略見一斑矣歳辛夘元杜舉於鄉文益工學益懋顧漳浦樵川相去千餘里而遥不能繼見講論如鼇峰時也雍正十年元杜謁選來京以其全集示余其優柔夷愉俯仰揖讓之態絶類歐公其論古諸作雖不及坡公志林之雄健湧出然疎暢洞逹亦坡公之流亞也惜其屈處於閩山海嶠不得操大手筆以撰述當世之人物以鳴國家之盛然其精氣光怪自閃爍出没瓌異而不可掩也兹元杜將令鳯陽行矣勉之歐蘇二公以文章名世顧歐公之令夷陵守滁州蘇公之守杭徐等郡皆政事殊絶志節偉然出為循吏入為名卿元杜勉之清恪公之提命依然在耳也尊君之藴蓄數十年未試者皆於元杜乎發之不在馳驟聲名而在循分盡職本經術文章以治一邑之人擔荷一世之事業所就寧有涯哉余是以序其文而傳之并以贈行焉陳峻侯詩序松溪陳峻侯來鼇峰書院從學於余能矯然自拔於俗凡余所與諸友相砥礪者多迂而鮮當峻侯獨深信而篤好之峻侯為建寧知名士試於學使者屢冠其曹善古文尤嗜詩歌嘗自名其集曰激鳴草積數千首矣鼇峰所作又成一集亦以激鳴名峻侯家赤貧廓落不羈所遇多坎坷余不知其所謂激鳴者豈激於其遇而云然耶抑見夫俗學卑靡已甚士子浸淫日久不屑屑然與世儕伍故激而鳴耶建寧故理學之區流風餘韻猶在人間充峻侯之所學立志日以向上檢身如不及吾烏能知峻侯之所造哉峻侯在書院與同安許保生志相同道相合其唱和亦最多保生之詩以雅贍勝峻侯之詩以清逸勝要考其格調以審其性情二子者其徒以詩見乎其不徒以詩見乎是在二子之自勉與世之知二子者晉陽靈雨詩序康熙六十年歳辛丑山右大饑平陽汾州尤甚左都御史今相國高安朱公銜命徃賑頼以全活者無算雍正元年朱公與余同事禁廷為我言設賑事宜且曰陽曲令沈君治行為山右第一余曰吾姻也時心已識之後山右人又為我言沈君治陽曲陽曲省㑹地能恤民造士上憲胥役若旗兵有舞法者執治不貸無敢譁他郡縣獄有難讞者皆曰當畀沈君云尤樂言其祈雨一節三祈三應官民驚歎以為神君嘗三任山右初令陽曲次牧沁州後守汾州兩膺天子特簡皆有惠政越庚戌歳沈君以需次入京擕靈雨詩一册示余余因得詳爾日民情蓋自庚子秋至辛丑夏歴三時不雨求輒不應君率紳士歩行百二十里至五臺山神祠禱焉是夜即雨連三日夜大雨陽曲之四隅莫不沾足君歸中丞率大小屬郊迎萬民擁道歡呼忭慶余於是歎天人之感甚神而誠信之無不可格也平日誠以治民而民信之則凡有事於民莫不應矣誠以事天而天信之則凡有禱於天莫不應矣何謂信於天以信於民者卜之何謂信於民以誠以治民者卜之誠之道貴豫而忠於民即所以信於神沈君平日行善於民為民植福民心服且信焉故天亦信之三祈而三應其偶然歟非歟詩以道性情且紀實也不必工要亦本於誠而已陳少林遊臺詩序吾友陳少林年未及壯隨其族兄總戎公從戎閩粤間既又渉江湖歴呉楚寄寓黔中黔中舉茂才第一旋遊國學歸漳浦漳浦舊鄉也時年三十餘矣從令君陳莘學先生為講經之㑹又應中丞張清恪公之招講學修書於鼇峰書院少林通書史嫺經濟至是又澤以宋儒之書七試於鄉不遇康熙辛丑五月臺灣告警鎮帥殱焉副將以下或死或竄文臣逃歸澎湖制府滿公躬駐厦門訪求熟悉臺灣事宜嫺猷略者以幣聘少林於廬少林慷慨赴幕曰賊草竊無逺畧相吞并不難平也滿公曰子能為我渉波濤冒矢石親從事於行間乎少林遂行當是時滿公居中調度提帥施公總戎藍公分將一萬六千人少林以制府軍師周旋二將間六月師克鹿耳門遂復安平鎮大戰七鯤身連破數十萬衆長驅定府治少林與施藍二公商善後之䇿而後告歸滿公官其一子把總曰吾固知子淡於宦情也衆咸為少林稱屈少林曰吾何功哉控制調遣滿公功也遣將先入鹿耳門施公績也大戰七鯤身遂定府治藍公力也且吾以一書生提一筆管掉三寸舌徃來行間親覩天子威靈將士用命七日而殱巨宼上紓朝廷南顧之憂下定鄉井揚波之警吾榮多矣吾何功哉先是少林曽修臺灣縣誌凡所憂虞規度先事而中故滿公知而聘之歳甲辰少林重遊臺灣感舊興懐作憶昔長篇一首七律八首錄寄京師示余余時與總憲錢塘沈公同讀而贊之曰憶昔即杜子美之北征也七律即子美諸將之什也雖所遇不同然其忠愛愷惻之心未雨綢繆深情雅調孰謂古今人不相及哉余是以序而傳之并其前後遊臺諸作著於篇王直夫詩序余與直夫為總角交當是時直夫善詩余學為古文浦中人貴耳賤目多輕直夫詩者余為之序以張之輕吾文者直夫以詩彈之直夫詩旋見賞於令君陳心齋督學沈心齋兩先生名大沸余文亦不為當世巨公所棄直夫以實著余亦竊盗虛聲也直夫所為詩從近體入沉鬱雅健近所作古風樂府氣味淵蔚意理蓄足其不懈而力於古者耶余嘗謂詩與文難兼詩中古與律又難兼古稱詩文並擅者唐昌黎韓公宋東坡蘇公耳顧二公文勝於詩古勝於律吾黨陳少林藍玊霖陳石民陳非楚以文名者也作詩亦好古不喜律莊元仲李鱗蒼袁子楚及直夫以詩名者也作文用短節而不事雄暢就文而言傳記與序論難兼少林優於傳記玊霖長於序論就詩而言子楚長於古元仲工於律陳李諸君亦各有長今直夫善古律而兼之然則直夫所願讓於古人者其韓蘇二公歟抑余聞詩以人傳以品高善詩者推陶杜氏朱子晩年好讀二公詩不用於光寧慕靖節之田居也憤和議之誤國嘉少陵之忠君也亦二公之素所樹立然也今春余主教鼇峰直夫贈以詩曰願言斷菜根萬事恣揮霍直夫之朂余者至矣近又以詩來曰離索足咨嗟厥守求其是直夫之自朂者至矣鹿洲初集序吾友藍鹿洲與余少同學同受知於令君莘學陳公督學心齋沈公撫軍儀封張公九試於鄉不遇選於庠貢成均朝之名公卿大夫莫不高其才重其學天子召見授廣東潮州普寧縣且曰以彼其才任府道綽乎有餘未三載以不善事監司削籍潮之官紳士庶各斂金為輸其所坐官逋千七百兩有竒太守延修府志制府禮為上賓事多咨訪而行代刻其古文若干巻鹿洲郵書屬余序之余惟今之為古文者患在氣不充又在學不適於有用氣不充則雖掇拾粧飾貌為古質而薄弱短促氣不能貫三五行古人所謂言之短長與聲之高下皆宜者安在也學不適於有用則雖激昻慷慨抑揚反復而中無所有不能發而有言即言之亦不能疎暢而洞逹所謂坐而言起而行者安在也鹿洲負不羈之才敦内行通經史曉達治體平生語經濟必曰諸葛武侯言文章必曰韓吏部以振古人豪自命尚論古今敷陳事理洪纎高下振耀而傑出奔溢閎肆若夾山雨後之江溪巨石之裂懸崖絶谷使見者震駭驚愕退伏而不敢迫視而按其言則又切近合機宜不如是不可以行如是行之則必有效鹿洲其可謂善養其氣卓然為有用之學者矣方鹿洲召見時例赴吏部試同列皆踧踖循故事鹿洲獨奮筆上五千言奏陳五事天子下其議多施行非抱負不偶者能如是乎及作令觸怒監司人或勸其承意屈節可以免禍鹿洲曰吾嘗歴澎臺渉大海出入風濤雷浪冒矢石入窮山宻箐雜諸劗髪鑿齒刳耳文身之衆觸毒霧受惡瘴氣而不懼况吾䝉恩作天子令其肯毁方詭道以媚監司哉卒以此獲罪三歲而後得脱粤之人自上達下莫不飲食愛助延請禮重爭迎致之恐後此非有浩氣者能如是乎以是氣而發之文其聲不更大以宏乎且使居官之日稍有歉心粃政事後且無顔以對彼都人士况能使之飲食愛助延請禮重爭迎致之恐後且為刻其文以傳世乎雖然義理之氣氣也血氣之氣亦氣也有用之用用也觀其所養亦用也鹿洲得無有未純於義理之氣恃其用而果於一用乎鹿洲今年且過五十磨礱浸潤學益粹養益深蓄其氣以裕其用以發之於文吾知文且進而駕於古而又豈徒以文見哉雪巖詩序吾漳林子牛美鬚髯善談論博雅能詩尤長於樂府由柳河東而上摹漢魏者也漳故有名進士曰鄭白麓戴麥村白麓閎博有史才負不可一世之槩麥村以風度勝晩年詩尤工擅當是時二人齊名於漳顧凡有論著或商㩁事宜皆曰必吾子牛也康熙癸巳歲余修郡志於漳城鄭戴已亡傷故友之淪落諸如修古舉廢及興名賢祠宇子牛毎助成之或急就之章余窘迫無以應者子牛從旁私以其稿授余余於是歎鄭戴二君之亟稱子牛狎愛之不虛也邇來廓落不遇家益貧目疾又劇昔唐張文昌善詩而盲於目得昌黎鼓而張之身名俱顯而目亦痊今子牛之才之遇大類張文昌惜乎余之不能為昌黎也子牛之詩咏古撫時悲壯清峭令讀者悄然以思近以新詩惠余及和余都門所作名公卿見者莫不嘉許歎詫問曰林夢斗何人則對曰吾漳林子牛也八閩試牘序代督學沈公作方今天子神聖海内向風人文蔚起天下懷竒抱異俊乂閎博之士莫不自奮於清時蓋數十餘年於此矣康熙壬午冬例遣學臣視學四方天子曰凡所為培植人材體朕意以興多士者莫亟於此召翰詹詞臣赴内廷再試命下之日賜御書諄諭倍至余以不才謬膺閩中任竊念閩為理學之區才士之藪年來風氣日上使者將何以仰報聖天子責成之至意也説者謂校士之道在公與明以余觀之公非難而明實難夫公所以難者身家與功名累之而已余本寒素通籍三十年不别治生以長尺寸先民之言聞之素矣又見家藏金穴朝有石交覆轍相仍曽不旋踵維名與利直浮漚視之耳然遂謂余操鑑之不差則又不敢歲科兩試俱刻期一年報竣下車伊始静候郡縣送試動需時日通省試畢彚册送部檢㸃磨對前後約計三月有竒八郡一州山峻水駛舟車再歴亦越三月有竒其中監臨校射以及簿書案牘紛披交迫鮮有寧時閩省生童統計幾二十萬巻明經太學又若干焚膏繼晷繙閲再三雖應世叔五行俱下猶懼弗給也且夫才多者苦於額少聚纎離緑耳而整轡中原僅於控勒馳驟之間微分先後權衡稍失則騏驥長鳴矣才少者又苦於充數之難求結綠於碔砆求照乘連城於礝磩安知不有一二瓦礫者乘間而投乎自惟入閩以來精神勞瘁時月亦所不知余家在浙如在萬里之遥九重至尊如在咫尺之近豈身家功名兩念尚足纒繞其胸哉今所以刋布若干篇公之同人者以明余苦心所在不忍聽其荒烟埋没非敢云轉移風氣以品題文章自任也雖然文所以載道也制義者代聖賢以立言非知道者其言之不能深切著明是故經傳所以培其根也諸子史集所以長其識見而閎其議論也余不揣固陋欲於風雨争飛魚龍百變之中擇其語有根柢辭尚體要者以為之坊堂堂正正意在斯乎但明之一字自昔難之狐裘反衣古今同歎余雖頟頟不負此心終不敢謂是編有當於海内諸君子也尚其諒我而教我哉九閩課藝序代撫軍張公作國家以制義取士非徒使人敝精勞神獵取詞華組織文字以為工也蓋以從古聖賢之言無過於四子之書讀者玩心力索於此則内自家庭之間以及於事君交友治國平天下之道畢具於此而又恐人之目為平淡無竒而不加意也於是乎標以題目定以科名不入彀者雖有高才無由自見此朝廷取士之深心使天下畫然而出於一者也近世之士循名者多務實者少師之所以教弟子之所以學皆曰此科舉之學而已因科舉之故始治經書視經書之言止供科舉負聖賢覺世之心辜朝廷取士之意嗚呼其可歎也已陳北溪曰聖賢學問未嘗有妨於科舉之文理義明則文字議論益有精神光彩躬行心得者有素則形之商訂時事敷陳治體莫非閎中肆外之餘非虚語也洪惟我皇上好古重學加意作人御製訓飭士子文使士先徳行而後文章欲使讀四子之書為四子之文者黜華崇實躬行實踐以自奮於聖賢之歸也乃積習成風未能盡去士子窮年矻矻含毫藴思與已之身心漠不相渉豈非有心世道者之所深憂哉余奉命撫閩竊不自揆仰體皇上先行後文之意刻學規養正諸編及周程張朱許薛胡羅之書先後刋布又念制義一途所以闡發聖賢之奥義而拜獻之先資也下車以來觀風月課披閲既多擇其尤者得二百餘篇屬長洲汪武曹太史再加評定梓而行之夫閩理學名區賢才輩出素稱海濵鄒魯其人大抵閎博俊乂崇氣誼尚名節不屑為脂韋苟合之態故其為文多瑰竒瓌瑋不肯蹈常習故又其發言出論多有合於儒先之旨不至於窈㝠昏黙茫然莫得其旨歸因刋定是篇舉生平所誦習者間附評語於篇末非敢云有所發明也鼔士風所以培元氣重經書所以崇聖學且令天下知宋元明諸儒之書與四書相表裏始焉潛心體玩以為文章既又因文章以自律其身心端其行誼則於朝廷設科之意庶乎無負而聖賢垂世立教之深心亦於是而見矣雷用見時文序汀州多敦樸則古之士而長汀寧化為之最蓋有李元仲黎媿曽二先生之遺烈焉元仲親受業於黄漳浦抗節不仕論著褎然成一家媿曽則師友元仲私淑漳浦為監司有治行古文亦閎博有法蓋流風之所漸逺矣寧化雷生定國字用見幼失怙事母以孝聞兄弟相劘切年少博覧强記意氣自豪晩乃益究宋儒之書丁酉歲其族弟貫一來鼇峰書院從學於余用見以書來曰近見先生學約益見返躬切已之功矣夫同堂執經靣是心違者有之用見乃能聞風相慕余則愧歉用見要不可不謂强有志之士也庚子夏貫一自汀過余擕用見時文一册求評定貫一歸而用見死矣古來鋭志進學之士為壽命所阻未及觀其成究其用淹然以没者代皆有之用見好古古文余未及觀時文根柢盤深以先正為凖的説理尤有心得之言門弟子數十人多有文名將梓其文而丐序於余余嘗慕用見而未得見者也又悲夫評用見之文而用見竟未及見以死執筆之下不禁泫然焉吕澗樵時文序澗樵與余為已丑同年友長子舉於鄉又與余同在乙酉之歲故余呼澗樵為年丈澗樵中州名宿卑牧善下不余挾也嘗考漢唐以來家世之茂推有宋吕氏為最文穆公文靖公以碩輔著正獻公滎陽公師友二程徳業又加懋焉南渡以後東萊先生學宗關洛蔚為大儒越明代則有明徳先生重光而趾美澗樵則明徳先生之裔孫也余嘗謂中州多沕穆之氣而澗樵得之獨厚呂氏世代多賢而澗樵承之無忝既以詩名天下矣所為時文渾簡高潔其根極於理要者耶夫時文之不振也久矣氣多浮革辭寡體要塗澤其外不由心得勦襲其詞不根素學無心得則察理不明無素學則致用不裕時文之得失即士品之所由純疵士品之純疵即國家得人不得人之所以分記曰事君者先資其言拜獻其身以成其信時文乃拜獻之先資况代聖賢以立言士子反躬能無自恧乎澗樵有慨乎此而反之抑亦可觀其志尚矣澗樵父子同朝皆有聞望嘗同余兩分京闈賞晰獨深故澗樵屬余序而傳之李訒菴時文序宋時名儒傑士多以兄弟著者程氏以伯淳正叔著張氏以子厚天祺著蘇氏以子瞻子由著吕氏以進伯與叔著皆由其家學之茂兄弟自相師友故其學術文章巋然為振古命世之傑吾師安溪文貞公有介弟二人仲曰訒菴先生季曰耜卿先生耜卿能通十三經範身以禮訒菴先生博渉羣書以六經宋儒為歸宿涵養充粹坦坦施施義所不可輒形於色少登賢書令楚之嘉魚廉能多惠政康熙庚寅報最入都補户部主事世逺時為翰林朝夕侍文貞公之側兼得承先生之教涵育和煦如春風之扇萬物也先生之致政歸也世逺嘗為序以送之其亡也又嘗至湖山為文以哭之兹序先生之文敢自外乎時文之學前輩謂之經義經義者謂其躬行心得善㑹聖賢之意以立言根柢深茂詞理雅正心細學醇者得之嘗讀文貞公之文精確高古為制義以來第一先生之文規範與同其探微豁冥游衍縱送有剛健婀娜之態昔伊川自謂某之學與明道同異其異處所以為同也今先生之文與榕村藏稿同異其異處亦正所以為同也同異之際微矣世逺方編校文貞公全集以傳世又嘗讀耜卿之古文歎其皆經傳精液若嗣刻先生古文余當復序而行之不辭也錢弱梁時文序觀其文可以知其人焉觀其文尤可以知其政焉其文之和雅冲䆳者其人必易直而子諒其文之雄舉傑出者其人必有特操其文之切理諧事者其人必空明而洞逹其人如此其政亦因之余同年友錢君弱梁江以南之宿老也沉浸乎經史講明乎經濟者有年其為文簡古高濶長短應律余讀其文蚤識其為人康熙丁酉歲以廣文卓異令吾閩之莆田余道過莆莆之人為言錢君之治廉而不劌核而不苛民生其共吏不敢犯莆為劇邑而君治之綽有廉能聲余於是知文章之道果與政通也因為序其文而傳之且以告夫世之能文章取科第者皆將有民社官司之守或貪汙其身或庸碌無所建明豈惟上負朝廷設官位事之意哉夫且對其文而滋愧矣二希堂文集卷二
