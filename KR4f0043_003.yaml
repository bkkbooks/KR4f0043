body:
  text: 二希堂文集卷三禮部侍郎蔡世逺撰皇五子奉命祭告闕里文廟序堯舜禹湯文武周公之道至孔子而集其成漢唐以來尊崇效法各致其隆至我皇上而立其凖心源契道法昭封五代以報功詣太學而親享巍乎煥乎古未有也雍正八年九月重建闕里文廟告成黃瓦畫棟悉倣宫殿制度摶拊干戚樽俎豆籩之器頒自上方皇上御書碑文勒石垂之永久禮部奏請遣官祭告上特重其典詔皇五子承命以行世逺與皇子晨夕相講論者八年於此矣可無一言以敬獻乎夫清明在躬志氣如神希賢聖而則古先皇子平日之澡浴者然也兹奉君父之命以往未事之先蠲潔其心志儼恪其身容齊肅有加焉入聖人之里遊聖人之門仰瞻大成殿大成門皇上之御筆也門曰聖時曰𢎞道皇上之所手定也瞻聖人之像貌盥薦奠斚明禋拜稽如睹其溫良恭儉讓之休也如聆其金聲玉振之範也如親其博文約禮之教也共祀一堂及兩廡者為四配為十一哲為七十二子為漢唐以來諸儒示我周行如臨師保顏子之克已子路之喜聞過孟子之集義皆可師也漢儒之傳經宋儒之體道皆可誦而可法也先哲後賢內聖外王其揆一也皇子念之哉禮畢謁孔林遂如泰安州祀事泰山夫孔子之道猶泰山然登泰山之巔必由泰山之麓精義入神必始於敦倫體信孔子曰孝弟之至通於神明光於四海無所不通孝弟其至近而可循者乎曽子傳一貫之㫖以告門人曰夫子之道忠恕而已矣忠恕其至切而有要者乎此與登山之說何異皇子念之哉肅將君命祗謁聖居近取諸身心道行於家庭對越昭事罔有斁焉此之謂有恪此之謂受福此之謂敬親此之謂法聖送儀封張先生祭告闕里序維孔子道髙德厚實與天地參而四時同漢唐以來代有封號贈諡優崇之典未登於極皇上膺眷嗣統君臨萬邦孔子之道契其心源㑹其有極以作則於天下敬學尊師褒封王號上及五世厥崇厥隆雍正二年四月議遣大臣往闕里天子顧在廷諸臣非澡身浴德被服造次必於儒者不可以肅將祀事對越有光特簡禮部尚書儀封張公銜命以往公中州巨儒朝之元老服膺聖教羽儀王國嘗開府吾閩閩之人沐化雨焉繼撫江蘇吳之人飫至德焉其初又嘗觀察山左駐節濟寧人士至今歌思之兹以大宗伯之秩銜天子之命登闕里之堂奉璋奠斚明禋告䖍升降揖趨有恪有度聖孫賢裔魯國諸生肅恭彬濟環觀拱立公本其所學誨誘諄諄使夫讀聖人之書者必服聖人之行直內方外博文約禮希聖有立而後即安且以廣聖天子崇聖尚學育材化士之意身有之其將事也䖍其誨人也篤非公孰則勝任天子且有後命許公竣事便道家鄉省覲太夫人展孝不匱寧親道故水丘桑麻夷愈一月祗復厥命顧不樂哉世逺在公門墻受教最深榮斯行也敢敬序之以為公贈送李少司馬巡撫廣西序雍正二年夏四月天子特簡兵部右侍郎臨川李公巡撫廣西朝之士大夫咸慶得人余與遇於朝問所以治粵西者公曰吾一汚之不染肯使吏漁吾民哉吾劾其尤者餘則威約而化導之吾問餽之不通僚屬顧得以次受所屬之獻吾嚴之吾又不刻焉酌劑而稱平之關鹽雜征戾於民者吾核而減之粵西地雜猺獠吾勤而撫之凡吾所屬例有入之公者吾除之義可贏留者吾貯之所司以為養士恤民賚兵之費凡所支用必與僚屬士庶共見之吾惡夫古之進羡餘以自凂者非大臣之所為也余曰是固然矣人患才少君固恢恢治不可急氣不可勝健而能㢲人乃大和公曰寬居仁行尚克懋修又問所以興教化者何若公曰吾將為閩之常衮也粵西僻處一隅文教未宏吾將與之敦行學古俾彬雅之風衡於上國余曰諒哉郡擇其尤者飭所屬以禮敦遣萃之書院立名師以董之暇則身親而奬誨之婚喪賓祭酌古今之宜因其人情風土制為簡易之禮以通之禮行化洽俗以永淳常衮烏能域公哉公深頷之余惟學術治術之要明與誠而已不明則不足以逹事理之要不誠則不足以立萬事之本而表裏始終不能符貫古有讀書談道而因循媕婀者多矣又或英氣過勝視事太易動而得礙則蹜踖反甚於前此皆明誠不足學術微而治術淺也公粹於經學善文章嫻治道閎博俊偉一切富貴毁譽不足以動其心而慨然以天下自任上有堯舜之君而公之所以事君者必不肯後於堯舜之臣竊謂非聖主不能知公而非公亦不足以副聖上之用也昔韓范開府涇州時有西夏之役教養未遑程朱大儒遭時不遇設施僅試之一郡一縣今聖天子在上四方風動用公為巡撫苟能明誠兩盡何士之不可化何俗之不可厚何猺獠之不可格何俊髦之不可興哉夫明之過為矜氣為苛察非明也誠之至為易之乾惕書之抑畏詩之豈弟禮之子諒皆誠也公必有以處此矣余與公同學有年志相同道相合常相勉以所不足所相期許者又未敢以輕喻之人於其行書以序之送鄂少保相國經略西陲序昔宋蘇文定公有言天下不可一日而無重臣重臣者在朝廷之中士大夫不敢安肆怠惰而緩急之間能有所堅忍持重而不可奪文定之論可謂篤矣而吾謂國家之得重臣為最難必上有明聖首出之君委任既專恩禮兼隆而為之臣者又必有學問深醇之氣正直之操忠厚愷惻之懷謙牧善下之度凡政令之否臧四方之利病人才之賢否進退九服四裔之向背順逆莫不引為一已之事譽毁愛惡榮辱利鈍一不以介於其中然後能同德一心可內可外可將可相無所往而不宜也雍正十年壬子秋七月欽命少保大學士一等伯鄂公督巡陜甘經略軍務公朝之所謂重臣也天子之所敬信體貌有加天下士大夫所望以為鵠者也先是公總制雲貴廣西三省吏服民懷丕績逺播烏䝉之變不踰時而奏克天子召入政府以三省所治專而不咸宰相所理淵而溥公夙夜寅恭襄贊亹亹明良之契不能旦夕離也兹以凖噶爾餘孽尚稽天誅兩路大將軍進師凱旋未奏命公往經理宣撫之公此行揚皇威於萬里宣明聖天子之德意周爰咨諏悉心謨畫相事機之㑹度戰守之宜何以搗其巢而得其要領何以防其逸而遏其衝以及糗糧芻茭長運短運之何以順適於輿情供億輸將官與民市民為官役之何以底於克協或召募土兵可以省逺徴師旅抑或威信所敷不戰而可以坐屈蠢爾扼其吭而革其面夫陜甘之民天子加恩數倍他省蠲其常賦增其物直貸其宿負恤其疾苦申其化諭今見公至吾知士民益誦德歡呼將士之益踴躍用命也昔唐開元盛時遣宰相張說巡邊立平康待賔餘黨奏罷邊兵二十萬人說之學術品望未必及公而巡邊之績甚偉綱目大書以美之宋仁宗使韓范駐劄涇州不數月也元昊稱臣請和西鄙晏然無事嘉祐治平之盛實基於此公之望實堪與韓范比肩而凖噶爾餘醜又非元昊等夷我聖朝威靈皇上仁明聖武又非唐宋二代之比且我聖祖仁皇帝所赦之九死而一生卵翼以長者乃敢父子忘恩抗背其不可逭也必矣天子命公三閲月回朝蓋以小醜不足以煩公之久駐而旦夕承弼其丕應昭受為宏且逺也世逺與公同事禁庭公不余鄙辱誨勵之嘗與余語性學之原經世宰物之方知公之所以稱重臣之選膺帝眷之深者豈徒在聲績之外著哉送傅少宰巡撫浙江序吏部右侍郎傅公以乙已秋七月特簡署浙江巡撫越七日馳驛以行聖主知公久資公以經理者不徒東南一道浙為重地需人暫得公之重治之先是公以翰林家居十年今上在潛邸時聞公名使傅皇子公啓𨗳維殷以嚴見憚不妄交一人恪勤乃職六年如一日御極以來知公可用授內閣學士又二年知公果大可用也升吏部侍郎未數月知公無所不可用也遂有撫浙之命世逺以癸卯嵗䝉恩特召與公同侍書皇子公又嘗主鄉會兩闈世逺忝與同考兩年中晨夕相聚未嘗數日離兹之往也其可以無言乎公氣質髙明剛方不撓常懷澄清吏治撫民育物之意自起用以來聞望馳於四國浙民何幸而得公涖止也嘗讀易至中孚上巽下兑解之者曰自二體言之為中虛以一卦言之為中實中虛者中無私主至虛能生明也中實者中無妄念外纍不能入也故能豚魚皆格孔子繫之傳曰柔在內而剛得中說而巽孚乃化邦以卦具柔剛之宜有說巽之美故孚能化邦也諸葛武侯治蜀下教謂參署者集衆思廣忠益也人心苦不能盡苟能慕元直之不惑幼宰之勤劬則亮可少過武侯之用心即中孚之義也公謂余曰君欲以序贈行幸少頌而多規也公之虛誠即此其一矣世逺鄙人也頌何足為公重又何能有以窺公敬取易之所謂中虛中實孔子之所謂柔剛說巽武侯之所謂集思廣益者以效古人頌規之義送黃侍御巡按臺灣序臺灣居海外在南紀之曲東倚層巒西界漳州南鄰粵北之雞籠城與福州對峙地近河沙磯小琉球周袤三千餘里孤嶼環瀛土壤沃衍禾稻不糞而長物産蕃滋果㯢螺蛤硫磺水藤糖蔗無所不有固東南一大聚落也自鷺門金門迤邐以達澎湖可六百餘里又東至臺之鹿耳門旁夾以七鯤身北線尾水淺沙膠紆折難入明嘉靖末海寇林道乾據之道乾後顔思齊勾倭人屯聚鄭芝龍附之未久荷蘭誘倭奪之鄭氏破荷蘭為巢穴傳三世今天子聲教四訖鄭氏擒滅設官置吏休養孕育垂四十年去嵗羣不逞之徒煽惑莠民撞搪嘯號賴天子威靈將帥用命舟帥直入七日奏克天子特注意臺灣簡監察御史中有敦實廉能嫻猷略知治體可任以股肱耳目者二人往按其地黃君偕吳君膺新命以行余與黃君同門友也夙知君家學素履君兄弟五人皆有聲績長公次公以督學清正晉秩為卿君年最少由吏部陟臺中能直已行道不矯激沽名為聖主所倚信以夏四月至閩余一見即為臺灣慶得人君自童子試至登進士第未嘗出都門兹將出波濤航大海奉天子命以綏輯羣黎神志肅定忠慎恢廓古所謂大丈夫者君其人矣夫臺灣鮮土著之民耕鑿流落多閩粵無賴子弟土廣而民雜至難治也為司牧者不知所以教之甚或不愛之而因以為利夫雜而不教則日至於侈靡蕩逸而不自禁不愛而利之則下與上無相維繫之情為將校者所屬之兵平居不能訓練而又驕之夫不能訓練則萬一有事不能以備禦驕之則恣睢侵軼於百姓夫聚數十萬無父母妻子之人使之侈靡蕩逸無相維繫之情又視彼不能備禦之兵而有恣睢侵軼之舉欲其帖然無事也難矣今海氛已靖臺地乂安監司守令皆慎簡之員則所以教而愛之者必周總戎藍君又平臺著績人也所以練而輯之者必至君與吳君從容經理其間慎簡乃僚罔不同心臺灣之人行將數百世賴之豈徒南粵之奉伏波峴山之傳叔子已哉余淺人也烏知事宜然地近桑梓不能不關心於勝算君之至自能不擾而核不肅而威也送林太僕序太僕寺卿莆田林公致政將歸余以趨走內廷不得祖餞為文以送之曰余之知公也在二十年以前余之得交公也在雍正癸卯之冬公學懋而識充氣醇而守固余一見如舊識公亦不余疏也公嘗令京畿以清惠著奏最入都授工部主事旋晉臺中升光祿寺歷通政司不數月而至僕正公感上知遇勉思報稱前後區處條奏皆中機宜天子韙之每發議施行同朝咸器重之公今行矣莆中山水明秀風俗醇美經濟節義儒林之彥指不勝屈公家自唐九牧著聲逮文肅公以來科名聞望為閩中第一公本其素履施於有政風流所漸其益則宏公又嘗為朝廷耳目之官位躋三品聞天子之訓誨至親且久兹䝉恩以冏伯之尊合引年之典優游林下進都人士日體王言涵濡德教務為有用之學不沾沾於占畢章句敦本行飭廉隅不濡染於私利惑溺於愛憎毁譽攻取之場朂以誠敬絶其朋從循守禮節去其侈泰使髦士俊民皆卓然自奮於聖人之世又日與耕夫野老歌咏太平話桑麻言慈孝此樂何極此責匪異人任也公又向余言來嵗欲訪陳石民李思亭於漳州興化與漳州為鄰郡公至與陳李二君講禮敦俗因材長善人倫東國恢恢乎介休郭有道也送李訒菴歸安溪序户部主事李訒菴先生吾師安溪公介弟也康熙甲午秋九月請假南歸世逺與諸同人餞之於郊為文以送之曰先生此去可謂賢矣或曰先生可以不去先生有相國為之兄有編修為之子子若弟登賢書者二十人絡繹長安相晨夕也先生其何必於去世逺曰此先生之去之所以為賢也先生以宏才宿望為户部曹秩滿將遷歷臺省躋卿二非必席父兄之勢也而先生淡然先生以為調隂陽燮理宏化伯兄已為之生平所未竟之業留以屬之羣從子姓焉何必於不去雖然行矣將何以為祝士大夫得志在朝則循分供職補過盡忠及退而家居則以孝友廉潔經明行修飭諸子弟及鄉之後進風俗人才類繇此長非徒林泉之樂也此又吾師之夙懷而未得請者先生竟飄然遂所願云送錢孟輔出牧嘉定州序余與孟輔交在康熙已丑之春余時始得第官翰林獲交於孟輔外舅阮君菜亭及菜亭之姊聓朱君沃洲沃洲之弟均實菜亭敦內行樂善好施尤尊師喜友雅重讀書人二子曰朝采亮采力學飭身孟輔與沃洲之二子曰式先曰承三皆與同師均實共學一堂余咸得讀其文相期於有立其明年余給假省覲家居之日多今上龍飛余再官於朝重申舊好則菜亭已退老朝采由兵部陟吏部主政亮采以甲辰成進士承三登賢書沃洲以召見入都授平越太守咸得晤敘京師孟輔又隨作令四川承三作令郃陽調繁蒲城十餘年前朋好舊遊或得第成名或居官奮績余於是歎讀書飭行之果不負人也未幾亮采將出令山左孟輔將牧嘉定孟輔先來告别余惟人生聚而散散而仍聚聚而不能不散者其常耳士各有志惟所樹立不在官之崇卑遇之順逆要以無愧衾影師友民物者出而著循聲樹偉績斯可以稱人豪矣孟輔為令有廉惠聲適有丈量之役奉委協理歷數縣為國為民此心兩無所負逺邇稱之可謂信於民矣內升刑曹中丞嘉其才守薦擢今職可謂獲上矣親民之官至於民信獲上何事不可為者其尚有未罄厥誠悉厥心力稍涉於榮利不自發奮以無負此數十年來戚屬朋儕之所講論期許哉孟輔行迫不及祖餞重之以辭併書以遺承三及亮采各自振勵無怠送黃張二縣令序雍正三年秋七月江右黃聚生將令於浙東山右張軼玊將令於粵東二賢同遊吾門負志操嫻問學相善也將行謁余求贈言余曰去嵗此日二子猶舉子也今聖天子澄清吏治重進士之選甫釋褐即用為牧民之長嗚呼可不勉歟吾子平居見為令者張弛之不平教養之無術貪庸之可鄙莫不歎息痛恨於其人今自為之可不思所以大反其道歟夫縣令者親民之官也欲天下之均平人被堯舜之澤非親民之官不可親民之官其要有三曰息訟薄賦興教而已民以事至縣者胥役不擾無守候之勞分其曲直懲其誣黠誨諭之又加詳焉則訟自息矣民有惟正之供者為案實立限使自封投匱主以信使投畢躬自稱平之榜列明示歸其有餘使補其不足如期至則民自不欺輸將恐後矣擇士民之秀者聚之於學課文飭行月三四至又於暇日適山村里閭言孝弟農桑之事其有家門敦睦守分力田者表厥里居或造訪其家以榮之而教道興矣夫吾仍以為諸生者為縣令未有不能守淡泊者也吾常思父母斯民之義未有不興除恐後者也事上貴恭不貴屈馭民以誠不以術如是而已昔漢宋之世守令多入為三公名儒常始於簿尉吾子勉之豈惟一邑民命之寄實為一生發跡之始有暇即當讀書非尋章摘句之謂謂非讀書無以明於修已治人之道而振勵其志氣也二子聞言皆不吾迂遂各書其一以贈其行焉送鄭逸溪令興化序雍正三年秋七月余同年友鄭君逸溪謁選得江南之興化余為文以送之曰君吾閩之興化郡人也古之名人有治行者所涖之縣即以其縣名之若陳太丘陶彭澤是也不必居是官也但能以學行光遠有耀者人亦以所居之郡名之若吾鄉之李延平是也君清修狷介博覽善古文詞抱所學以玩之心貴已而殊俗兹之往也以誠中發為嘉績異日人將以所治之縣稱之曰鄭興化君又益勉其學而懋其修窮理克已恐不至焉則人又將以所居之郡稱之亦曰鄭興化君子薄好名者而未嘗不曰立名人之稱斯名也得則兩得矣君則如何而克兼享哉詩曰惟其有之是以似之送陳石民令益都序吾漳陳君石民以行誼文學著於鄉或曰陳君真孝廉也或曰陳君其博雅人也或曰有用世之責者也三者非溢也雍正三年乙已七月謁選得山左之益都令試驗時冢宰高安朱公稱其學行引見之日天子曰聞汝為陳孝子具見端方老成不與衆偶諭山東撫臣視其才果優殊擢之勿以次嗚呼天盡海飛之處篤學自勵行善於家得聞於人者少矣况能逹於九卿乎達九卿者少矣况能揚於王庭動聖天子之褒嘉重問乎此以見士貴暗修不徇名譽亦以見太平有道之世有善必録有美必稱聖主之燭幽揚陋為可風也余與君同郡共學同修漳州府志賦役二卷君所手纂則君之優於繁劇可知君又嘗著清漳風俗一書與余同講行文公家禮則君負化理之才又可知君行矣以孝治則天下無可慢惡之人以廉治則所屬無貪鄙之習君又董之以政勸之以學感之以誠微獨益都而已優於天下可也送王完璞分巡貴西序黔中古牂牁地明永樂間置省嘉靖始開科荒瘠可知舊設監司二曰貴東曰貴西貴西則轄邊西四郡者也雍正六年正月特簡監察御史王君完璞駐節分巡完璞由翰林改户曹擢御史負經濟略有制而從容天子嘉焉陛辭之日訓誨賞賚備至朂哉此行也親民之官可以為所得為然事繁而所及小督撫勢重可以為所欲為然地廣而所見難周監司之職無其繁與其難而可以為所可為者可以察屬可以安民可以訪蠧可以興學昔馬伏波在駱越申明約束能使數世奉行馬將軍故事常觀察治閩廣勵人才遂使閩中文學抗衡上國完璞勉之養其根去其莠期其立俟其成專已者不虛干譽者不正苟安者庸助長者蹶毋徇已私毋耀聰明循此以往何所不可為吾子期者我將逖聽風聲焉送張又渠出守揚州序蓋昔者吾師儀封張清恪公之撫閩也清操正已以率屬推誠心與之共治懲其不率者而警勸之視民之利病若已隱憂不為不去不止其有沐浴詩書敦善行者賓禮之以養以誨比及三年治效蒸蒸官無貪刻之習士有恥不為君子之心流風餘韻至今歌思不置人咸稱其撫吳時劾制府之奸貪風節稜稜聖主褒嘉天下傳誦不知其治閩丕績有過於撫吳者蓋真儒之澤逺矣雍正九年正月仲子户部郎中又渠天子特簡出守揚州君能世其家學清修厚德釀之於庭除發之於民物熟悉於人情物態綜理庶務亦可以當繁劇而無不足將行向余言曰此行也報稱之艱繼述之重萃於一身蓋其難也余曰君以為難則不難矣揚州東南繁華一大都㑹五方雜處富商大賈輻輳逐利之區民未知儉示之以朴民未崇厚示之以睦民未知禮示之以冠婚喪祭燕飲服用之各有限制察所屬之貪刻玩愒者而懲創之躬率之以介潔待之以誠示之以不假易有悉心力為民者不因小眚而去之為之擔荷而顧惜之奸胥豪猾不使撓吾法伺吾懈隙而生其玩悍之心薦紳士子憚吾之剛方峻肅而樂吾之子諒易直振厲而培育之夫如是則可以上報聖天子簡用訓誨之盛心而無愧清恪公之學術治術矣揚州為清恪公治化所敷又嘗奏除落地稅嵗六百兩甘棠之愛猶存君行矣自古父子垂聲一代並為偉人者史不多見若范文正公之有忠宣呂晦叔之有原明皆由其家世確誠純茂鬱蒸融液而成以清恪公卜之余知君之能迪前光而求世德也送從子濟川南歸省覲序從子濟川由吏部學習以母老乞假南歸省覲朝之士大夫嘉其誠孝各為歌詩以為壽母之獻濟川其可以自慰悅而榮其親矣雖然人子之所顯揚其親者止此乎哉體孝經愛親敬親之說將必不敢惡於人不敢慢於人焉體曽子守身之訓將必一舉足一出言而不敢忘父母焉養志以誠守已以廉待人以信講明踐履不染於俗異日規樹將必有大者焉庶可為顯揚之實矣汝往矣嫂氏賢淑天人所祐爾壽而臧明秋汝尚于于而來移忠移順移治於官斯固賢母之所樂也二希堂文集卷三
