front:
  text: 御製序夫自上古結繩而治後世聖人易之以書契斯文之來尚矣故日月星辰之文於天山川草木之文於地登龍於章升玉於藻莫不因其質之美而文之以益其盛焉二典三謨商書周誥之為文堯舜禹湯文武周公傳心之要道也是故藴之為德行行之為事業發之為文章者聖賢之所以為聖也摛華靡於篇章鬭一字之竒巧者雕蟲之技虛車之飾之所以為譏也徒修其內而文不能見於外者亦大雅君子之所弗尚也故孔子於斯道之隆替未嘗不寓之於斯文之盛衰文所以載道豈虛語哉三代以降左氏傳屈氏離騷太史公書賈氏治安董氏賢良三策紹上古之淳風繼大雅之元音雖其德未臻於盛要皆其積有源其流有光堪以垂世而行逺魏晉之後變淳朴為綺靡化元聲為冗薄而文之衰極矣至唐韓昌黎乃起衰式靡天下復歸於正同時若柳宗元其後若歐陽三蘇曽子固諸人代繼其蹤又有周程張朱諸大儒繼起逺接歷聖之傳明道以覺世而斯文之盛遂如日月之經天山川之緯地豈非以言之無文行之不逺而斯道之存端賴斯文之盛以流播於天地間乎吾師梁村蔡先生守道君子也常為吾言天地性命之奧道心人心危微之判堯舜禹湯文武周公孔孟周程張朱之心傳而曰人受天地之中以生必克已復禮以全其天命之本然民胞物與以盡其功用之極致斯不愧於天之所賦而成其為人矣若風雲月露以為文者藝也然道德盛於中而英華見於外斯亦君子之所不廢也因出平生所為文示余余披讀之餘而歎先生之實為有用之儒也先生講學鼇峯教人以忠信孝悌仁義發明濂洛關閩淵源有自也及立朝而丰采議論嘉言讜議足以為千百世治世之良規則又國家棟梁之任也今觀其文則溯源於六經闡發周程張朱之理而運以韓柳歐蘇之法度如金聲玉振於有虞之廷也如卿雲麗日昭映霄漢而為中天之瑞也如江淮河濟支流衆派之終歸於大海也所謂藴之為德行行之為事業發之為文章者吾於先生見之抑又有說焉先生之文固足以繼昌黎之蹤而抗歐蘇矣然先儒以為昌黎因文以見道今先生教人必先之以格致誠正之功天人危微之判而後繼之以文焉先生自修固可知矣吾以為先生體道以為文并非因文以見道請以質之先生與天下後世以為何如也
