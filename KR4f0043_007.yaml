body:
  text: 二希堂文集卷七禮部侍郎蔡世逺撰有髙才能文章三不幸論有才貴乎無才貴乎無才而齷齪卑瑣碌碌焉守鬼園以終其身遇物而不能知登髙而不能賦斯亦士君子之恥也然吾以為有才而自恃又不如無才之善伊川先生以有髙才能文章為三不幸正謂此也昔者三代之取士也以鄉三物教萬民鄉老及鄉大夫考其德行道藝獻賢能之書於王取實行而不在文章西漢以孝廉取士東京四科魏晉九品皆重行誼至隋建進士科唐又分為明經進士二科自是而後則非文學詞章罕得進矣節比由夷行同曾史者多屈處於下而不能知而一字之竒一韻之巧馳騁於詞壇取髙官顯名於天下嗚呼三代以下所以多輕薄浮華之士也夫樹木者以植根為上立品者以務實為貴才名過盛而矜已傲物非大成之器也恃其所有而攀緣趨附輕於一試尤喪檢辱身之士也昔者禰正平孔北海恃才而死王粲陳琳以才故卒為曹操用識者兩有譏焉唐初四傑果如裴行儉之言江東二陸終於非命才之纍人一至此哉其餘若孟堅之附於竇氏中郎之屈於董氏也歆之用於莽也劉栁之與八司馬之列也之數子者皆才髙天下學冠一世卒以負才欲試與非其人使千載以下論古者猶有遺憾所謂雄雞不能斷其尾而參天蔽日之材且纒絆於野藤刺蔓以自纍也然吾謂伊川先生其有激而言歟當時王介甫以盛名致宰相位新法行為有宋亂首而民不聊生其子王雩警敏絶人文章達於帝闕竟夭其身且蘇氏兄弟亦以文章顯者卒與呂陶等分為蜀黨與朱公庭賈易等互相掊擊此皆伊川先生所身歷者故其時日與邵堯夫張橫渠諸人剖抉性命之精以復性明善為要以近裏著已為功上以接孔孟之傳下以開考亭之緒使士知所重者在此不在彼也至於文章與實學並足稱者此又不可以概論漳志丘墓後論君子疾沒世而名不稱人沒矣稱其名猶志其墓者何墓以人傳也死如周忠愍黃忠烈傳矣賤如陳布衣蔡鶴峰傳矣微如阮氏婦蔡步卒傳矣當明祚之終從黃忠烈死者四人後人表其墓而出之而死於靖難之六生竟不詳其葬所斯亦憾事也嗚呼石獸石人所以顯墓非所以傳墓也富貴而名磨滅况於墓乎漳志宫廟後論廟祀之大者有司春秋致祭百世不祧余既載之祀典矣茲之紀也何居漢壽亭侯正氣凛然千秋為烈郡邑各有廟有司朔望謁焉東嶽行宫雖非郡縣所宜祀然相沿已久天妃之神海艦蛟宮奉以休咎故屬縣亦多有其餘名義不必盡正存其名所以留其蹟也夫神降於莘左氏記之渭陽汾陰綱目雖譏而必録况有不盡然者乎李立侯字說立侯後改名清植安溪先生之孫曰清名者年二十有一矣以庚寅四月二日既冠冠之日先生命世逺為賓世逺以師之命固辭不獲也古禮有賓字冠者之文先生又命字之並作字說世逺又以師之命固辭不獲也謹按其名字之曰立侯而為說以貽之孔子曰立身行道揚名於後世以顯父母孝之終也古之所謂顯親揚名者舍立身行道奚以焉叔孫穆叔曰太上有立德其次有立功其次有立言此之謂三不朽夫所謂不朽者名也而欲名之不朽則必自立德立功立言致之今吾子既以名名其名則所以自立者宜何如耶抑又聞之君子之學立志居敬致知踐行盡之數者之功並用則可以至於聖賢無難而要必以立志為之基人苟名節盡喪加以習染既深年力衰邁斯一旦卓然自立為難耳不然者昨日為鄉人今日欲為聖人惟狂克念即可以作聖矣况吾子年方弱冠氣質清明朝夕親承吾師之教家學之茂超出羣倫循而不息豈可量哉孟子曰舜人也我亦人也舜為法於天下可傳於後世我猶未免為鄉人也此立志之說也張子曰學者當以立志為先不為異端惑不為文采炫不為功利汨此立志之謂也吾子勉之此志一立則凡所讀之書皆近裏著已也所行之事皆若有規矩凖繩在前不知其所以然而自化也世逺不敏竊謂孔子之所謂立身行道穆叔之所謂立德立功立言者要皆自立志始於以馴致其功揚其名而垂之不朽夫孰能禦之世逺年幾三十回思既冠之日殆將十年學殖就荒此志終恐頽墮委靡而不能自克何足為吾子告者然所言者固亦素所聞於師之說而非依稀影響之論願吾子之無以人而廢言也上沈心齊先生書六月啓行聞在建寧停驂甚久想入朝報命當在八九月之交也世逺以駑劣之才署齊一年親承提命懇懇然裁其過而勉其不及自謂所得者多非徒文章一事昔宋景濂四持文衡好接引後學士之近之者謂如大寒加重裘盛暑濯清風四方得見者誇於人以為幸世逺僻處窮陬才不逮志然振衣濯足固不自安於培塿溝瀆也禮闈被放歸宿於三山署中臨行告世逺曰汝今歸矣凡人之役役於利者我知汝無是也而近於義者不可激也偶得一第便自偃蹇廢棄我又知無是也恐溺於古荒舉子之業不可為也竊念斯言切中膏肓但今則更有愧者世逺自少不以治生為急稍有長物則蓄參苓以為養親之資其餘購古書供朝夕玩習非敢效原憲之金石歌聲張嘉貞之不治産業良以貧富有命非可力爭且君子志其逺者大者無暇瑣瑣及也今自北上歸來恐負王曾之志即臥槀推車自信不至役役於利然欲如曩時之廓落自豪不可得也此其對先生之言而自愧者也蘇子瞻兄弟年未二十長於應試制䇿古文尤雄偉俊拔歐陽公未第時不敢讀昌黎之文惟取當時所號為時文如楊劉者讀之世逺凡才末學鹿鹿魚魚亦嘗剽竊經史之緒餘以形之筆墨居恆每羡蘇氏之才而尤以歐公之言自戒若曰以彼其才當未第時猶不敢分心於古如此况我輩哉然亦時激昻慷慨謂士子讀聖賢書不蚤抗首揚眉窮古極今以自附於作者之林倘終身不得一第其將默默守此以終耶吾儕聰明才力逺不逮古人待其將老而圖之復何望哉今抵家已五閲月碌碌無就令君陳莘學先生嘗授以有韻之文而衆緒難祛作輟互乘中夜自思恐流為浮休怐愗刻鵠屠龍而後止所荒者豈但制舉之業已哉此又其對先生之言而自愧者也伏惟先生去欲以誠求仁以恕自視學以來閩中人士至今猶寢食歌思不置天下之人思欲出其門而不可得世逺顧獨䝉知遇拙工遊匠石之門駑蹇邀孫陽之顧敢不痛自刻責以庶幾無玷門牆哉戊子公車擬欲先期亟來受教但進止必待爾時方能自決家君托如天之庇司鐸羅源藍玊霖近在省城精進有加世逺再拜與李世蕡書曩在都門聚首談心幾於一載受益良多每思足下學富才博凡有所著操筆立就求之近今蓋其難之非獨閩中翹楚也闊别以來未有進境所幸者日親吾師之教以為儀型而已方今德位俱隆學問精深廣大為天下師者斷推吾師一人而子孫弟姪輩窮經力學作止言動之間循循然莫不有規矩亦無有過者昔有宋諸儒更倡迭興道學之盛千古未有然其生平相與服習講論者大半皆其及門至於家學纍世相承推文定胡氏文節蔡氏為最今吾師之學與文定文節淺深非後學所敢輕議然願足下兄弟之以明仲九峯諸賢自處也方今天下學者以記誦詞章為止境以科名爵位為可畢一生能事夫記誦詞章君子豈非是而不貴要其讀書時精神心力專在於此則其所就亦止此矣吾聞二程之學以聖人為必可學而至而已必欲學而至於聖人又胡敬齊云明道得志使萬物各得其所學者亦不可無此志學者有志氣豈為狂妄自喜哉要其加功用力之始專在讀書若讀一書而近裏著已以身體之以心契之雖未知果能力行與否然方其開卷繹誦時誰無激勵與愧恥之心激勵愧恥之心日進不已則力行而至於古人之塗徑也抑又聞之所貴於科名爵位者謂其可以見一生之品節經濟不至泯沒以終耳是故方其始得之也有以得父母一日之歡心及其既也可以盡展生平之所學世問有薄科名爵位而不屑者君子以為矯然使其志趨意向專在於此則其鄙陋齷齪亦已甚矣古來官至宰相尚書為人所鄙棄不道及姓字不留者何限方其生時便已暗汶無光况其已死與草木同朽久矣世逺自年十二三時涉獵經史諸書便講氣節喜作古文談經濟與二三朋友相砥礪者大都致辨於義利之關而敦篤於倫理之際丁亥戊子從儀封張先生遊校修先儒之書覺所見又復開闊然才質淺陋學問粗疏自顧生平愧心之事尚多拘牽於氣禀惑溺於習俗而不能自免甚矣克已之難也兹在京邸兀守一官名為出仕實則書生名為散僚實則聖天子所以培養人才之地其敢重自廢棄以貽吾黨之羞竊不自量其力之所至欲與諸兄修明吾師之學以垂之無窮更望逺賜手書互相勸勉不至如吾前所云云者而躬自蹈之也士大夫恥言風化惡談道學即有心知其如此而懼人之非笑之若曖昧之事不堪以對人者然嗚呼使人人懼人之非笑而不敢以見之躬發之口天下風氣亦安知其所終哉邸寓無聊提筆書之不覺遂肆其狂論如此不宣與浙江黃撫軍請開米禁書竊聞王政無遏糴之文救荒有移粟之例泉漳二府旱饑歷八月於兹矣入夏以來米石二兩餘至三兩不止人食草木之葉饑民奪食道路壅塞此固本處饑荒使然亦緣今歲江浙海禁森嚴米船莫至故坐困至此也福建之米原不足以供福建之食雖豐年多取資於江浙亦猶江浙之米原不足以供江浙之食雖豐年必仰給於湖廣數十年來大都湖廣之米輳集於蘇郡之楓橋而楓橋之米間由上海乍浦以往福建故嵗雖頻侵而米價不騰自海禁一嚴而民始無望矣今本省將軍祖公有泉漳被災百姓驚慌之奏制府梁公有借帑各省買米之請恭逢皇上聖德覃敷大沛恩膏以總督請買米數甚少特將明年漕米截留三十萬石立遣大臣會同督撫提鎮運至狼山乍浦航海以至泉漳賑濟泉漳之人如慶更生但賑濟之米尚須時日而餓殍難緩須臾世逺漳人也奉㫖假歸羇旅中途一應諸事不敢與聞獨於家鄉之困急難以坐視因廣為借貸并招募漳人買米數千石計船八九隻順風七八日可至泉漳平其價而糶之本錢工費之外不溢一毫在江浙今歲豐稔多此數千石之米無加絲毫在泉漳即可活數十萬之民命且泉漳之人或有倉積居奇者知米船有至必爭先發糶民心自定矣夫禁口以平地方之米價以防奸人之出沒此莫大之政事也而弛禁以救鄰封之急難以解萬姓之倒懸亦不言之美利也况今煌煌明詔炳如日星既截留漕米三十萬出海以賑濟泉漳豈反禁泉漳之人自買不許其出口邪且制府借帑各省買米之請皇上猶以為少使知泉漳之人自帶出口以蘇家鄉應亦稍寬宵旰必無阻而抑之之理但明公已開明禁而關津守吏猶循舊格伏乞據呈批照飭乍浦關津放行毋得攔阻民自移粟明公因而利之上體皇仁下沽民命無損於江浙而大有造於福建知明公仁心為質固無俟世逺之激切呼籲然區區末議更望電察而留神焉閩邦幸甚復儀封張先生書世逺稽顙再拜言先君受知最深易簀之時猶惓懷先生不置今不逺數千里辱賜誄辭重以手書所以褒揚先君期望世逺者甚至世逺雖不肖敢不淵氷自凛以庶幾不墜先訓無負大賢之期許哉邇閲邸報知復任江蘇天子明聖無微不彰益信吾道之可為海內正人君子誰不伸眉吐氣思自奮於清時也此事在先生止求其理之當心之安置得失利害於不顧而在世逺則有操劵而得者前書所謂公論足慿聖明足恃及今觀之百不爽一蓋天下事以為難則無所不難即世逺家居亦有難者迂守成性不合時宜或指為異物而忌之未可知也即有從而思敗之未可知也拙則或疑其矯貧則或哂其陋不輕受人之惠則或疑其亢不能廣交結趨威勢則或訝其碌碌無足取人敬畏嗚呼此世逺所謂難也初旋里時竊不自揆欲以正學正論生平所聞於父師者與漳人互相劘切既亦自知其有難也敢相規勸者不過同志數人而已又退而修之一族為家規十六條懸之祖廟皆敬宗收族簡便易行者而一二賢智者流猶不能無異議行之至今而後帖然嗚呼難矣當吾道益孤之日而欲以滄海一粟之夫愚不識時妄自位置招尤取忌固其所也然君子行已立身自有本末質之聖賢盟之屋漏逺則播之天下久則傳之千秋豈拘拘以眼前毁譽榮辱得失介意哉古人有言曰立志以明道希文自期待世逺非敢然也然自從學先生以來自揣稍有歸宿官翰林二年得與名師益友遊愧懼方深其敢以難自諉哉去歲在書院進遊廣平胡五峯陳北溪黃勉齊蔡虛齊陳剩夫六先生主於東㕔蓋六先生皆閩儒最純未從祀廟廷既補祀典之闕且杜寓公之漸書籍器用各經紀使無散佚之患鼇峰書院志編次尚未成書第二卷乃新刋書目并各集序文共有二册世逺已先訂付梓囑洪廣文刻成寄上書目中添魏蔚州先生集蓋本朝人物之有定論者魏蔚州湯潛菴陸平湖三先生也三先生集世逺皆嘗讀而精思之篤學力行三先生所同而規模氣量要當以蔚州先生為最先生奏疏無慮數十皆有關係端教化一疏所以厚風俗也申明憲綱一疏所以肅官常也科場學政諸疏所以嚴始進絶弊竇也舉十賢一疏得以人事君之義至其辭新命之尚書處總憲之原職慨然以肅風紀自任此皆古大臣之風近今有不敢行者嗚呼蔚州先生而在雖執鞭所欣慕焉先生於湯陸二先生書悉已付梓望取魏集重刋之成人材而裨後學不少也方今先生之道不為不行名不為不著皇上之知遇不為不深百姓之愛戴頌揚本之中心而達之當寧者不為不多且衆而天下之責望益將復刻且備世逺近復臺灣陳觀察眉川書云士子登籍入官特患不能自克其私自克其私又患不能本所學以措之事業臺灣僻處海外得大賢居監司之任正已率物使屬員潔已以承罔有奸貪之蔽百姓實被吾澤罔有不率之隱明聰四達綜理必周耿耿鄙衷實有厚望此言非敢有以規眉川然非眉川世逺固不以陳斯言也今之述之者非敢有求進於先生也此皆先生平日藴之中而裕之外者然此乃堯舜猶病之心也七郡之官針南國之待澤先生此心亦何嘗須臾自寬假哉則謂世逺之以此言進於先生亦無不可也宋名臣言行録已刻成否世逺嘗欲與伊洛淵源録合為一集而刋布之蓋先儒語録見之言論此則施之實事尤足令人興起今淵源録已刻成此書似不可後先君葬事春季已畢貧不能備禮勉竭心力抱恨良多墓志得先生一言以光泉壤感且不朽世逺再拜與滿大中丞論書院事宜書古之所謂大臣者居殿陛之上進思盡忠退思補過以天下為憂樂及其擁旌旄節鉞開府於外清操勵世正已率物凡地方之利弊官司之賢否奸胥蠧役豪猾之病民考察既周勸懲並用張弛悉宜又汲汲焉以學校之興廢人材之盛衰大道之顯晦為已憂擇學問優長才品良逸者萃之於學使夫造道之方修已治人之要悉裕於胸中為國家收得人之效夫如是故功著一時名垂千載史冊所傳豈不偉哉昔朱子知南康軍史稱其懇惻愛民如子興利除害惟恐不及尤以厚人倫美教化為首務數詣郡學引進士子與之講論訪白鹿書院遺址奏復其舊每休沐輒一至誨誘不倦風教大行夫朱子南康之政何利不興何害不除而尤必諄諄以興學為事者蓋以學術之明倫理之修下關風俗上裨朝廷近者效行於一方一時逺者功及於天下後世自朱子興白鹿洞後宋季以及有明氣節儒林推江右獨盛嗚呼其所留貽者逺矣執事品望素著於朝端自掌成均歷閣部時天下想望丰采久矣下車以來實心任事大憝之去如木斯拔世逺逺隔漳江心焉慕之邇者躬造三山晉謁左右愛國憂民藹然惻然且欲振興書院加意人才有正誼明道之思抑浮名近利之士此真古大臣之所為而有慕於朱子白鹿洞之風規也退而喜也為之不寐伏念鼇峰書院建於儀封張先生名材萃聚先君嘗主其事世逺亦與講席之末其經營措置以及刋布諸書竊有微勞恐遂就荒常懷耿耿幸得名賢經理其間大道將興斯文起色遂留滯月餘與廣文洪奕懿諸生林正青等經紀其書籍器用俾有條理計書院所刻之書有五十五種今存者每種尚有數十部藏書有四百六十餘部為分其經史子集以便檢閲而防其散亂椅桌各八九十牀榻四十餘他物備具足以待來學者為補其破壞而貯之定所整頓頗定而後告歸留以待大賢之經畫也夫人才實難要在養成而激勵之擇之不可不嚴防之不可過慎擇之不嚴則毁方躁進者緣飾以入而潔清自好敦古飭行之士反恥共事其中防之過慎則有志之士豈其不能閉戶家修何苦以其身為隄防之具哉執事振勵盛心規模自有素定然大要或得之觀風之試或得之詢問之餘知其人者行令郡縣資送未得其人者行令郡縣薦送敦本行勵正學明體適用者上也博洽能文者次也工於時文者又其次也九府一州先後而集執事定為規條頒其程式或策之以詩古文或課之時藝或所修何書所講何業總其大綱而品定之又於政事之暇躬至書院集諸生告以讀書之要義利之防耳提而面命之其有不激勸而恐後者寡矣夫君子之德風也以誠感者必以誠應曩者秋深不雨執事己饑在念遣官往視民田未祈禱而甘霖已沛矣誠所感也况興教勸學之事風聲足以樹之誠意足以孚之條約足以正之居髙而呼其效自速吾聞之明珠之光固不在櫝而美櫝可為珠重良工之勤不必在肆而居肆實為工用今萃九府一州之士多其書籍聚其友朋使之博古而通今相與長善而救失雖其後未必悉底於成要必有一二人二三人者出焉此一二人二三人者烏可少也哉漢之仲舒賈誼此二人者已足為漢重矣唐之昌黎陸贄此二人者己足為唐重矣宋之韓范歐陽此三人者已足為宋重矣今世之士所謂仲舒賈誼昌黎陸贄韓范歐陽者豈無其人無亦鬱而不宣隱而不見抑亦陶而未成歟欽惟我皇上天縱聖神崇儒重道御製訓飭士子文頒之學宮使士先品行而後文章又尊崇朱子刋其書隆其祀以昭示天下天下靡然向風此間定有應運而興者非賢當事振作而翼成之而誰耶抑更有陳者會城有兩書院一為共學一為鼇峰共學者課文之書院也鼇峰者講學修書之書院也各有租稅之入以給諸生此二年共學無人經紀而按籍可稽但搨兩書院碑文核令徴收以充公用不須别有措置或觀風所得之士有未深悉其素者且進之共學中然後超而選之鼇峰略有上下庠之别微示鼓勵是兩者雖分而實合也夫移風易俗修舉教化非俗吏之所能為俗吏以此為迂而大賢以此為先務儀封先生創而興之於前執事擴而大之於後海濱鄒魯其復興乎世逺荒陋鄙儒於道未有所聞不敢謂知學者然自揣生平立身行已之方文章經濟之大亦嘗有志於斯矣非執事不敢發此言也昔有人攜指南車以適路者逺近險阻動與意會而樵夫牧豎見之猶曰左左右右而攜指南車者不厭其聒耳謂其意之無他也今執事宏才偉望攜指南車者也而世逺猶以此進者則樵夫牧豎之嘵嘵也伏惟恕其狂妄而不厭其聒耳也則幸甚外附舉所知者數人有慎無濫以備採擇不宣與陳滄洲總河書都門握别示我詩歌餞我别酒意緒惓惓回思離索不覺七年伏念明公以百折不回之氣特膺聖眷為天下開府之首天之將降大任於是人也豈偶然哉韓昌黎詩云中朝大官老於事豈肯感激徒媕婀此為全無氣骨者言之也諺曰適百里者半九十里此言始易而終難也班孟堅載匡張孔馬取以合傳贊語謂其服儒衣冠傳先生語然皆持祿保位而已唐蕭至忠元微之其始非不卓然直節綽有名譽後不免依附以就功名卒之功名不可就徒貽末路之譏由斯以言難乎不難明公藴蓄宏深道力素定兩為郡守為民請命屢忤大吏實政入於閭閻名譽馳於四表兹又䝉特達之知出總河政下車伊始規模宏逺其綜核名實調遣得宜者固不待言即如解捐輸之任不欲以利權自凂也效力人員赴轅自擇不避嫌疑以圖實效也薦賢一疏上為國下為民明公自負與古大臣何若也世逺竊觀大臣之有名績者漢有酇留魏丙諸葛公唐有魏鄭公宋廣平陸宣公宋有韓范司馬李忠定明公自負與數十人者何若也治術關於學術經濟通於性命大臣以身任事必有公清之操有愷惻之懷有明通之識有强毅之概有警懼之心無公清之操則不免有寵利之疚矣無愷惻之懷則不能有納溝之恥矣無明通之識則膠執而鮮通矣無强毅之槩則雖知其然發之不勇守之不固矣無警懼之心則自信太過禍且隨之矣世之號為明通者往往不能自勝其私而委蛇展轉流於不肖之歸其公清自矢者又不能明通强毅以臻於明體達用之學彼夫已氏者見其一二事之不甚曉練斷決則嗤之曰使我為之當不如此也偶辦一事斷一疑則又以驕之曰使其為之必不能此也嗚呼其本已失尚得以驕於此乎此不失為君子彼終成為小人君子之所全者大小人之所壞者多何得以語於此也然亦此之不能明通强毅以臻於極也今明公於數者實能兼之可以關夫夫之口然明公意中必不自以為能兼也不自以為能兼者正吾所謂警懼之心也警懼之心非畏葸也其氣彌剛其心彌小易之所謂乾乾詩之所謂翼翼書之所謂孜孜也由是而竭情盡慎使五者各臻於極則明公信可以當古大臣之稱而無疑矣契闊七載適余田生學丈赴任之便附訊興居不覺其詞之長如此伏惟諒我而教我焉不宣與李瀛洲布政書曩在京師時聞在朝諸臣論天下人才交口執事不置安溪先生嘗告世逺曰此人清而不至於矯且刻正而不近於迂所至之地必以興教勸學為務蓋其性之所樂也世逺聞而心識之謂此真一代之偉人矣夫古今以來不過數十人此數十人者分生於數十百年而不為少天下之大無過數人此數人者分布於四海九州而不為不多嗚呼人才實難君子亦為其難者而已庚寅秋世逺給假回閩過平江見儀封張先生言執事於儀封儀封亦言執事於世逺今春聞執事晉藩於閩下車初政如禁里派行紙皂等事皆實有利於民間文告所頒愷惻之言足以動人金石之堅信不可易薛文清有言曰立法貴在必行法立而不行則法為虛文適足以啓下人之玩而已今執事之法使州縣能守此而奉行之更擇其不率者而重創之閩人之福可勝既乎且夫方伯者監司之首也凡計典之重輕平時之黜陟皆方伯首列其名而司其責故於屬員之賢否民生之利弊訪問必周考察必詳然後可以稱監司之首而無愧竊見今之居官者但以為吾主錢穀而已其他若不聞知夫平日既不聞知而重輕黜陟之法乃首列其名而司其責謂之非曠官不可得也今執事獨諄諄以察吏安民為心以此稱監司之首而無愧矣世逺近以憂居二三年來戶外之事原不與知然於閩中之利弊曩嘗竊聞其槩矣大都蠧役與健訟之徒最為民害蠧役朘民之膏中人以法至其驕橫已極陵紳士如草芥竊謂此輩擇其甚者置之法風聲已動於九閩矣健訟者指無為有飭毫末之事以為滔天上官不知輒為聽理小民身家蕩散無餘是二者一省之內碁置星羅摘其尤者寧確無濫寧重無輕懲奸慝以安善良固仁政之先務也近又聞執事數至書院與諸生論學碑隂所載租稅各按籍詳給夫今天下之以此為迂也久矣曰此何關於政事不知學術明教化興則人才盛下以成其風俗上以資於廟朝政事之大孰過於此曩歲與滿大中丞論書院事宜一書録在别紙海濱芻蕘未必無可採者初冬服闋赴京道經省會承教當不逺也不宣上儀封張先生書世逺再拜吳門得侍左右為程限所迫不得久親教益蒙先生專使送至宿遷又承贈書六種入舟翻閲繼以熟思氣斂志肅恍如提命世逺兩世受知及門無與為比每念先生之所以待先君及先君之所以繫心先生者常至感泣悲不自勝猥以庸虛無所肖似先生終不以不材而棄之鏤心刻骨將何以自勵而自逭耶數載以來凡所以居家處世者往往不敢自同於俗非矯飾也中心實有不如是不得者至於修已治人之道古之賢人有終身學之未敢自信况世逺者烏足語此然自受教以來比之曩時頗有依據但未知措之於用其能免於膠柱鼓瑟否耶伏念先生學術辨之毫釐清操徑節照耀古今江南之人皆曰先生以一人坐鎮於上萬姓安享於下此非虛語也世逺過揚州聞今春革落地稅歡聲載道由此推之居大位得專制於一方諸如此類尋究行之下江之福可勝既乎江蘇事務繁多所望遍察官針洞悉民情明以周之斷以出之火耗則廉其重者究之奸猾則擇其尤者處之禁婦女之遊觀黜浮侈以從儉如是而吏民不悅服風俗不淳厚者未之有也更有陳者自古仁人治獄皆以不株連及速結為上是故田叔之燒獄辭至今稱之龔遂治渤海但令持田器者即赦之唐太宗使崔仁師按獄青州孫伏伽議其多所平反仁師曰凡治獄當以仁恕為本豈可知其寃而不為伸耶自此矜全甚衆今揚州一獄海中一案伏望不株連而速結仁心之所及者宏矣江蘇為五方商人聚處之地稽查亦不必過於嚴瑣邇來間有煩言非不諒先生之竭誠盡慎體國愛民無纖毫之私也然君子作事不令人諒而令人服不肯姑息苟且以狥一時之毁譽而尤必使下情畢達無纖悉幾微之不周故世逺謂米禁及船隻之事更當持之以寬德莫大焉世逺自受知以來未嘗有一字之欺試舉閩中吳門所言者而覆按之或諒其無私而偶有當也夫其無私而偶有當者則皆平日受教於先生者也受教於先生者先生固已躬自行之而世逺猶不以為贅而言之則以此心之惓惓而不能自已也伏惟慈諒而垂察焉復王泗水先生書洛陽漳浦相去數千里暌違函丈又將十年承吾師問以出處之略著述之詳懇至如家人父子世逺竊以庶常散秩循例退伏不敢云出處家居無事筆墨自娛藉以收其放心不敢云著述然承吾師有問不敢默默也世逺庚寅冬乞假歸養時先君衰羸日甚及期散館置之度外辛卯秋丁外艱苫塊餘生不出户庭此三年中定合族家規訂通行禮書後又修漳州府志俱各成書癸巳冬服闋起復至京甲午二月有給假休致之例部胥索賂曰與我即為服闋不與我即為給假世逺雖不肖肯行賂於部胥以補官者哉不惟同館之羞抑亦素心所不肯也或又以為赴部呈明即補世逺思古人尚有得官而辭者必欲致呈求官何如安於義命治裝欲歸安溪李先生劄薦分修御纂性理精義越乙未秋告成待安溪師回閩時先母已得末疾遂無四方之志撫軍陳清端公聘主鼇峰書院所著學約通行各府州縣九郡之英一堂誠為盛事世逺終以侍母為心丁酉五月回家是冬又遭先母之變痛定思痛此痛終無定也憂居數載輯歷代名臣言行録性理精要評選歷代古文雅正六朝四唐詩各一冊未敢問世聊以自證耳自惟迂陋無似不能置身通顯以慰吾師之望罪積宏多然古人云出處之際當內斷於已世逺年未四十非無用世之心但中有所不可者雖吾師亦不能勸駕也兹因莆田使者之便肅候興居并怖鄙懷世逺再拜與楊賔實先生書索居七載每思都門時受詔編纂性理之書數十日內辨晰毫芒切已體驗或商榷經濟或旁及人物開我聾瞶受益良多世逺嘗謂方今天下才賢輩出要其踐履篤實正心誠意之功如先生者未數數見也世逺自乙未冬侍安溪先生回閩明年春撫軍海康陳公聘主鼇峰書院規訓略在鼇峰學約中謹以奉呈丁酉春安溪先生回朝以母老不能隨行且於出處進退之義不敢或苟送吾師至會城隨以侍母回家其冬遽遭母變益不復與人間事課訓子弟之餘邑人士月訂兩期延至泮宮講學學術庸疏不過自盡吾心藉以自淑非敢云有補於世也數載以來恭聞先生特簡直𨽻監司旋開府雲南正人髙位邦家之光范華陽云小人之得用將以濟其欲也君子之得用將以行其志也先生藴蓄宏深正已率物官針自肅吏畏則民安然後大興政教以厚風俗以正人心雲南何幸而得大儒開府也朱子稱王仲淹云使其得用比荀楊韓子更懇惻而有條理竊謂懇惻者仁也即易所謂元者善之長程子所謂滿腔皆惻隱之心張子所謂乾父坤母民胞物與者是也有條理者本平日讀書窮理之功措則正而施則行也無懇惻則立體不宏無條理則致用不裕霸者所少者懇惻也雖有條理亦非王者之治竊謂王霸之分止此而已管敬仲之治齊也非不民衣民食教孝教弟示義示信然孔子小之孟子卑之者以其心但以為不如是則吾國不富强而已王者則從本原之地流出以不容已之心行不容已之事盡吾性分所固有行吾職分所當為故伊尹納溝之心與敬仲治齊之心非知道者不能識也俗儒無識以性命之學為無與於事功陋矣先生懇惻條理有如仲淹而謙牧抑畏之氣抑又過之但所謂懇惻者無盡而條理者無窮事變繁多土俗各别所謂條理者尤難之又難先生其亦不敢不以為難者乎古人有言曰大法小廉大臣能廉僅得其半非廉無以行法非法無以佐廉使一已廉靜而屬員奸貪或限於耳目之所不周或因循牽制而不能決去猶是獨善其身豈稱開府之治哉雲南越在僻小政教之行比中州內地較易吾知先生之用法以濟廉者仍本所謂懇惻條理者以施之世逺行樂觀其成焉世逺近評選古文一部就各家文集及二十一史中擇其論最有關係而文能佳者約二百餘篇又私纂性理精要一冊俱經定槀恨途逺未得就正安溪師遺集文孫立侯已經彚次約二十冊廣大精微悉備無力付刻要刻亦須校訂此責仍在先生耳滇閩萬里臨風懷企不宣與趙仁圃撫軍書整齊風俗振起人材端在教化俗吏以此為迂大賢以為先務明公自撫閩以來察吏安民奬善懲奸之餘大振鼇峰書院定其規條躬為誨諭朂以武侯之淡泊寧靜示以文公之近裏切已身有之故言之親切而有味聞風者莫不企仰况於七閩人士乎况於身被提命者乎鼇峰創自儀封張清恪公弟時受知最深凡諸房室書籍器具租稅靡不悉心參理又與先君子相繼友教於斯一番心血所在凡有一人之向上一書之存散一器之堅壞皆夢寐所關邇聞此舉不覺忭躍不能自禁也夫道術關於運化經濟通於性命明公誠明所孚仁心為質養之以正大和平之福而又不姑息以滋奸大憝之去如距斯脫聞者皆比之朱子之劾台州聖明在上吾道有光何快如之今風土益諳僚屬敬信推此心以宏逺謨培士脈而厚民風易直子諒之所淪浹正從精明强固中得來天下第一等事業非天下第一流人物其誰擔之而誰裕之弟學植粗淺蒙恩禁近卯入酉出十載於斯毫無報稱悚惕日增朔風有便幸加訓勉庶寡愆尤臨風懷企不宣二希堂文集卷七
